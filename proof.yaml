project:
    name: tyk-pump
    specs:
        - path: specs/stakeholder
          prefix: STK-REQ
          type: stakeholder
        - path: specs/system
          prefix: SYS-REQ
          type: system
          parent_spec: specs/stakeholder
        - path: specs/software
          prefix: SW-REQ
          type: software
          parent_spec: specs/system
        - path: specs/interface
          prefix: INT-REQ
          type: interface
          parent_spec: specs/system
    default_assurance_level: B
    catalog:
        version: 1.0.0
    evidence_types:
        nominal:
            description: Happy-path or representative valid-input evidence for the requirement obligation.
        override:
            description: Evidence that an operator override source takes precedence over a default or file/config value using the documented parser.
    signals:
        defaults: auto
        refresh_on_audit: true
        rule_packs:
            - signal-rules/tyk-pump-phase-n.yaml
        providers:
            opengrep:
                enabled: true
                mode: run
                managed: true
                command:
                    - opengrep
                    - scan
                    - '{configs}'
                    - --sarif
                    - --quiet
                    - --no-rewrite-rule-ids
                    - '{include_paths}'
                env:
                    - HOME=.proof/opengrep-home
                format: sarif
                include_paths:
                    - analytics
                    - api.go
                    - config.go
                    - instrumentation_helpers.go
                    - instrumentation_statsd_sink.go
                    - logger
                    - main.go
                    - pumps
                    - retry
                    - serializer
                    - server
                    - storage
                exclude_paths:
                    - '**/*_test.go'
                    - '**/testdata/**'
                    - '**/*.pb.go'
                memory_limit_mb: 3072
                max_output_mb: 64
                timeout_seconds: 600
    commands:
        build: go build -p=1 ./...
        test: >-
            mkdir -p .proof/test-results || exit 1;
            test_status=0;
            json_tmp=.proof/test-results/go-test.$$.json;
            stderr_tmp=.proof/test-results/go-test.$$.stderr;
            go test -p=1 -count=1 -timeout=20m -coverprofile=../cover.out -json ./... > "$json_tmp" 2> "$stderr_tmp" || test_status=$?;
            mv "$json_tmp" .proof/test-results/go-test.json || test_status=$?;
            mv "$stderr_tmp" .proof/test-results/go-test.stderr || test_status=$?;
            exit $test_status
        tests:
            go:
                language: go
                command: >-
                    mkdir -p .proof/test-results || exit 1;
                    test_status=0;
                    json_tmp=.proof/test-results/go-test.$$.json;
                    stderr_tmp=.proof/test-results/go-test.$$.stderr;
                    go test -p=1 -count=1 -timeout=20m -coverprofile=../cover.out -json ./... > "$json_tmp" 2> "$stderr_tmp" || test_status=$?;
                    mv "$json_tmp" .proof/test-results/go-test.json || test_status=$?;
                    mv "$stderr_tmp" .proof/test-results/go-test.stderr || test_status=$?;
                    exit $test_status
            mcdc-root:
                language: go
                command: go test -p=1 -count=1 -timeout=20m -json .
                mcdc_command: mkdir -p .proof/test-results && go test -p=1 -count=1 -timeout=20m -coverpkg=github.com/TykTechnologies/tyk-pump -coverprofile=../cover.out -json . > .proof/test-results/go-test.json
            mcdc-analytics:
                language: go
                command: go test -p=1 -count=1 -timeout=20m -json ./analytics
                mcdc_command: mkdir -p .proof/test-results && go test -p=1 -count=1 -timeout=20m -coverprofile=../cover.out -json ./analytics > .proof/test-results/go-test.json
            mcdc-demo:
                language: go
                command: go test -p=1 -count=1 -timeout=20m -json ./analytics/demo
                mcdc_command: mkdir -p .proof/test-results && go test -p=1 -count=1 -timeout=20m -coverprofile=../cover.out -json ./analytics/demo > .proof/test-results/go-test.json
            mcdc-logger:
                language: go
                command: go test -p=1 -count=1 -timeout=20m -json ./logger
                mcdc_command: mkdir -p .proof/test-results && go test -p=1 -count=1 -timeout=20m -coverprofile=../cover.out -json ./logger > .proof/test-results/go-test.json
            mcdc-pumps:
                language: go
                command: go test -p=1 -count=1 -timeout=20m -json ./pumps
                mcdc_command: bin/proof-pumps-mcdc
            mcdc-retry:
                language: go
                command: go test -p=1 -count=1 -timeout=20m -json ./retry
                mcdc_command: mkdir -p .proof/test-results && go test -p=1 -count=1 -timeout=20m -coverprofile=../cover.out -json ./retry > .proof/test-results/go-test.json
            mcdc-serializer:
                language: go
                command: go test -p=1 -count=1 -timeout=20m -json ./serializer
                mcdc_command: mkdir -p .proof/test-results && go test -p=1 -count=1 -timeout=20m -coverprofile=../cover.out -json ./serializer > .proof/test-results/go-test.json
            mcdc-server:
                language: go
                command: go test -p=1 -count=1 -timeout=20m -json ./server
                mcdc_command: mkdir -p .proof/test-results && go test -p=1 -count=1 -timeout=20m -coverprofile=../cover.out -json ./server > .proof/test-results/go-test.json
            mcdc-storage:
                language: go
                command: go test -p=1 -count=1 -timeout=20m -json ./storage
                mcdc_command: mkdir -p .proof/test-results && TYK_TESTCONTAINERS_MIN_FREE_MIB=0 go test -p=1 -count=1 -timeout=20m -coverprofile=../cover.out -json ./storage > .proof/test-results/go-test.json
    lint:
        exclude:
            - '**/*.pb.go'
            - vendor/**
            # Go TestMain(*testing.M) package harnesses, not requirement tests;
            # documented by `proof help orphan_tests_clean` for setup-only test infrastructure.
            - pumps/testmain_test.go
    checks:
        solver_latency_clean:
            threshold: 1
        coverage_threshold:
            threshold: 100
        slow_tests:
            enabled: true
            threshold_seconds: 1
            # Current local proof witnesses include a few real integration/MC/DC paths over 1s.
            # Keep them visible in `proof test slow` while avoiding test-only code changes.
            max_allowed: 4
        test_results:
            auto_link: true
            report_path: .proof/test-results/go-test.json
            format: auto
        mcdc_coverage:
            advisory: false
            require_verifies_witnesses: true
            max_no_verifying_tests: 0
            max_missing_row_witnesses: 0
            max_partial_row_coverage: 0
            max_stale_witness_lines: 0
            max_budget_skips: 0
        under_modeled_requirements:
            code_rich_max_meaningful_vars: 1
        code_mcdc:
            advisory: false
            min_statement_percent: 95
            min_decision_percent: 95
            min_condition_percent: 95
            languages:
                go:
                    test_args:
                        - -p=1
                        - -timeout=20m
            targets:
                - id: root
                  enabled: true
                  language: go
                  scope: github.com/TykTechnologies/tyk-pump
                  coverpkg: github.com/TykTechnologies/tyk-pump
                  test_command: mcdc-root
                  test_packages: .
                - id: analytics
                  enabled: true
                  language: go
                  scope: ./analytics
                  test_command: mcdc-analytics
                  test_packages: ./analytics
                - id: analytics-demo
                  enabled: true
                  language: go
                  scope: ./analytics/demo
                  test_command: mcdc-demo
                  test_packages: ./analytics/demo
                - id: logger
                  enabled: true
                  language: go
                  scope: ./logger
                  test_command: mcdc-logger
                  test_packages: ./logger
                - id: pumps
                  enabled: true
                  language: go
                  scope: ./pumps
                  test_command: mcdc-pumps
                  test_packages: ./pumps
                - id: retry
                  enabled: true
                  language: go
                  scope: ./retry
                  test_command: mcdc-retry
                  test_packages: ./retry
                - id: serializer
                  enabled: true
                  language: go
                  scope: ./serializer
                  test_command: mcdc-serializer
                  test_packages: ./serializer
                - id: server
                  enabled: true
                  language: go
                  scope: ./server
                  test_command: mcdc-server
                  test_packages: ./server
                - id: storage
                  enabled: true
                  language: go
                  scope: ./storage
                  test_command: mcdc-storage
                  test_packages: ./storage
        evidence_diversity:
            min_classes:
                B: 2
        code_signal_obligations_reviewed:
            enabled: true
        code_signal_unbindable:
            enabled: true
    approval:
        required_for:
            assurance_levels:
                - A
                - B
    audit:
        fail_level: info
        scope: full
        evidence_strict: true
    workflow:
        fail_level: info
    documentation:
        sources:
            - path: docs/
              type: auto
        threshold: 100
