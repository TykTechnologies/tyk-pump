project:
    name: tyk-pump
    specs:
        - path: specs/stakeholder
          prefix: STK-REQ
          type: stakeholder
        - path: specs/system
          prefix: SYS-REQ
          type: system
          parent_spec: specs/stakeholder
        - path: specs/software
          prefix: SW-REQ
          type: software
          parent_spec: specs/system
        - path: specs/interface
          prefix: INT-REQ
          type: interface
          parent_spec: specs/system
          cross_component: true
    default_assurance_level: B
    catalog:
        version: 1.0.0
    commands:
        build: go build ./...
        test: go test -count=1 ./analytics ./analytics/demo ./serializer ./storage ./logger .
        tests:
            go:
                language: go
                command: go test -count=1 -coverprofile=../cover.out ./analytics
            pumps:
                language: go
                command: go test -count=1 -timeout=300s -coverprofile=../cover.out ./pumps
            retry:
                language: go
                command: go test -count=1 -coverprofile=../cover.out ./retry
            serializer:
                language: go
                command: go test -count=1 -coverprofile=../cover.out ./serializer
            server:
                language: go
                command: go test -count=1 -coverprofile=../cover.out ./server
            storage:
                language: go
                command: go test -count=1 -timeout=180s -coverprofile=../cover.out ./storage
    lint:
        exclude:
            - '**/*.pb.go'
            - vendor/**
    checks:
        solver_latency_clean:
            threshold: 1
        coverage_threshold:
            threshold: 100
        slow_tests:
            enabled: true
            threshold_seconds: 1
        under_modeled_requirements:
            code_rich_max_meaningful_vars: 1
        code_mcdc:
            advisory: false
            languages:
                go:
                    test_args:
                        - -timeout=20m
            targets:
                - id: analytics
                  language: go
                  scope: ./analytics
                  test_command: go
                  test_packages: ./analytics
                - id: serializer
                  language: go
                  scope: ./serializer
                  test_command: serializer
                  test_packages: ./serializer
                - id: retry
                  language: go
                  scope: ./retry
                  test_command: retry
                  test_packages: ./retry
                - id: server
                  language: go
                  scope: ./server
                  test_command: server
                  test_packages: ./server
                - id: storage
                  language: go
                  scope: ./storage
                  test_command: storage
                  test_packages: ./storage
                - id: pumps
                  language: go
                  scope: ./pumps
                  test_command: pumps
                  test_packages: ./pumps
        evidence_diversity:
            min_classes:
                B: 2
        code_signal_obligations_reviewed:
            enabled: true
    signals:
        defaults: auto
        providers:
            opengrep:
                enabled: true
                mode: run
                managed: true
                format: sarif
                include_paths:
                    - analytics
                    - pumps
                    - storage
                    - retry
                    - serializer
                    - server
                    - logger
                exclude_paths:
                    - '**/*_test.go'
                    - '**/testdata/**'
                    - '**/*.pb.go'
                fail_if_missing: false
                timeout_seconds: 600
    approval:
        required_for:
            assurance_levels:
                - A
                - B
    audit:
        fail_level: info
        scope: full
    workflow:
        fail_level: info
    documentation:
        sources:
            - path: docs/
              type: auto
        threshold: 100
