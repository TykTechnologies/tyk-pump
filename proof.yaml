project:
    name: tyk-pump
    specs:
        - path: specs/stakeholder
          prefix: STK-REQ
          type: stakeholder
        - path: specs/system
          prefix: SYS-REQ
          type: system
          parent_spec: specs/stakeholder
        - path: specs/software
          prefix: SW-REQ
          type: software
          parent_spec: specs/system
        - path: specs/interface
          prefix: INT-REQ
          type: interface
          parent_spec: specs/system
          cross_component: true
    default_assurance_level: B
    catalog:
        version: 1.0.0
    signals:
        defaults: auto
        rule_packs:
            - signal-rules/tyk-pump-phase-n.yaml
        providers:
            opengrep:
                enabled: true
                mode: run
                managed: true
                format: sarif
                exclude_paths:
                    - '**/*_test.go'
                    - '**/testdata/**'
                    - '**/*.pb.go'
                timeout_seconds: 600
    commands:
        build: go build ./...
        test: go test -count=1 -timeout=20m -coverprofile=../cover.out ./...
        tests:
            go:
                language: go
                command: go test -count=1 -timeout=20m -coverprofile=../cover.out ./...
    lint:
        exclude:
            - '**/*.pb.go'
            - vendor/**
    checks:
        solver_latency_clean:
            threshold: 1
        coverage_threshold:
            threshold: 100
        slow_tests:
            enabled: true
            threshold_seconds: 1
        mcdc_coverage: {}
        under_modeled_requirements:
            code_rich_max_meaningful_vars: 1
        code_mcdc:
            advisory: false
            languages:
                go:
                    test_args:
                        - -timeout=20m
            targets:
                - id: tyk-pump
                  language: go
                  scope: ./...
                  test_command: go
                  test_packages: ./...
        evidence_diversity:
            min_classes:
                B: 2
        code_signal_obligations_reviewed:
            enabled: true
        code_signal_unbindable:
            enabled: true
    approval:
        required_for:
            assurance_levels:
                - A
                - B
    audit:
        fail_level: info
        scope: full
    workflow:
        fail_level: info
    documentation:
        sources:
            - path: docs/
              type: auto
        threshold: 100
