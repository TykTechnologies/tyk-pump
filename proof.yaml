project:
    name: tyk-pump
    specs:
        - path: specs/stakeholder
          prefix: STK-REQ
          type: stakeholder
        - path: specs/system
          prefix: SYS-REQ
          type: system
        - path: specs/software
          prefix: SW-REQ
          type: software
        - path: specs/interface
          prefix: INT-REQ
          type: interface
    default_assurance_level: B
    catalog:
        version: 1.0.0
    commands:
        build: go build ./...
        test: go test -count=1 ./analytics ./analytics/demo ./serializer ./storage ./logger .
        tests:
            go:
                language: go
                command: go test -count=1 -coverprofile=../cover.out ./analytics
            retry:
                language: go
                command: go test -count=1 -coverprofile=../cover.out ./retry
            serializer:
                language: go
                command: go test -count=1 -coverprofile=../cover.out ./serializer
            server:
                language: go
                command: go test -count=1 -coverprofile=../cover.out ./server
            storage:
                language: go
                command: go test -count=1 -timeout=180s -coverprofile=../cover.out ./storage
    lint:
        exclude:
            - '**/*.pb.go'
            - vendor/**
    checks:
        solver_latency_clean:
            threshold: 30
        coverage_threshold:
            threshold: 95
        slow_tests:
            threshold_seconds: 1
        mcdc_coverage: {}
        under_modeled_requirements:
            code_rich_max_meaningful_vars: 2
        code_mcdc:
            advisory: false
            languages:
                go:
                    test_args:
                        - -timeout=20m
            targets:
                - id: analytics
                  language: go
                  scope: ./analytics
                  test_command: go
                  test_packages: ./analytics
                - id: serializer
                  language: go
                  scope: ./serializer
                  test_command: serializer
                  test_packages: ./serializer
                - id: retry
                  language: go
                  scope: ./retry
                  test_command: retry
                  test_packages: ./retry
                - id: server
                  language: go
                  scope: ./server
                  test_command: server
                  test_packages: ./server
                - id: storage
                  language: go
                  scope: ./storage
                  test_command: storage
                  test_packages: ./storage
        evidence_diversity:
            min_classes:
                B: 2
    approval:
        required_for:
            assurance_levels:
                - A
                - B
    audit:
        fail_level: info
        scope: full
