id: sql-aggregate-mysql-excluded-keyword-broken
title: SQL aggregate / graph-aggregate / MCP-aggregate pumps emit Postgres-specific "excluded" qualifier that MySQL rejects
description: 'pumps/sql_aggregate.go (line 313-317), pumps/graph_sql_aggregate.go (line 190-193) and pumps/mcp_sql_aggregate.go (line 271-274) call gorm clause.OnConflict with assignments produced by analytics.OnConflictAssignments(table, "excluded"). The "excluded" pseudo-table name is a Postgres convention; MySQL''s ON DUPLICATE KEY UPDATE syntax uses VALUES(col) or the new alias-based form. As a result, writing aggregate / graph-aggregate / mcp-aggregate records against MySQL fails with "Error 1054 (42S22): Unknown column ''excluded.code_1x'' in ''field list''" on every upsert. The plain (non-aggregate) SQL pump and the MCP raw pump work because they use simple INSERT without ON CONFLICT. The pump README documents both Postgres and MySQL as supported types, so this is a stealth incompatibility.'
affected_requirements:
    - SW-REQ-041
    - SW-REQ-043
    - SW-REQ-045
evidence_manifests:
    - code_signal:opengrep:go.sql.formatted-write-exec:pumps/sql_aggregate.go:164
    - test:pumps/known_issue_tripwire_test.go:TestSQLAggregateMySQLExcludedKeyword_KI
    - .proof/evidence/ki-sql-aggregate-mysql-excluded-keyword-broken.yaml
severity: medium
severity_basis: risk
risk: correctness
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestSQLAggregateMySQLExcludedKeyword_KI$' ./pumps
environment_note: Run the focused static tripwire; it pins the shared OnConflictAssignments helper's temp-table qualification and the SQL Aggregate, Graph SQL Aggregate, and MCP SQL Aggregate callers still passing the Postgres-specific "excluded" qualifier.
introduced_in: inception
mitigation: Operators using MySQL must avoid sql_aggregate, graph_sql_aggregate, and mcp_sql_aggregate pumps; only the non-aggregating sql and graph_sql and mcp_sql pumps work end-to-end on MySQL.
remediation: Detect the MySQL dialect in DoAggregatedWriting and rebuild the assignment map using gorm''s clause.Values("col") or VALUES(col) instead of excluded.col. Alternatively expose a dialect-aware on-conflict helper in analytics that returns the correct assignment form per dialect.
