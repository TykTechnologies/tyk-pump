id: main-shutdown-pumps-serial-no-timeout
title: main.checkShutdown shuts down pumps sequentially with no per-pump timeout
description: 'main.go:342-352 (checkShutdown): iterates ''for _, pmp := range Pumps { if err := pmp.Shutdown(); ... }''. Pumps are shut down SEQUENTIALLY in registration order, with NO per-pump deadline. If one pump''s Shutdown blocks (e.g. mongo''s Disconnect waiting on in-flight ops, resurface''s wg.Wait waiting on a stuck worker, logzio''s queue drain timing out), every subsequent pump waits behind it, and the entire tyk-pump process cannot reach graceful exit. This KI is scoped only to shutdown sequencing. The separate execPumpWriting timeout inner-goroutine lifetime issue is tracked by execpumpwriting-timeout-leaves-write-goroutine.'
affected_requirements:
    - SW-REQ-004
evidence_manifests:
    - test:main_test.go:TestCheckShutdownSerialBlockedPumpPreventsLaterShutdown_KI
    - .proof/evidence/ki-main-shutdown-pumps-serial-no-timeout.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestCheckShutdownSerialBlockedPumpPreventsLaterShutdown_KI$' .
environment_note: In-memory reproducer with blocking mock pumps; no external services or containers are required.
introduced_in: inception
mitigation: Operators using mongo + logzio + resurface together should set short per-pump connection/drain timeouts so each Shutdown returns within seconds.
remediation: Parallelise shutdown via 'for _, pmp := range Pumps { wg.Add(1); go func(p Pump) { defer wg.Done(); pmp.ShutdownWithTimeout(ctx) }(pmp) }; wg.Wait()', or add per-pump shutdown contexts/deadlines so one blocked Shutdown cannot prevent later pumps from closing.
