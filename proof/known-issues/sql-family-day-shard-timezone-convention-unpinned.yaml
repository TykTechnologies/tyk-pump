id: sql-family-day-shard-timezone-convention-unpinned
title: SQL-family day-shard routing uses source-location timestamps without an explicit timezone policy
description: The SQL, SQL Aggregate, Graph SQL, Graph SQL Aggregate, MCP SQL, and MCP SQL Aggregate pumps route table-sharded records by calling TimeStamp.Format("20060102") on the analytics record timestamp. Go formats the value in that time.Time's own Location, so the same instant can route to different YYYYMMDD tables depending on whether the input is UTC or a producer/source-local timezone. Existing boundary tests pin that source-location behavior, but the SQL-family requirements do not yet state whether day shards are intentionally source-location based or UTC based.
