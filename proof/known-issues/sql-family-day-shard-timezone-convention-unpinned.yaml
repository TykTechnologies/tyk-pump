reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestSQLFamilyDayShardTimezoneConventionUnpinned_KI$' ./pumps
environment_note: The reproducer is a static source tripwire. It does not open database connections, start containers, or depend on external SQL services.
introduced_in: inception
mitigation: Run analytics producers and tyk-pump with a shared TZ=UTC convention when table sharding must be globally day-stable across regions. Avoid mixing source-local producer timestamps in the same sharded SQL dataset until the contract is documented.
remediation: Decide and document the SQL-family day-shard timezone policy. If UTC is required, normalize TimeStamp.UTC() before deriving YYYYMMDD; if source-location sharding is intended, make that contract explicit in the SQL-family requirements and operator documentation.
