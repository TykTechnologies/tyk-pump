reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored rg -n 'mapstructure\.Decode\(|Failed to decode configuration' pumps
environment_note: Evidence is tied to the listed evidence_manifests entries; reproduce by rerunning the static config-decode fatal scan. Non-decode fatal sites are intentionally out of this KI.
introduced_in: inception
mitigation: Validate pump configs (especially type-compatibility against mapstructure tags) before deploying tyk-pump; pin pump configs in source control with schema checks.
remediation: Replace the mapstructure.Decode fatal exits at pumps/csv.go:57, pumps/stdout.go:65, pumps/statsd.go:62, pumps/syslog.go:82, pumps/graylog.go:76, pumps/prometheus.go:193, pumps/kafka.go:105, pumps/elasticsearch.go:367, pumps/influx.go:71, pumps/influx2.go:97, pumps/kinesis.go:72, pumps/logzio.go:124, pumps/moesif.go:282, pumps/mongo.go:223, pumps/mongo_aggregate.go:191, pumps/mongo_selective.go:91, pumps/segment.go:50, pumps/sqs.go:103, and pumps/timestream.go:101 with logged non-nil Init errors. The pump runner (main.go execPumpWriting) already handles a non-nil Init error gracefully by skipping the failing pump and letting siblings continue.
