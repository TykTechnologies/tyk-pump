id: pumps-logfatal-on-config-decode
title: Pump Init log.Fatals on mapstructure.Decode error, crashing tyk-pump
description: |-
    Pump Init methods call log.Fatal after mapstructure.Decode errors instead of returning the decode error to the caller. The decode-fatal behavior spans file/stdout/statsd/syslog/graylog/prometheus/kafka/elasticsearch/influx/influx2/kinesis/logzio/moesif/mongo/mongo aggregate/mongo selective/segment/sqs/timestream pump families. log.Fatal calls os.Exit(1), which kills the entire tyk-pump process instead of disabling the offending pump and letting siblings continue. Non-decode setup/runtime fatals that were previously mixed into this record are now split to aws-pump-init-client-logfatal, elasticsearch-invalid-version-logfatal, prometheus-listener-logfatal, and the existing syslog-specific KIs.
