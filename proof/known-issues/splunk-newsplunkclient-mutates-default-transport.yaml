id: splunk-newsplunkclient-mutates-default-transport
title: newSplunkClient mutates http.DefaultClient.Transport, poisoning ProxyFromEnvironment cache
description: 'pumps/splunk.go:325 sets http.DefaultClient.Transport = &http.Transport{Proxy: http.ProxyFromEnvironment, ...} on every call to newSplunkClient. The Go runtime''s ProxyFromEnvironment caches the env-derived proxy function via a process-wide sync.Once on first dispatch. As soon as any HTTP request fires through this transport (e.g. from a WriteData test) without HTTP_PROXY set, the cache is sealed with the empty proxy. Later tests that set HTTP_PROXY and expect the proxy to be honored will fail because the cached proxy func is fixed. Tests Test_SplunkProxyFromEnvironment and Test_SplunkInvalidProxyURL were therefore inherently order-dependent. Worked around in pumps/splunk_test.go by installing a per-test transport that bypasses the cached lookup.'
affected_requirements:
    - SW-REQ-048
commands:
    - PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestNewSplunkClientMutatesDefaultTransport_KI$' ./pumps
evidence_manifests:
    - code_signal:opengrep:go.http.default-transport-mutation:pumps/splunk.go:325
    - test:pumps/splunk_test.go:TestNewSplunkClientMutatesDefaultTransport_KI
    - .proof/evidence/ki-splunk-newsplunkclient-mutates-default-transport.yaml
severity: low
severity_basis: risk
risk: correctness
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestNewSplunkClientMutatesDefaultTransport_KI$' ./pumps
environment_note: Run the focused Splunk tripwire; it installs a sentinel http.DefaultClient.Transport, calls newSplunkClient, proves the global transport was replaced and that the client points at the process-global default HTTP client, then restores the original transport.
introduced_in: inception
mitigation: Tests use per-test http.Transport with explicit Proxy func to bypass the cached ProxyFromEnvironment lookup.
remediation: Stop mutating http.DefaultClient.Transport in newSplunkClient. Build a private *http.Client on the SplunkClient with its own *http.Transport so the global default is never touched. Remove the runtime mutation and store the client on c.httpClient directly.
