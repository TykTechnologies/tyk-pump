id: moesif-record-decode-logfatal
title: Moesif per-record base64 decode errors call log.Fatal
description: Moesif WriteData decodes RawRequest and RawResponse with base64.StdEncoding.DecodeString and calls p.log.Fatal on malformed input at pumps/moesif.go:349 and pumps/moesif.go:379. A single malformed analytics record can terminate the whole tyk-pump process instead of being skipped or surfaced as a per-record failure.
affected_requirements:
    - SYS-REQ-004
    - SW-REQ-052
evidence_manifests:
    - test:pumps/http_pumps_mcdc_test.go:TestMoesifPump_FatalOnBadBase64_KI
    - .proof/evidence/ki-moesif-record-decode-logfatal.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s ./pumps -run '^TestMoesifPump_FatalOnBadBase64_KI$'
environment_note: In-process fatal-intercept test drives the production p.log.Fatal path; no Moesif service, network call, or container is required.
introduced_in: inception
mitigation: Pre-validate or drop malformed RawRequest/RawResponse payloads before Moesif WriteData receives them; rely on process supervisor restart if a malformed record reaches this pump.
remediation: Replace per-record p.log.Fatal calls with per-record error logging plus continue or returned error semantics that do not terminate sibling pumps.
owner: tyk-team
review_date: "2026-11-30"
release_disposition: ship_with_known_issue
status: open
