id: analytics-timestamp-timezone-convention-unpinned
title: Analytics time fields lack an explicit documented timezone convention
description: 'analytics/analytics.go:60 declares TimeStamp as a bare time.Time with json/gorm tags, analytics/aggregate.go:46 carries aggregate LastTime as time.Time, and analytics/uptime_data.go:27 carries uptime TimeStamp as time.Time. Existing tests prove JSON/msgpack/protobuf paths preserve the represented instant and, where applicable, source location, but the struct contracts still do not document whether callers should provide UTC-only values or source-location values. This KI is therefore scoped to the analytics-family tz_explicit code-signal obligation. SQL-family day-shard routing is tracked separately by sql-family-day-shard-timezone-convention-unpinned.'
affected_requirements:
    - SW-REQ-011
    - SW-REQ-009
    - SW-REQ-015
    - SW-REQ-073
evidence_manifests:
    - code_signal:opengrep:go.time_field_untagged_tz:analytics/aggregate.go:46
    - code_signal:opengrep:go.time_field_untagged_tz:analytics/analytics.go:76
    - code_signal:opengrep:go.time_field_untagged_tz:analytics/uptime_data.go:27
    - .proof/evidence/ki-analytics-timestamp-timezone-convention-unpinned.yaml
severity: medium
severity_basis: risk
risk: data_integrity
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored rg -n 'TimeStamp.*time\.Time|LastTime.*time\.Time|json:"timestamp"' analytics/analytics.go analytics/aggregate.go analytics/uptime_data.go
environment_note: Evidence is tied to the listed evidence_manifests entries; reproduce by rerunning the code-signal scan and the analytics tz_explicit tests. SQL-family day sharding is intentionally out of this record and tracked by sql-family-day-shard-timezone-convention-unpinned.
introduced_in: inception
mitigation: Operators should run tyk-gateway and tyk-pump with TZ=UTC when they need UTC-only downstream analytics semantics; current serialization evidence preserves instants but does not substitute for an explicit contract.
remediation: Document whether analytics time-bearing fields are UTC-only or source-location values, and align producer/decode comments and tests with that convention.
