id: moesif-config-read-error-logfatal
title: Moesif configuration response read errors call log.Fatal
description: Moesif parseConfiguration reads the app-config response body with ioutil.ReadAll and calls log.Fatal when the read fails at pumps/moesif.go:121. A transient network/body read failure during config refresh can therefore terminate the whole tyk-pump process instead of keeping the previous config and retrying later.
affected_requirements:
    - SYS-REQ-004
    - SW-REQ-052
evidence_manifests:
    - test:pumps/http_pumps_mcdc_test.go:TestMoesifPump_ParseConfigurationReadErrorFatal_KI
    - .proof/evidence/ki-moesif-config-read-error-logfatal.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s ./pumps -run '^TestMoesifPump_ParseConfigurationReadErrorFatal_KI$'
environment_note: In-process fatal-intercept test uses a failing ReadCloser; no Moesif service, network call, or container is required.
introduced_in: inception
mitigation: Keep Moesif app-config endpoint reliable and run tyk-pump under a supervisor. This does not prevent process exit if a response body read fails.
remediation: Replace log.Fatal with log.Error and preserve the previous sampling/eTag values so a later config refresh can retry without terminating the process.
owner: tyk-team
review_date: "2026-11-30"
release_disposition: ship_with_known_issue
status: open
