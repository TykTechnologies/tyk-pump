id: sql-aggregate-no-deadlock-retry
title: SQL aggregate upsert returns deadlock errors without retry or classification
description: pumps/sql_aggregate.go builds the aggregate upsert and returns tx.Error from the GORM Create/OnConflict path. There is no deadlock-specific classification, retry loop, or transaction restart around the aggregate write. A database deadlock or serialization failure therefore surfaces as a plain write error rather than being recovered. The SW-REQ-041 deadlock_recovery obligation is a real product gap, not only missing test evidence.
affected_requirements:
    - SW-REQ-041
    - SW-REQ-067
evidence_manifests:
    - .proof/evidence/ki-sql-aggregate-no-deadlock-retry.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestSQLAggregateDoAggregatedWritingDoesNotRetryDeadlock_KI$' ./pumps
environment_note: Reproducer uses in-memory SQLite and a GORM create callback to inject a retryable-looking deadlock error; no external database or container is required.
introduced_in: inception
mitigation: Rely on upstream purge retry/replay behavior and database monitoring for transient deadlock errors; tune database isolation and lock contention externally.
remediation: Classify retryable SQL deadlock/serialization errors per supported driver, retry the aggregate upsert with bounded backoff, and add a fake-driver or transaction test for retry and final failure cases.
