id: moesif-config-response-readall-unbounded
title: Moesif configuration fetch reads the full response body without a size bound
description: pumps/moesif.go:117 calls ioutil.ReadAll(response.Body) while parsing the Moesif application configuration response. A malformed or unexpectedly large configuration response can be fully buffered in memory before parsing. This is separate from raw analytics body masking and leaves the input_size_bounded and malformed_input obligations for SW-REQ-052 as tracked debt.
affected_requirements:
    - SW-REQ-052
evidence_manifests:
    - .proof/evidence/ki-moesif-config-response-readall-unbounded.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: rg -n 'ReadAll\(response\.Body\)|parseConfiguration' pumps/moesif.go
environment_note: Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source or rerunning the request-body-readall code-signal scan.
introduced_in: inception
mitigation: Configure Moesif endpoints only to trusted vendor/control-plane endpoints and constrain outbound responses through network policy where possible.
remediation: Wrap the configuration response body in an io.LimitedReader or reject responses above a documented maximum size before JSON parsing.
