id: graylog-record-decode-logfatal
title: Graylog per-record base64 decode errors call log.Fatal
description: Graylog WriteData decodes RawRequest and RawResponse with base64.StdEncoding.DecodeString and calls p.log.Fatal on malformed input at pumps/graylog.go:120 and pumps/graylog.go:126. A single malformed record can terminate the whole tyk-pump process instead of skipping or reporting only that record.
affected_requirements:
    - SYS-REQ-004
    - SW-REQ-049
evidence_manifests:
    - test:pumps/udp_file_pumps_mcdc_100_test.go:TestGraylogPump_WriteData_BadBase64Request_Subprocess
    - test:pumps/udp_file_pumps_mcdc_100_test.go:TestGraylogPump_WriteData_BadBase64Response_Subprocess
    - .proof/evidence/ki-graylog-record-decode-logfatal.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s ./pumps -run '^(TestGraylogPump_WriteData_BadBase64Request_Subprocess|TestGraylogPump_WriteData_BadBase64Response_Subprocess)$'
environment_note: Subprocess fatal tests intercept the expected log.Fatal process-exit path; no external Graylog service or container is required.
introduced_in: inception
mitigation: Pre-validate or drop malformed RawRequest/RawResponse payloads before Graylog WriteData receives them; rely on process supervisor restart if a malformed record reaches this pump.
remediation: Replace per-record p.log.Fatal calls with per-record error logging plus continue or returned error semantics that do not terminate sibling pumps.
owner: tyk-team
review_date: "2026-11-30"
release_disposition: ship_with_known_issue
