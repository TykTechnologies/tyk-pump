id: aws-pump-init-client-logfatal
title: AWS-family pump Init client creation failures call log.Fatal
description: SQS, Timestream, and Kinesis Init paths can call log.Fatal/log.Fatalf when AWS SDK configuration or client construction fails after pump config decode succeeds. These are non-decode setup failures and are distinct from pumps-logfatal-on-config-decode.
affected_requirements:
    - SYS-REQ-004
    - SW-REQ-055
    - SW-REQ-056
    - SW-REQ-057
evidence_manifests:
    - code_signal:process_exit_on_recoverable:pumps/sqs.go:111
    - code_signal:process_exit_on_recoverable:pumps/timestream.go:113
    - code_signal:process_exit_on_recoverable:pumps/kinesis.go:81
    - .proof/evidence/ki-aws-pump-init-client-logfatal.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored rg -n 'Failed to create sqs client|Failed to create timestream client|unable to load Kinesis SDK config' pumps/sqs.go pumps/timestream.go pumps/kinesis.go
environment_note: Static source tripwire; no AWS credentials, network calls, or containers are required.
introduced_in: inception
mitigation: Validate AWS SDK environment/credentials and pump-specific client configuration before deployment; run tyk-pump under a process supervisor.
remediation: Return setup errors from Init instead of calling log.Fatal/log.Fatalf so the failing pump can be skipped without terminating sibling pumps.
owner: tyk-team
review_date: "2026-11-30"
release_disposition: ship_with_known_issue
status: open
history:
