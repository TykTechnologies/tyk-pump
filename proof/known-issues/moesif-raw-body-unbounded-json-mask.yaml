id: moesif-raw-body-unbounded-json-mask
title: Moesif raw body masking parses and recurses over unbounded JSON input
description: Moesif raw-body masking accepts captured request/response bodies from analytics records and calls json.Unmarshal([]byte(rawBody), &maskedBody) without a size cap in pumps/moesif.go:223. If masking is configured, maskData then recursively walks nested map[string]interface{} values in pumps/moesif.go:204 without a recursion-depth bound. A large or deeply nested raw body can therefore consume unbounded memory or stack before the event is enqueued. The SW-REQ-052 untrusted_input_bounded obligation is a real product gap, not only missing test evidence.
affected_requirements:
    - SW-REQ-052
evidence_manifests:
    - test:pumps/http_pumps_mcdc_test.go:TestMoesifPump_MaskRawBodyUnboundedJSONMask_KI
    - .proof/evidence/ki-moesif-raw-body-unbounded-json-mask.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestMoesifPump_MaskRawBodyUnboundedJSONMask_KI$' ./pumps
environment_note: Focused in-process helper witness; no Moesif SDK client, network service, or container is required. The test uses bounded 512 KiB and depth-96 fixtures to prove the current helper still accepts sizeable/deep JSON and a source tripwire to pin the absence of local raw-body size/depth guards.
introduced_in: inception
mitigation: Disable raw body capture or constrain gateway-side captured body size for Moesif deployments that process untrusted large request/response bodies.
remediation: Add a maximum raw-body size before json.Unmarshal, bound recursive masking depth, and add tests for oversized and deeply nested bodies.
