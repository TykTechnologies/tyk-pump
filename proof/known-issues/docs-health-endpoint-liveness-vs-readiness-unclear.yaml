id: docs-health-endpoint-liveness-vs-readiness-unclear
title: 'Documentation gap: Helm release note still describes Pump /health as both readiness and liveness'
description: KI health-endpoint-is-liveness-only documents that server/server.go:49 returns 200 unconditionally, so the endpoint is liveness-only and does not prove Redis/backend readiness. The current TykDocs pump config snippet has been clarified to say /health is liveness-only, but developer-support/release-notes/helm-chart.mdx still says Pump has readiness and liveness probes using the health check service. That historical release-note wording can still mislead operators copying Helm probe behavior.
affected_requirements:
    - SW-REQ-032
commands:
    - sed -n '5284,5292p' /Users/buger/go/src/tyk-docs/snippets/pump-config.mdx && sed -n '608,612p' /Users/buger/go/src/tyk-docs/developer-support/release-notes/helm-chart.mdx
evidence_manifests:
    - .proof/evidence/ki-docs-health-endpoint-liveness-vs-readiness-unclear.yaml
severity: medium
severity_basis: risk
risk: availability
affected_api: TykDocs Helm chart release note describing Pump health probes
reproducer_command: 'PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored bash -lc "rg -n ''func Healthcheck|status.*ok'' server/server.go && rg -n ''liveness-only|does not report readiness'' /Users/buger/go/src/tyk-docs/snippets/pump-config.mdx && rg -n ''Pump: Readiness and liveness probes|Added readiness and liveness probes using Tyk Pump'' /Users/buger/go/src/tyk-docs/developer-support/release-notes/helm-chart.mdx"'
introduced_in: inception
mitigation: The primary pump configuration snippet now states that /health is liveness-only and does not report configured pump or backend readiness. KI health-endpoint-is-liveness-only remains the engineering record.
remediation: Update the Helm chart release note or linked Helm probe documentation to clarify that Pump /health is suitable for liveness only; true readiness needs additional backend/queue-lag checks or another readiness signal.
