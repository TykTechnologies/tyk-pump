id: uptime-aggregate-erasstr-itoa-always-nonempty
title: MC/DC F-side of 'errAsStr != ""' is unreachable (strconv.Itoa is total)
description: analytics/uptime_data.go:256 inside AggregateUptimeData wraps 'if errAsStr != ""' around the result of strconv.Itoa(value.(int)). strconv.Itoa always returns a non-empty string for any int, including 0, so errAsStr is always non-empty and the F side cannot be observed by any test.
affected_requirements:
    - SW-REQ-073
commands:
    - PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestAggregateUptimeData_TCPErrorWithURL$' ./analytics
evidence_manifests:
    - .proof/evidence/ki-uptime-aggregate-erasstr-itoa-always-nonempty.yaml
severity: low
severity_basis: risk
risk: correctness
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestAggregateUptimeData_TCPErrorWithURL$' ./analytics
environment_note: Run the focused uptime aggregate tripwire; it exercises the TCP-error URL path while analytics/uptime_data.go carries an explicit mcdc:ignore documenting that strconv.Itoa always returns a non-empty string, so the errAsStr != "" false side is structural proof debt rather than a runtime product failure.
introduced_in: inception
mitigation: Defensive non-empty guard whose F branch is impossible to reach; the corresponding guard in incrementAggregate (analytics/aggregate.go:882) already carries //mcdc:ignore for the same reason.
remediation: Drop the if-guard around strconv.Itoa when code is next simplified, or keep the current //mcdc:ignore on uptime_data.go:257 as the explicit structural proof waiver.
