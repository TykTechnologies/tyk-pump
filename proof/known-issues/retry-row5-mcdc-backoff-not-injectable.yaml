id: retry-row5-mcdc-backoff-not-injectable
title: Retry row-5 MC/DC witness is slow because HTTP retry backoff is not injectable
description: retry/http-retry.go constructs backoff.NewExponentialBackOff() inline in BackoffHTTPRetry.Send and passes it directly to backoff.WithMaxRetries. The row-5 MC/DC witness for SW-REQ-030 honestly drives a 5xx response followed by a transient transport error and then success, but it must pay the real exponential backoff delays because tests cannot inject a zero-duration backoff through a supported product/testability surface. This is proof-harness testability debt, not evidence that retry classification itself is wrong.
affected_requirements:
    - SW-REQ-030
evidence_manifests:
    - .proof/evidence/ki-retry-row5-mcdc-backoff-not-injectable.yaml
severity: low
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=240s -run '^TestBackoffHTTPRetry_Send_Retries_On5xxThenTransientTransport_Row5$' ./retry
environment_note: Run the focused row-5 witness under the monitor. The accepted debt is the lack of an approved injectable/bounded backoff surface for proof witnesses; the test still uses real product retry behavior.
introduced_in: inception
mitigation: Keep the row-5 witness scoped to the retry package and run it under the memory/process monitor; accept the real backoff delay when proving the combined 5xx plus transient-transport retry row.
remediation: Add an explicitly approved retry-policy/backoff configuration surface, or another product-supported way to bound retry elapsed time, then update the witness to use that supported surface without test-only production hooks.
