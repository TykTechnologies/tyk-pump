id: retry-4xx-bodyread-fail-causes-retry
title: 'HTTP retry: body-read error on non-retryable status escapes as retryable error'
description: 'retry/http-retry.go:78-82 (Send opFn): on a non-5xx response, if io.ReadAll(resp.Body) fails (transient network error mid-read), the function returns the raw read error WITHOUT wrapping it in backoff.Permanent. As a result, an authoritative 4xx response (e.g. 400 Bad Request, 401 Unauthorized) whose body happens to fail to read is treated as retryable. The retry loop will keep retrying the same request that the server has explicitly rejected, until maxRetries are exhausted. This burns rate-limit budget and contradicts the spec line 92 (''any other error treat as permanent (i.e. auth error, invalid request) and don''t retry''). The MC/DC witnesses for SW-REQ-030 do not drive this row: T(5xx)/F(retry skipped) is covered by 4xx-no-retry, F/F by 200-OK, T/T by 5xx-retried, but the body-read-failure-on-4xx path is not exercised.'
affected_requirements:
    - SW-REQ-030
    - INT-REQ-006
evidence_manifests:
    - test:retry/http_retry_test.go:TestBackoffHTTPRetry_Send_4xxBodyReadErrorRetries_KI
    - .proof/evidence/ki-retry-4xx-bodyread-fail-causes-retry.yaml
severity: medium
severity_basis: risk
risk: correctness
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run TestBackoffHTTPRetry_Send_4xxBodyReadErrorRetries_KI ./retry
environment_note: Run the focused retry tripwire; it returns a 400 response whose body read fails and expects the current retry attempt count to reach two attempts.
introduced_in: inception
mitigation: Operators should monitor retry warning logs; if a 4xx endpoint shows repeated retry warnings for the same request id, the issue is in play.
remediation: In retry/http-retry.go:82, distinguish between resp.StatusCode >= 500/==429 (retryable) and other codes (permanent) BEFORE the read; or wrap the read-error with backoff.Permanent when the status code is non-retryable.
