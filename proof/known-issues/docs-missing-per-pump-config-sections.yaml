id: docs-missing-per-pump-config-sections
title: 'Documentation gap: 5 registered pump types still lack per-pump configuration sections in tyk-docs'
description: 'pumps/init.go registers pump types whose operator-facing meta blocks should be documented in TykDocs. The current tracked TykDocs snippets/pump-config.mdx now has per-pump sections for sqs, resurfaceio, mongo-mcp, mongo-mcp-aggregate, sql-mcp, and sql-mcp-aggregate, but still lacks dedicated sections for: influx2, segment, mongo-graph, sql-graph, sql-graph-aggregate. Operators have no canonical TykDocs reference for those remaining meta blocks.'
affected_requirements:
    - SW-REQ-017
commands:
    - grep -E 'pmp\..*=' /Users/buger/go/src/tyk-pump/pumps/init.go | head -40
evidence_manifests:
    - .proof/evidence/ki-docs-missing-per-pump-config-sections.yaml
severity: high
severity_basis: risk
risk: correctness
cve_surface: possible
affected_api: tyk-docs per-pump configuration reference for influx2, segment, mongo-graph, sql-graph, and sql-graph-aggregate
attacker_input: operator configuration for pump types missing documented meta fields; non_attacker_trigger unless paired with unsafe deployment assumptions
sanitizer: manual:documentation-gap
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored bash -lc "rg -n 'AvailablePumps\\[\"(influx2|segment|mongo-graph|sql-graph|sql-graph-aggregate)\"\\]' pumps/init.go && ! rg -n '^### pumps\\.(influx2|segment|mongo-graph|sql-graph|sql-graph-aggregate)(\\.|$)' /Users/buger/go/src/tyk-docs/snippets/pump-config.mdx"
introduced_in: inception
minimization_status: candidate
mitigation: Code comments in each pump source file enumerate many config keys; per-pump *_test.go files show example configs. Six previously missing sections were added to the TykDocs proof annotation branch.
remediation: Add dedicated per-pump configuration sections in /Users/buger/go/src/tyk-docs/snippets/pump-config.mdx for influx2, segment, mongo-graph, sql-graph, and sql-graph-aggregate, then rerun the reproducer and withdraw this docs-gap KI.
