id: mongo-pump-writeuptime-nil-on-bad-msgpack
title: Mongo & MongoSelective WriteUptimeData panic on bad-msgpack records
description: WriteUptimeData (in both pumps/mongo.go and pumps/mongo_selective.go) allocates a keys slice with len(data) and `continue`s on msgpack decode errors without resizing. The resulting nil DBObject entries cause m.store.Insert to dereference a nil pointer in the persistent storage layer, panicking the pump goroutine instead of just logging the per-record error.
affected_requirements:
    - SW-REQ-034
    - SW-REQ-035
    - SW-REQ-040
    - SW-REQ-055
commands:
    - go test -count=1 -timeout 60s -run TestMongoPump_WriteUptimeData_BadMsgpack_KI ./pumps
    - go test -count=1 -timeout 60s -run TestMongoSelectivePump_WriteUptimeData_BadMsgpack_KI ./pumps
evidence_manifests:
    - test:pumps/mongo_mcdc_test.go:TestMongoPump_WriteUptimeData_BadMsgpack_KI
    - test:pumps/mongo_mcdc_test.go:TestMongoSelectivePump_WriteUptimeData_BadMsgpack_KI
    - code_signal:opengrep:go.slice.preallocated-with-continue-on-error:pumps/mongo.go:575
    - code_signal:opengrep:go.slice.preallocated-with-continue-on-error:pumps/mongo_selective.go:359
    - code_signal:opengrep:go.slice.preallocated-with-continue-on-error:pumps/sql.go:345
    - code_signal:opengrep:go.slice.preallocated-with-continue-on-error:pumps/sqs.go:135
    - .proof/evidence/ki-mongo-pump-writeuptime-nil-on-bad-msgpack.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: go test -count=1 -timeout=180s -run '^(TestMongoPump_WriteUptimeData_BadMsgpack_KI|TestMongoSelectivePump_WriteUptimeData_BadMsgpack_KI)$' ./pumps
environment_note: The focused reproducer initializes Mongo-backed pump storage and must run under the memory monitor. The manifest command uses run-monitored and serial package execution.
introduced_in: inception
mitigation: Operators avoid relying on uptime-pump WriteUptimeData with mixed-validity payloads. Upstream callers only feed msgpack data produced by tyk-pump itself, so triggering this path requires a corrupted store.
remediation: Append to keys only on successful decode (or skip the Insert entirely when no valid records were decoded). See pumps/mongo.go WriteUptimeData lines 575-590 and pumps/mongo_selective.go WriteUptimeData lines 359-373.
