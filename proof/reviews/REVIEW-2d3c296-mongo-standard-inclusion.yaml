comment: 'Commit-level assurance review for TT-8884: the historical standard Mongo bug called AccumulateSet in graph-only mode and skipped ordinary non-MCP analytics records. Current live Mongo evidence catches recurrence, but the formal proof model only had SW-REQ-034 for MCP filtering. This review approves SW-REQ-082, DEFECT-13, output_cardinality_bounded evidence, and MC/DC witnesses proving standard Mongo inserts ordinary and GraphQL-classified non-MCP records while all-MCP input remains a no-op. Backend error, timeout, caller-context, and config strictness concerns remain separate KI-backed debt.'
