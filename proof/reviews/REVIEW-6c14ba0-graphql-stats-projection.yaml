comment: 'Commit-level assurance review for TT-9476: the graph refactor moved graph extraction from raw request/response/schema parsing and legacy graph tags to AnalyticsRecord.GraphQLStats. Current proof already covers Graph SQL, Graph Mongo, Graph SQL aggregate, and serializer GraphQLStats consumption. This slice hardens SW-REQ-013 with structured_projection_preserved plus malformed-input obligations, and adds a negative witness that legacy graph tags/raw payloads do not create a GraphRecord unless GraphQLStats.IsGraphQL is true. Remaining graph SQL shard-index, graph aggregate shard-migration, timestamp, and SQL batch-size gaps are existing KI-backed debt, not product fixes.'
