comment: 'Commit-level assurance review for TT-15560: batch_bytes is additive Kafka writer configuration behavior, not DEFECT/DFX material. Current code decodes KafkaConf.BatchBytes, applies non-negative values to kafka.WriterConfig.BatchBytes, leaves zero/unset as the kafka-go default sentinel, ignores negative values for writer config, and preserves sibling writer settings. SW-REQ-106 now pins this behavior with backend_batch_byte_limit_applied evidence; no product runtime behavior was changed.'
