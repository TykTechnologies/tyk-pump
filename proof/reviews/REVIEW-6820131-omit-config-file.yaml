comment: 'Commit-level assurance review for TT-9126: LoadConfig now skips file read/unmarshal when TYK_PMP_OMITCONFIGFILE=true and still applies environment overrides afterward. Existing SW-REQ-002/TestIgnoreConfig evidence already caught the destructive old behavior that cleared caller defaults, but the ticket-title log behavior needed a narrower witness. This review approves DEFECT-12, local obligation config_file_omission_suppresses_file_read, and the TestIgnoreConfig log-capture subtest proving omit=true with a nonexistent config path preserves config and emits no file-read/unmarshal error.'
