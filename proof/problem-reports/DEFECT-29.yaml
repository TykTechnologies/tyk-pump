schema_version: 1
id: DEFECT-29
title: MongoSelective document-size guard counted RawRequest twice and omitted RawResponse
introduced_in: unknown
description: |
  TT-6550 (commit 4c490cb) fixed MongoSelective document-size accounting.
  Before the fix, MongoSelective estimated document size as RawRequest plus
  RawRequest, omitting RawResponse. Large responses could bypass the local
  MaxDocumentSizeBytes guard and fail at MongoDB insert time, while
  request-heavy records could be skipped because the request payload was
  double-counted.

  Current code estimates len(RawRequest)+len(RawResponse)+1024 metadata bytes
  and skips only when that estimate is greater than MaxDocumentSizeBytes.
