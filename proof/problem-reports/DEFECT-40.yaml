    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: 8bfdb36
    reference: "#154/#165"
    date: "2019-11-05"
classification:
    surface: data_integrity
    defect_class: mongo_standard_document_size_miscalculated
    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      SW-REQ-034 stated that standard Mongo performs size-bounded batching and
      raw-body rewriting, but it did not name the exact size formula or prove
      independently that RawRequest and RawResponse are each counted once. The
      existing large-document tests covered rewrite branches but not the
      historical arithmetic or "rewrite, do not skip" path through AccumulateSet.
