schema_version: 1
id: DEFECT-40
title: Standard Mongo document-size guard counted RawRequest twice and skipped useful records
introduced_in: unknown
description: |
  Commit 8bfdb36 fixed standard Mongo document-size handling. Before the fix,
  MongoPump.AccumulateSet estimated each document as RawRequest plus RawRequest,
  omitting RawResponse and the fixed metadata allowance. If the estimate
  exceeded MaxDocumentSizeBytes, the whole analytics record was skipped.
  Response-heavy records could therefore bypass the local guard and fail at
  MongoDB insert time, while request-heavy records could be discarded even
  though clearing raw bodies would have preserved useful analytics fields.

  Current standard Mongo estimates len(RawRequest)+len(RawResponse)+1024 and,
  for non-graph records over MaxDocumentSizeBytes, retains the analytics record
  while clearing RawRequest and replacing RawResponse with a diagnostic
  message. The current final-skipped-item flush gap is separate live debt and
  is tracked as a KnownIssue rather than claimed fixed here.
