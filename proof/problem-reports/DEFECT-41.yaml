schema_version: 1
id: DEFECT-41
title: MongoSelective wrote TCP error records to per-organisation collections
introduced_in: unknown
description: |
  Commit aa7a88e fixed MongoSelective batching for TCP/error analytics records.
  Before the fix, MongoSelectivePump.AccumulateSet accepted every
  AnalyticsRecord with an OrgID unless it exceeded the document-size guard.
  Records representing TCP errors use ResponseCode == -1 and are not normal
  HTTP request analytics, but they were still accumulated into the per-org
  selective Mongo collections.

  Current MongoSelective filters ResponseCode == -1 records in processItem
  before document-size accounting and batching. Ordinary HTTP analytics records
  for the same organisation continue to be retained and stamped with the
  derived per-org collection name.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: aa7a88e
    reference: tyk-analytics-ui#1475
    date: "2019-10-03"
classification:
    surface: data_integrity
    defect_class: mongo_selective_tcp_records_not_filtered
    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      SW-REQ-035 modeled per-org routing and empty OrgID drops, but did not
      state that MongoSelective owns only non-MCP HTTP analytics and excludes
      TCP/error records represented by ResponseCode == -1. Existing helper
      coverage of processItem was too narrow to prove the selective batching
      outcome.
