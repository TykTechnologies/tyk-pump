schema_version: 1
id: DEFECT-34
title: Mongo pump timeout configuration was not applied to connection setup
introduced_in: unknown
description: |
  TT-695 (commit 14ccaba) fixed Mongo pump timeout behavior. Before the fix,
  the pump loader called SetTimeout after Init, while Mongo clients were built
  during Init, so the configured pump timeout could not affect Mongo connection
  setup. The Mongo, MongoSelective, and MongoAggregate connect paths also used
  a hard-coded dial timeout instead of the operator-provided timeout value.

  The same commit added completion/error observation for standard Mongo batch
  insert goroutines. Current standard Mongo WriteData waits for every insert
  goroutine and returns the first per-batch insert error to the caller.

  Current code still has separate timeout debt: Mongo write/query paths use
  context.Background() internally and timeout=0 remains accepted. Those live
  behaviors are intentionally left as KnownIssues, not closed by this defect.
