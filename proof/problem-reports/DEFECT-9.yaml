schema_version: 1
id: DEFECT-9
title: Prometheus path labels did not have a first-class tracking-gate contract
introduced_in: 69f5f4a
description: |
  TT-9873 (commit 69f5f4a) fixed Prometheus path-label tracking by adding the
  `track_all_paths` global option and collapsing untracked analytics record
  paths to the sentinel "unknown" unless either the global option or the
  per-record TrackPath flag is enabled.

  Before proof hardening, the repository had broad Prometheus metric tests and
  two current WriteData boundary tests, but the requirement model still treated
  this as part of generic metric exposition. It did not carry a dedicated
  path-label tracking obligation, and the global TrackAllPaths preservation
  branch was not asserted through WriteData/registry output.
source:
  type: upstream_commit
  repo: TykTechnologies/tyk-pump
  commit: 69f5f4a
  reference: TT-9873
  date: "2023-08-23"
classification:
  surface: runtime_code
  defect_class: prometheus_metric_label_policy_gap
  severity: medium
  security_relevant: false
root_cause:
  missing_requirement: true
  missing_test_partition: true
  missing_mcdc_variable: false
  notes: |
    SW-REQ-024 described Prometheus metric exposition but did not specify the
    path-label tracking gate. The historical table test also repeated the path
    rewrite locally instead of proving WriteData performed it. Current proof
    now models both closed and open gate behavior with dedicated variables and
    WriteData boundary evidence.
