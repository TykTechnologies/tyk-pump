schema_version: 1
id: DEFECT-49
title: HTTP retry consumed request bodies before replaying failed Splunk sends
introduced_in: unknown
description: |
  TT-10564 (commit 35e1e74) added Splunk backoff retry behavior and fixed the
  request-body replay path inside the shared HTTP retry helper. Before the fix,
  a failed POST retry could reuse a request whose Body had already been read by
  the prior attempt, producing an empty-body or ContentLength mismatch on the
  retry instead of replaying the same payload to Splunk HEC.

  Current retry/http-retry.go reads the original body once, closes it, and
  installs a fresh io.NopCloser over the buffered bytes for every attempt.
  SW-REQ-030 now makes request_body_replay_preserved an explicit obligation,
  and SW-REQ-048 owns the Splunk MaxRetries integration contract.
