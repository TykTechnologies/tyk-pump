    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      Retry status/error classification was modeled, but proof did not require
      byte-identical request-body replay across retry attempts. Splunk retry
      evidence also checked retry counts before the shared replay invariant was
      made first-class.
