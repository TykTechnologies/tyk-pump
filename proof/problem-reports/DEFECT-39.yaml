schema_version: 1
id: DEFECT-39
title: Dotted endpoint paths corrupted Mongo aggregate endpoint dimensions
introduced_in: unknown
description: |
  Commit 58da62f fixed Mongo aggregate endpoint tracking when an
  AnalyticsRecord path contained ".". Before the fix, AggregateData used the
  raw REST path as the Endpoints map key. That key is later concatenated into
  Mongo update paths such as endpoints.<path>.hits and
  endpoints.<path>.requesttime, so a path like /v1/foo.json was interpreted as
  nested Mongo field segments rather than one endpoint dimension.

  Current code applies replaceUnsupportedChars before storing tracked REST
  paths in the Endpoints map, causing "." to be represented as \u2e in Mongo
  update keys. The original request path remains available in Identifier,
  HumanIdentifier, and endpoint list values for dashboard consumers.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: 58da62f
    reference: "#113"
    date: "2019-11-19"
classification:
