    defect_class: dynamic_field_path_not_encoded
    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      Existing aggregate requirements and tests covered monotonic counter
      accumulation and a narrow replaceUnsupportedChars helper branch, but did
      not explicitly require or prove that AggregateData used the encoded path
      through the actual Mongo update document construction path.
