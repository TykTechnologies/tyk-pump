schema_version: 1
id: DEFECT-20
title: Graph pumps dropped GraphQL root field dimensions
introduced_in: unknown
description: |
  TT-7977 (commit 17072c0) fixed GraphQL RootFields propagation through graph
  Mongo, graph SQL, and graph aggregate paths. Before the fix, graph records
  and graph aggregate dimensions preserved GraphQL types, fields, and operation
  names, but top-level root field names such as "characters" were not carried
  into GraphRecord.RootFields or rootfields aggregate dimensions.

  Current proof closes the projection part through SW-REQ-087, a child of
  SW-REQ-013, and existing analytics projection tests that assert RootFields
  are copied from GraphQLStats and ignored when the structured GraphQL flag is
  false. Downstream aggregate and SQL tests already assert rootfields remain
  present after aggregation/persistence. Live graph Mongo readback evidence is
  weaker and remains bounded by the broader Mongo backend KnownIssues.
