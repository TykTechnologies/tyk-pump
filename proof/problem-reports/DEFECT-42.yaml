schema_version: 1
id: DEFECT-42
title: Elasticsearch analytics mapping omitted alias
introduced_in: unknown
description: |
  Commit 3bb755d fixed Elasticsearch analytics document mapping so the user
  alias from AnalyticsRecord.Alias is written to the "alias" field. Before the
  fix, getMapping emitted the other base analytics identity and request fields
  but omitted alias, which prevented downstream Elasticsearch consumers from
  querying or identifying users by alias.

  Current getMapping includes mapping["alias"] = record.Alias. SW-REQ-100 now
  makes that field projection explicit as a child of SW-REQ-068, with direct
  positive and empty-alias witnesses.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: 3bb755d
    reference: tyk-pump#38
    date: "2019-08-23"
classification:
    surface: data_integrity
    defect_class: elasticsearch_alias_projection_dropped
    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      Current TestGetMapping_BasicFields already asserted alias after earlier
      mapping tests were added, but it was linked only to INT-REQ-006's broad
      mapping-per-implementation contract. No Elasticsearch software
      requirement explicitly owned the Alias-to-"alias" projection or carried
      MC/DC variables for the historical field-loss condition.
