schema_version: 1
id: DEFECT-37
title: Health endpoint was bound to localhost only
introduced_in: unknown
description: |
  Commit 402dab8 fixed the health-check listener bind scope. Before the fix,
  ServeHealthCheck called http.ListenAndServe with "localhost:<port>", so the
  liveness endpoint was reachable from the pump host only. Local curl checks
  passed, but external orchestrators, load balancers, and monitoring agents
  could not probe the endpoint from outside the host/container namespace.

  Current code calls http.ListenAndServe with ":<port>", preserving the
  configured endpoint and port while binding without a loopback-only host. This
  report closes only the external bind-scope defect. Liveness-only semantics,
  missing auth, missing rate limits, and bind-failure log.Fatal behavior remain
  tracked as KnownIssues.
