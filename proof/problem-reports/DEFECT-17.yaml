schema_version: 1
id: DEFECT-17
title: Mongo aggregate mixed average update targeted the per-org collection
introduced_in: unknown
description: |
  TT-8793 (commit 1fd5ba9) fixed the MongoAggregate mixed-collection average
  update path. The first aggregate upsert used `Mixed: mixed`, so
  `mixed=true` selected `AgggregateMixedCollectionName`. The second
  `AsTimeUpdate()` upsert historically constructed an
  `AnalyticsRecordAggregate` without `Mixed: mixed`, so derived averages for
  the mixed variant could be written to the per-org aggregate collection
  instead of the shared mixed collection.

  Current proof closes this through SW-REQ-084, a child of SW-REQ-059, and the
  strengthened `TestDoAggregatedWritingWithIgnoredAggregations` witness. The
  test now uses nonzero request times and asserts both per-org and mixed
  collections contain the recalculated average.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: 1fd5ba9
    reference: TT-8793
    date: "2023-04-27"
classification:
    surface: data_integrity
    defect_class: mongo_aggregate_mixed_average_update_target_drift
    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      SW-REQ-059 described mixed collection writes, but the formal variables
      did not pin that the second average-update upsert preserves the selected
      collection identity. The live test also used zero request times, so it did
      not prove the second upsert had reached the mixed collection.
