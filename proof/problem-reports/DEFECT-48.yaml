schema_version: 1
id: DEFECT-48
title: FIPS-labelled Docker images were wired to standard build IDs
introduced_in: 206c1d0
description: |
  Commit 206c1d0 added FIPS release support, including a `fips-linux` build
  that used GOEXPERIMENT=boringcrypto. However, the GoReleaser Docker entries
  whose image tags included `-fips-amd64` and `-fips-arm64` referenced
  `ids: [std]` instead of the FIPS build ID. A release could therefore publish
  an image labelled as FIPS while embedding the standard binary.

  Commit 74f2740 removed that broken FIPS Docker/NFPM release wiring from the
  1.10 release path. Commit 9ebef28 later reintroduced FIPS distribution with
  Docker/package wiring based on FIPS build/package IDs. SYS-REQ-036 now pins
  the invariant that FIPS-labelled artifacts preserve the FIPS build/package
  variant.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: 9ebef28
    reference: tyk-pump#894
    date: "2025-09-23"
classification:
    surface: build_or_packaging
    defect_class: fips_labelled_artifact_uses_standard_build
    severity: medium
    security_relevant: true
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      Proof modeled local FIPS build availability (SYS-REQ-026) but not the
      release-artifact mapping between FIPS labels, build IDs, package names,
      and Docker base images. The missing partition is "FIPS-labelled artifact
      backed by standard build/package".
impact_analysis:
    affected_requirements:
        - SYS-REQ-026
        - SYS-REQ-036
    affected_code:
        - ci/goreleaser/goreleaser.yml
        - .github/workflows/release.yml
        - ci/Dockerfile.distroless
hardening:
    new_requirements:
