    reviewer: agent:codex
    reviewed_at: "2026-06-26T00:00:00Z"
history:
    - at: "2026-06-26T00:00:00Z"
      by: agent:codex
      action: created
      detail: |
        Recorded 206c1d0 as a fixed historical FIPS release-artifact defect.
        The hardening keeps runtime code unchanged, adds SYS-REQ-036 and the
        local security_mode_artifact_consistent obligation, and ties current
