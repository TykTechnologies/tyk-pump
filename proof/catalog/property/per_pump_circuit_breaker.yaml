# Local class generated from signal go.fanout_goroutine_no_recover and reviewed for per-pump breaker behavior.
# Source rule: go.fanout-goroutine-no-recover (pack signal-rules/tyk-pump-phase-n.yaml)
# Framework hints: CWE-1088, CWE-755, NIST-SP-800-53-SC-5

id: per_pump_circuit_breaker
name: per_pump_circuit_breaker
category: property
status: active
summary: Each independent unit in a fanout shall be guarded by its own circuit breaker that trips after a documented consecutive-failure threshold, so a persistently failing or panicking unit is removed from the dispatch set rather than re-invoked every cycle; a shared or absent breaker lets one bad unit consume the cycle budget on behalf of healthy units indefinitely.
description: Per-pump breaker requirements shall define failure counting, trip threshold, open-state dispatch behavior, reset behavior, and diagnostics for each pump instance. Evidence must prove the breaker is keyed per pump and does not mask or disable sibling pumps.
applies_when:
  description: a fanout re-dispatches the same set of independent units every cycle with no per-unit breaker to isolate a unit that keeps failing or panicking
frameworks:
  - id: CWE
    refs:
      - CWE-1088
      - CWE-755
  - id: NIST-800-53
    refs:
      - NIST-SP-800-53-SC-5
recommended_evidence:
  - kind: boundary
    note: Test drives consecutive failures for one pump and asserts it is skipped after the threshold while a sibling pump is still invoked.
  - kind: review
    note: Review traces breaker state to pump identity and confirms counters are not shared across different pump names or backend instances.
  - kind: scenario
    note: Scenario covers open, half-open/reset, and successful recovery for the previously failing pump.
