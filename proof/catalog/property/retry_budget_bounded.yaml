# Local class generated from signal go.exponential_backoff_no_deadline and reviewed for retry elapsed-time bounds.
# Source rule: go.exponential-backoff-no-deadline (pack signal-rules/tyk-pump-phase-n.yaml)
# Framework hints: CWE-1088, CWE-1322, NIST-SP-800-53-SC-5

id: retry_budget_bounded
name: retry_budget_bounded
category: property
status: active
summary: Retry loops shall be bounded by an absolute wall-clock or context deadline, not just an attempt count; the worst-case elapsed time at maximum retries shall be explicit and shall not exceed the surrounding cycle interval.
description: Retry behavior shall declare both attempt count and elapsed-time budget. Requirements using this class must prove the retry loop observes a context or absolute deadline and that the worst-case backoff cannot exceed the caller's cycle, request, or shutdown budget.
applies_when:
  description: code uses bounded-retry-with-backoff (cenkalti/backoff, aws/retry, custom while-loop) where the bound is a count rather than a deadline
frameworks:
  - id: CWE
    refs:
      - CWE-1088
      - CWE-1322
  - id: NIST-800-53
    refs:
      - NIST-SP-800-53-SC-5
recommended_evidence:
  - kind: boundary
    note: Test uses a fake clock or short deadline to prove retry stops when elapsed budget is exhausted even if attempts remain.
  - kind: review
    note: Review calculates maximum elapsed retry time from initial interval, multiplier, max interval, jitter policy, and max attempts, then compares it with the surrounding timeout.
  - kind: scenario
    note: Scenario covers upstream slowness, repeated transient errors, and caller cancellation.
