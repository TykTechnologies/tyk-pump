# Local class generated from signal go.time_field_untagged_tz and reviewed for serialized time semantics.
# Source rule: go.time-field-untagged-tz (pack signal-rules/tyk-pump-phase-n.yaml)
# Framework hints: CWE-1278, NIST-SP-800-160-3.2.4

id: tz_explicit
name: tz_explicit
category: property
status: active
summary: A persisted or serialized time.Time field shall declare its timezone convention explicitly (pinned to UTC on construct, a documented struct-doc convention, or stored as epoch nanoseconds); a field whose location is implicit is forbidden because a producer marshaling Local time and a consumer reading it as wall-clock shifts aggregation windows, misorders audit logs, and silently drops records from range queries.
description: Persisted or serialized timestamps shall have an explicit timezone contract at the type boundary. Requirements using this class must name whether values are normalized to UTC, carry an explicit location field, or are stored as epoch values, and must prohibit ambiguous local-wall-clock interpretation.
applies_when:
  description: a struct field of type time.Time carries a serialization tag (json/bson/gorm) and crosses a producer/consumer boundary without an explicit, documented timezone convention
frameworks:
  - id: CWE
    refs:
      - CWE-1278
  - id: NIST-800-53
    refs:
      - NIST-SP-800-160-3.2.4
recommended_evidence:
  - kind: boundary
    note: Test constructs timestamps in a non-UTC location and asserts the persisted or serialized representation follows the declared UTC/location/epoch convention.
  - kind: review
    note: Review points to struct documentation, constructor validation, or serializer code that establishes the convention before data crosses the boundary.
  - kind: scenario
    note: Scenario covers a range query or aggregation window using the serialized value and proves records are not shifted by producer/consumer timezone differences.
