# Local class generated from signal go.multi_pump_fanout and reviewed for pump fanout failure containment.
# Source rule: go.multi-pump-fanout (pack signal-rules/tyk-pump-phase-n.yaml)
# Framework hints: CWE-1088, CWE-770, NIST-SP-800-53-SC-5

id: cascade_circuit_breaker
name: cascade_circuit_breaker
category: property
status: active
summary: A per-element fanout that dispatches independent work units (pumps, workers, downstream sinks) shall wire a per-unit circuit breaker so a single saturated or failing unit cannot cascade into sibling units; the breaker shall trip on a documented failure threshold and the cycle shall continue serving healthy units while a tripped unit is isolated.
description: Fanout code shall not rely on retry loops or shared wait groups alone for failure containment. A requirement using this class must prove that a per-unit breaker state exists, that it trips on repeated failure or saturation, and that a tripped unit cannot hold the whole fanout cycle open.
applies_when:
  description: code fans work out per element to N independent downstream units that share process-level dependencies (DNS cache, default transport pool, root logger) and waits on the whole group without a per-unit breaker
frameworks:
  - id: CWE
    refs:
      - CWE-1088
      - CWE-770
  - id: NIST-800-53
    refs:
      - NIST-SP-800-53-SC-5
recommended_evidence:
  - kind: boundary
    note: Test injects repeated failures or blocked sends for one unit and asserts the breaker trips at the documented threshold while healthy units still complete within the cycle budget.
  - kind: review
    note: Review traces breaker keying to the fanout unit identity and confirms no shared breaker suppresses healthy siblings.
  - kind: scenario
    note: Scenario covers trip, skipped dispatch while open, and reset/half-open behavior for the same unit.
