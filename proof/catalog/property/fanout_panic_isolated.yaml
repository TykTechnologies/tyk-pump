# Local class generated from signal go.fanout_goroutine_no_recover and reviewed for fanout panic containment.
# Source rule: go.fanout-goroutine-no-recover (pack signal-rules/tyk-pump-phase-n.yaml)
# Framework hints: CWE-1088, CWE-755, NIST-SP-800-53-SC-5

id: fanout_panic_isolated
name: fanout_panic_isolated
category: property
status: active
summary: A goroutine spawned from a fanout shall install a defer/recover barrier at the goroutine boundary so that a panic inside one work unit's body (nil-pointer deref in a marshaller, divide-by-zero in an aggregator) is contained as a typed failure for that unit rather than propagating up the goroutine stack and terminating the whole process with its siblings.
description: Fanout goroutines that process backend or record-specific work shall convert panics into unit-local failures. Evidence must show the recover barrier is installed inside the goroutine body before untrusted or backend-specific code runs.
applies_when:
  description: a fanout launches per-unit goroutines that run untrusted-input-reachable work (WriteData) with no defer recover() at the top of the goroutine
frameworks:
  - id: CWE
    refs:
      - CWE-1088
      - CWE-755
  - id: NIST-800-53
    refs:
      - NIST-SP-800-53-SC-5
recommended_evidence:
  - kind: boundary
    note: Test injects a panic in one fanout unit and asserts the process stays alive, the panic is reported as that unit's failure, and sibling units complete normally.
  - kind: review
    note: Review identifies the top-level goroutine boundary and confirms defer/recover wraps the unit body rather than only the caller.
  - kind: scenario
    note: Scenario covers panic plus normal error return so both failure modes produce comparable diagnostics.
