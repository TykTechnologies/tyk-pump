# Local class generated from signal go.tls_skip_verify_config and reviewed for TLS verification controls.
# Source rule: go.tls-skip-verify-config (pack signal-rules/tyk-pump-phase-n.yaml)
# Framework hints: CWE-295, CWE-297, NIST-SP-800-53-SC-8

id: tls_verification_explicit
name: tls_verification_explicit
category: property
status: active
summary: TLS peer verification shall be enabled by default; any code path that disables verification (InsecureSkipVerify, custom verifier returning nil) shall be guarded by an explicit, audited config option and shall emit a startup WARN or audit event.
description: TLS client requirements shall make the default verification posture explicit and identify the only configuration field allowed to disable it. Evidence must show verification is enabled by default, the disable path is intentional, and insecure operation is visible to operators.
applies_when:
  description: code constructs a *tls.Config from operator-supplied configuration and the InsecureSkipVerify field is driven by a config struct field
frameworks:
  - id: CWE
    refs:
      - CWE-295
      - CWE-297
  - id: NIST-800-53
    refs:
      - NIST-SP-800-53-SC-8
recommended_evidence:
  - kind: boundary
    note: Test default and false config values and assert tls.Config.InsecureSkipVerify remains false; test the explicit true value and assert only that path disables verification.
  - kind: review
    note: Review traces certificate, key, CA, server-name, and skip-verify fields from config/env into the constructed transport without later overwrite.
  - kind: scenario
    note: Scenario verifies startup warning or audit evidence is emitted when insecure verification is enabled.
