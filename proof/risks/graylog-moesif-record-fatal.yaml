id: graylog-moesif-record-fatal
title: Graylog and Moesif fatal paths can crash the whole process
description: Accept that per-record decode failures in pumps/graylog.go and pumps/moesif.go, plus Moesif configuration read failures, call log.Fatal and terminate the pump process. Backing KIs are graylog-record-decode-logfatal, moesif-record-decode-logfatal, and moesif-config-read-error-logfatal.
affected_requirements:
    - SYS-REQ-004
    - SW-REQ-049
    - SW-REQ-052
mitigation: Filter risky orgs before they reach these pumps; validate Moesif configuration out of band; rely on process supervisor for restart.
customer_impact: A single malformed record or recoverable Moesif setup/configuration failure can cause a brief outage of the entire analytics pipeline until pod restart.
