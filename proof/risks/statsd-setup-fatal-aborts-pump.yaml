id: statsd-setup-fatal-aborts-pump
title: StatsD setup failure log.Fatals the pump at startup
description: Accept that instrumentation_helpers.go:38 log.Fatal aborts tyk-pump if statsd_connection_string is unreachable at boot, contradicting the data-plane-independence intent of SYS-REQ-017.
affected_requirements:
    - SYS-REQ-017
mitigation: Ensure statsd endpoint reachability before pump start; otherwise disable instrumentation.
customer_impact: Mis-pointed statsd connection string prevents the entire analytics pipeline from running on startup.
