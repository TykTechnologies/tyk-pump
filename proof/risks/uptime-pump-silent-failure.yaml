id: uptime-pump-silent-failure
title: UptimePump.WriteUptimeData has no error return; backend failures silently dropped
description: Accept the asymmetric uptime-write interface (pumps/pump.go:44) until a wider refactor adds an error return. main.go:300 cannot surface backend write failures.
affected_requirements:
    - STK-REQ-005
    - INT-REQ-002
mitigation: Monitor the uptime backend (typically mongo) externally; cross-check uptime ingest volume against gateway-emitted uptime samples.
customer_impact: Operators may not be notified when uptime data is failing to persist; SLA reports could silently miss data.
