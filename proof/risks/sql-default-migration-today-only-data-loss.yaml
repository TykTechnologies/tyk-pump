id: sql-default-migration-today-only-data-loss
title: SQL default migration covers only current day; late-arriving records to older shards fail
description: Accept that the default MigrateShardedTables=false in pumps/sql.go means schema changes are only applied to the current day's sharded table. Late or backfilled records targeting older shards fail to write after a schema expansion.
affected_requirements:
    - INT-REQ-007
mitigation: 'Set migrate_sharded_tables: true in deployed SQL pump configs.'
customer_impact: Late-arriving analytics records may fail to persist after a schema change, until operator manually migrates older shards.
