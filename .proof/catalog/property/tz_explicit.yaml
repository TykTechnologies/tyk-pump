id: tz_explicit
name: tz_explicit
category: property
status: active
summary: A persisted or serialized time.Time field shall declare its timezone convention explicitly (pinned to UTC on construct, a documented struct-doc convention, or stored as epoch nanoseconds); a field whose location is implicit is forbidden because a producer marshaling Local time and a consumer reading it as wall-clock shifts aggregation windows, misorders audit logs, and silently drops records from range queries.
description: Drafted from signal go.time_field_untagged_tz at signal-rules/tyk-pump-phase-n.yaml. Elaborate per the failure modes named by framework_hints CWE-1278, NIST-SP-800-160-3.2.4.
applies_when:
  description: a struct field of type time.Time carries a serialization tag (json/bson/gorm) and crosses a producer/consumer boundary without an explicit, documented timezone convention
