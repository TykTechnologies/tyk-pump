# Local class generated from signal go.purge_cycle_no_per_pump_result and reviewed for fanout observability.
# Source rule: go.purge-cycle-no-per-pump-result (pack signal-rules/tyk-pump-phase-n.yaml)
# Framework hints: CWE-1295, NIST-SP-800-160-3.2.4

id: partial_progress_observable
name: partial_progress_observable
category: property
status: active
summary: A fanout cycle that waits on N independent work units shall expose per-unit outcome (records-written, records-dropped, last-error) via a metric, log line, or job event; a cycle that reports only aggregate completion is forbidden because partial progress (7 of 8 units dropped their batch, 1 succeeded) is then invisible to operators, health probes, and downstream alerting.
description: Fanout completion reporting shall preserve per-unit outcome detail. Requirements using this class must state which operator-visible channel records success, failure, dropped records, and partial completion for each unit in a cycle.
applies_when:
  description: code fans work out to N units and joins on a single barrier (wg.Wait) without recording or surfacing per-unit success/failure accounting
frameworks:
  - id: CWE
    refs:
      - CWE-1295
  - id: NIST-800-53
    refs:
      - NIST-SP-800-160-3.2.4
recommended_evidence:
  - kind: boundary
    note: Test a mixed-success cycle and assert per-unit success/failure counts or logs are emitted for every unit, not only one aggregate completion marker.
  - kind: review
    note: Review traces the unit identity and outcome fields into metrics, logs, events, or persisted job status.
  - kind: scenario
    note: Scenario covers total success, partial failure, and total failure so alerting can distinguish them.
