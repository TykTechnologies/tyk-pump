id: partial_progress_observable
name: partial_progress_observable
category: property
status: active
summary: A fanout cycle that waits on N independent work units shall expose per-unit outcome (records-written, records-dropped, last-error) via a metric, log line, or job event; a cycle that reports only aggregate completion is forbidden because partial progress (7 of 8 units dropped their batch, 1 succeeded) is then invisible to operators, health probes, and downstream alerting.
