id: clock_skew_tolerated
name: clock_skew_tolerated
category: property
status: active
summary: Code that ships an absolute expiration or lifetime computed on the local clock to a remote store (Redis EXPIRE, distributed-lock TTL) shall document the tolerated clock-skew bound |local.now - remote.now| < delta and either assert it on init or use relative-TTL semantics validated by a probe; an absolute-time lifetime with no skew bound is forbidden because a backward clock jump (NTP step, VM pause) writes an already-past expiration that evicts the key immediately.
description: Drafted from signal go.redis_expire_shared_key at signal-rules/tyk-pump-phase-n.yaml. Elaborate per the failure modes named by framework_hints CWE-1247, NIST-SP-800-160-3.2.4.
applies_when:
  description: code computes a duration or absolute expiration on the local clock and transmits it to a remote store whose own clock governs eviction, without a documented skew tolerance
