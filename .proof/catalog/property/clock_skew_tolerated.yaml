# Local class generated from signal go.redis_expire_shared_key and reviewed for remote-expiry clock assumptions.
# Source rule: go.redis-expire-shared-key (pack signal-rules/tyk-pump-phase-n.yaml)
# Framework hints: CWE-1247, NIST-SP-800-160-3.2.4

id: clock_skew_tolerated
name: clock_skew_tolerated
category: property
status: active
summary: Code that ships an absolute expiration or lifetime computed on the local clock to a remote store (Redis EXPIRE, distributed-lock TTL) shall document the tolerated clock-skew bound |local.now - remote.now| < delta and either assert it on init or use relative-TTL semantics validated by a probe; an absolute-time lifetime with no skew bound is forbidden because a backward clock jump (NTP step, VM pause) writes an already-past expiration that evicts the key immediately.
description: Remote-expiry requirements shall state whether expiration is relative-duration based or absolute-time based, and shall document any tolerated skew between application and store clocks. Evidence must prove the chosen API cannot immediately expire valid work because of local clock drift.
applies_when:
  description: code computes a duration or absolute expiration on the local clock and transmits it to a remote store whose own clock governs eviction, without a documented skew tolerance
frameworks:
  - id: CWE
    refs:
      - CWE-1247
  - id: NIST-800-53
    refs:
      - NIST-SP-800-160-3.2.4
recommended_evidence:
  - kind: boundary
    note: Test uses the smallest configured TTL and asserts the remote store receives a positive relative lifetime or a validated absolute expiration within the declared skew bound.
  - kind: review
    note: Review identifies the store API semantics (relative TTL vs absolute timestamp) and the clock source used to compute the value.
  - kind: scenario
    note: Scenario covers local clock moving backward or forward around a purge/expire cycle.
