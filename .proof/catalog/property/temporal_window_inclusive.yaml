# Local class generated from signal go.sql_table_sharding_by_date and reviewed for time-window routing.
# Source rule: go.sql-table-sharding-by-date (pack signal-rules/tyk-pump-phase-n.yaml)
# Framework hints: CWE-1126, CWE-1287

id: temporal_window_inclusive
name: temporal_window_inclusive
category: property
status: active
summary: Code that routes a record into a time-bucketed shard (per-day table, time-window partition) shall declare its boundary semantics explicitly (UTC-day, half-open [start, end)) and a validation step shall enforce that any chosen instant maps to exactly one shard; ambiguous boundaries that let a record land in two shards or none, or that route post-DST/clock-skew records into a stale shard, are forbidden.
description: Time-window routing requirements shall define the timezone, interval shape, and single-destination mapping used for each record. Evidence must cover boundary instants so a record at the start or end of a day/window cannot be routed to zero or multiple destinations.
applies_when:
  description: code selects a per-date or per-window storage shard from the wall-clock instant of a record without a declared, single-shard boundary mapping
frameworks:
  - id: CWE
    refs:
      - CWE-1126
      - CWE-1287
recommended_evidence:
  - kind: boundary
    note: Test records at start-of-window, last instant before end, exact end boundary, and adjacent-window start, then asserts each maps to exactly one documented shard.
  - kind: scenario
    note: Scenario covers late-arriving historical records and verifies they are routed by record timestamp rather than process wall-clock time unless the requirement explicitly says otherwise.
