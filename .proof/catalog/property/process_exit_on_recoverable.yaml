# Local class generated from signal go.logfatal_on_config_decode and reviewed for component-local failure handling.
# Source rule: go.logfatal-on-config-decode (pack signal-rules/tyk-pump-phase-n.yaml)
# Framework hints: CWE-1357, CWE-755, NIST-SP-800-53-SI-13

id: process_exit_on_recoverable
name: process_exit_on_recoverable
category: property
status: active
summary: A component-scoped initializer or worker (one pump in a multi-pump process) shall not call log.Fatal / os.Exit on a recoverable failure (config decode error, connect failure); doing so bypasses deferred cleanup AND every sibling component's chance to keep working, so a single misconfigured component takes down the whole process. The failure shall be returned to the caller, which decides whether it is fatal for the whole process or only for this component, or the component shall enter a degraded inert mode while siblings continue.
description: Component initialization and worker paths shall return recoverable errors to the caller instead of terminating the process directly. Requirements using this class must define which failures are component-local and prove they do not call log.Fatal, os.Exit, or equivalent process-exit APIs.
applies_when:
  description: a component-scoped Init/New method calls log.Fatal/log.Fatalf/os.Exit on a config-decode or connect error path, in a process that hosts other independent components
frameworks:
  - id: CWE
    refs:
      - CWE-1357
      - CWE-755
  - id: NIST-800-53
    refs:
      - NIST-SP-800-53-SI-13
recommended_evidence:
  - kind: boundary
    note: Test config-decode and connection-failure inputs and assert the initializer returns an error or inert component without exiting the process.
  - kind: review
    note: Review scans the component-owned Init/New/WriteData path for log.Fatal, Fatalf, Panic, os.Exit, and equivalent wrappers on recoverable errors.
  - kind: scenario
    note: Scenario covers one failing component in a multi-component process while at least one sibling remains startable or continues processing.
