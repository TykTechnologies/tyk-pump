# Local class generated from signal go.multi_pump_fanout and reviewed for fanout independence evidence.
# Source rule: go.multi-pump-fanout (pack signal-rules/tyk-pump-phase-n.yaml)
# Framework hints: CWE-1088, CWE-770, NIST-SP-800-53-SC-5

id: failure_independence_proven
name: failure_independence_proven
category: property
status: active
summary: A fanout that claims its work units are independent shall make that independence explicit and provable, naming the isolation mechanism (process isolation, dedicated client per unit, panic recovery at the goroutine boundary) so that a panic, hang, or resource exhaustion in one unit demonstrably cannot corrupt or starve siblings.
description: Fanout requirements shall not assume independence implicitly. They must identify shared resources, state, and cancellation paths, then prove failures in one unit cannot mutate sibling inputs, steal sibling client state, or block sibling completion indefinitely.
applies_when:
  description: code launches per-element goroutines that share any process-level state and relies on an unstated independence assumption between the units
frameworks:
  - id: CWE
    refs:
      - CWE-1088
      - CWE-770
  - id: NIST-800-53
    refs:
      - NIST-SP-800-53-SC-5
recommended_evidence:
  - kind: boundary
    note: Test injects failure, panic, or delay into one unit and asserts sibling input, client state, and completion are unaffected.
  - kind: review
    note: "Review lists shared resources and explains the isolation mechanism for each: copy-on-write inputs, per-unit clients, bounded contexts, recover barriers, or process isolation."
  - kind: scenario
    note: Scenario covers partial backend outage while healthy backends continue and produce observable outcomes.
