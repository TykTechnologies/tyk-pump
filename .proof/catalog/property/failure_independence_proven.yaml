id: failure_independence_proven
name: failure_independence_proven
category: property
status: active
summary: A fanout that claims its work units are independent shall make that independence explicit and provable, naming the isolation mechanism (process isolation, dedicated client per unit, panic recovery at the goroutine boundary) so that a panic, hang, or resource exhaustion in one unit demonstrably cannot corrupt or starve siblings.
