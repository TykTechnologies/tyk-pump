# Local class generated from signal go.wall_clock_arithmetic and reviewed for elapsed-time measurement.
# Source rule: go.wall-clock-arithmetic (pack signal-rules/tyk-pump-phase-n.yaml)
# Framework hints: CWE-1247, NIST-SP-800-160-3.2.4

id: dst_transition_safe
name: dst_transition_safe
category: property
status: active
summary: Elapsed-duration measurement shall be monotonic-clock safe; computing a duration by subtracting wall-clock instants shall not be relied upon, because DST transitions, manual clock adjustments, and NTP step events can make the result negative or jump by hours. Durations used as timing, SLA, or loop-guard values shall be derived from a monotonic source (or explicitly clamped at d < 0).
description: Elapsed-time requirements shall distinguish monotonic durations from civil-time timestamps. Evidence must prove duration logic is based on monotonic clock readings or explicitly handles negative and discontinuous wall-clock deltas.
applies_when:
  description: code measures elapsed time by subtracting two wall-clock instants (time.Since, time.Now().Sub) and uses the result as a duration for timing, SLA evaluation, or a loop guard
frameworks:
  - id: CWE
    refs:
      - CWE-1247
  - id: NIST-800-53
    refs:
      - NIST-SP-800-160-3.2.4
recommended_evidence:
  - kind: boundary
    note: Test or fake-clock proof drives backward and forward wall-clock jumps and asserts timeout/SLA logic remains bounded or clamps invalid negative durations.
  - kind: review
    note: Review identifies whether values keep Go monotonic clock metadata or are serialized/deserialized as wall-clock instants before subtraction.
  - kind: scenario
    note: Scenario covers DST transition or NTP step while a retry, aggregation, or purge interval is active.
