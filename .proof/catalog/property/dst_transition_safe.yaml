id: dst_transition_safe
name: dst_transition_safe
category: property
status: active
summary: Elapsed-duration measurement shall be monotonic-clock safe; computing a duration by subtracting wall-clock instants shall not be relied upon, because DST transitions, manual clock adjustments, and NTP step events can make the result negative or jump by hours. Durations used as timing, SLA, or loop-guard values shall be derived from a monotonic source (or explicitly clamped at d < 0).
