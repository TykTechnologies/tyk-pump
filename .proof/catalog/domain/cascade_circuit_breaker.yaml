# Local class generated from signal go.multi_pump_fanout and reviewed for pump fanout failure containment.
# Source rule: go.multi-pump-fanout (pack signal-rules/tyk-pump-phase-n.yaml)
# Framework hints: CWE-1088, CWE-770, NIST-SP-800-53-SC-5

id: cascade_circuit_breaker
name: cascade_circuit_breaker
category: domain
status: active
summary: When one consumer in a peer-fanout repeatedly fails or saturates, downstream / sibling consumers shall be circuit-broken — the failure shall not propagate indefinitely.
description: A multi-consumer fanout shall define how repeated failure, panic, or saturation of one downstream consumer is isolated from its siblings. Requirements using this class shall name the trip condition, recovery/reset condition, and operator-visible breaker state for each consumer.
applies_when:
  description: code fans out to multiple peer consumers and any single consumer failure could affect throughput, latency, or correctness of the others
frameworks:
  - id: CWE
    refs:
      - CWE-1088
      - CWE-770
  - id: NIST-800-53
    refs:
      - NIST-SP-800-53-SC-5
recommended_evidence:
  - kind: boundary
    note: Test drives one consumer past the documented trip threshold while at least one sibling stays healthy, then asserts the failing consumer is skipped or degraded and the sibling continues to receive work.
  - kind: review
    note: Review maps failure counters, breaker state, reset behavior, and metrics/logs to the per-consumer key rather than a shared process-wide flag.
  - kind: scenario
    note: Scenario covers a failing consumer recovering after the reset interval and proves dispatch resumes only for that consumer without replaying unrelated sibling work.
