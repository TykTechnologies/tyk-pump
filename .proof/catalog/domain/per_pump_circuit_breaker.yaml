# Local class generated from signal go.fanout_goroutine_no_recover and reviewed for per-pump failure isolation.
# Source rule: go.fanout-goroutine-no-recover (pack signal-rules/tyk-pump-phase-n.yaml)
# Framework hints: CWE-1088, CWE-755, NIST-SP-800-53-SC-5

id: per_pump_circuit_breaker
name: per_pump_circuit_breaker
category: domain
status: active
summary: Each per-dependency consumer (one pump, one external sink) shall be wrapped in its own circuit breaker — repeated failure of one shall trip its breaker without affecting siblings; the breaker state shall be individually observable.
description: Pump fanout requirements shall specify the isolation policy for a repeatedly failing backend pump. The model must distinguish a pump-local breaker from global shutdown and must require an observable per-pump state so operators know which backend is isolated.
applies_when:
  description: code dispatches work to multiple per-dependency consumers (per-pump, per-sink, per-tenant) without a per-consumer failure-isolation mechanism
frameworks:
  - id: CWE
    refs:
      - CWE-1088
      - CWE-755
  - id: NIST-800-53
    refs:
      - NIST-SP-800-53-SC-5
recommended_evidence:
  - kind: boundary
    note: Test one pump returning repeated errors while a sibling succeeds, then assert only the failing pump reaches open/degraded state and sibling writes continue.
  - kind: review
    note: Review confirms breaker counters, state, reset timing, and diagnostics are keyed by pump name or backend instance.
  - kind: scenario
    note: Scenario covers breaker open and reset behavior across consecutive purge cycles.
