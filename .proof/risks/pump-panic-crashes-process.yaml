id: pump-panic-crashes-process
title: Pump goroutine panic crashes entire tyk-pump process (no recover)
description: Accept that main.go:435 execPumpWriting lacks defer recover(). A panicking pump goroutine takes down all sibling pumps and the purge loop.
affected_requirements:
    - SYS-REQ-004
    - SW-REQ-001
    - SW-REQ-075
mitigation: Run tyk-pump under a process supervisor (k8s, systemd) so a crash is auto-restarted; avoid panic-prone pump configurations.
customer_impact: A panic in any pump implementation causes a brief outage of all analytics persistence until process supervisor restarts the pod.
