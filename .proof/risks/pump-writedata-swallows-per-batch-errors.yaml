id: pump-writedata-swallows-per-batch-errors
title: Pump.WriteData per-batch error swallowing across 11 pumps
description: 'Mirror of KI pump-writedata-swallows-per-batch-errors: 11 pumps (mongo family, kinesis, sql, graylog, syslog, logzio, segment, influx, influx2) log per-batch errors but return nil from WriteData, breaking the INT-REQ-004 error-return contract. Accepting this risk because the workaround (operators tail pump logs) is in place; the refactor is tracked.'
affected_requirements:
    - INT-REQ-004
mitigation: Operators must inspect pump logs for per-batch errors; the WriteData return value is currently a weak signal.
customer_impact: Backend write failures may not propagate to caller; success counters can mislead.
