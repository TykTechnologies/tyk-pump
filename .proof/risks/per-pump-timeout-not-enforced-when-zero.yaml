id: per-pump-timeout-not-enforced-when-zero
title: Per-pump timeout=0 disables timeout enforcement entirely
description: Accept that SYS-REQ-005's per-pump timeout guarantee is conditional on operator-supplied non-zero timeout values. With timeout=0 (the implicit default), main.go:463 uses context.WithCancel (no deadline) and the goroutine can block forever.
affected_requirements:
    - SYS-REQ-005
mitigation: Set non-zero timeouts for every pump in production. Use the operator-runbook checklist for pump deployment.
customer_impact: Misconfigured operator deployments can have a single misbehaving backend stall the purge cycle for that pump indefinitely.
