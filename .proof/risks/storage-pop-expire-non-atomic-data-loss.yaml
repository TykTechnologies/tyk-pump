id: storage-pop-expire-non-atomic-data-loss
title: 'Redis Pop+Expire non-atomic: Expire failure silently loses popped records'
description: Accept the known race in storage/temporal_storage.go GetAndDeleteSet where a successful LPOP followed by a failing Expire returns (nil, err) and the popped records are silently lost. main.go:278 simply logs the error and continues, so the batch is dropped.
affected_requirements:
    - INT-REQ-005
mitigation: Operators see Purge Loop errors but lost batches require external buffering (e.g., gateway-side retention) to replay. Recommend monitoring 'Error on Purge Loop' log lines.
customer_impact: Under transient Redis failures, a single batch of analytics records may be lost. Frequency depends on Expire reliability under load.
