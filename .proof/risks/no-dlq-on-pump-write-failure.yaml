id: no-dlq-on-pump-write-failure
title: 'No dead-letter queue: pump write failures after successful Redis pop lose records'
description: 'Accept that tyk-pump provides at-most-once delivery: when all pump WriteData calls fail for a batch popped at main.go:278, records are dropped with only a log message (see PreprocessAnalyticsValues/writeToPumps in main.go:280-300).'
affected_requirements:
    - STK-REQ-002
mitigation: Configure multiple pumps so that at least one is highly available; treat CSV pump as a local spool of last resort.
customer_impact: Sustained backend outages can result in lost analytics records with no automatic replay.
