id: moesif-queueevent-error-swallowed
title: Moesif WriteData logs QueueEvent errors without surfacing write failure
description: pumps/moesif.go calls p.moesifAPI.QueueEvent(&event), logs any returned error, and continues before returning nil from WriteData. If the Moesif SDK rejects an event after the sampling gate passes, the record is not submitted but the caller still observes a successful write. This violates SW-REQ-052's sampled-record submission guarantee and the broader write-error propagation contract.
affected_requirements:
    - SW-REQ-052
evidence_manifests:
    - test:pumps/http_pumps_mcdc_100_test.go:TestMoesifPump_WriteData_QueueEventError_KI
    - .proof/evidence/ki-moesif-queueevent-error-swallowed.yaml
severity: medium
severity_basis: risk
risk: data_integrity
reproducer_command: go test -count=1 -run '^TestMoesifPump_WriteData_QueueEventError_KI$' ./pumps
environment_note: Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source and command output.
introduced_in: inception
mitigation: Monitor Moesif SDK queue health and process logs for "Error while writing" messages; replay source analytics from upstream storage when a Moesif outage is suspected.
remediation: Make MoesifPump.WriteData propagate QueueEvent errors to the caller, or record per-event failures in a retryable/dead-letter path with explicit partial-success reporting.
