id: graylog-moesif-logfatal-on-record-error
title: Superseded umbrella for Graylog and Moesif log.Fatal record/config errors
description: |-
    Superseded umbrella record. The active unfixed behaviors are now tracked by graylog-record-decode-logfatal, moesif-record-decode-logfatal, and moesif-config-read-error-logfatal. Defensive unreachable marshal/decode helper fatal arms are not carried as customer-impacting scope in the split records.
affected_requirements:
    - SYS-REQ-004
    - SW-REQ-049
    - SW-REQ-052
evidence_manifests:
    - code_signal:opengrep:go.deserializer.request-body-readall:pumps/moesif.go:117
    - code_signal:opengrep:go.log.fatal-in-init:pumps/moesif.go:121
    - .proof/evidence/ki-graylog-moesif-logfatal-on-record-error.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s ./pumps -run '^(TestGraylogPump_WriteData_BadBase64Request_Subprocess|TestGraylogPump_WriteData_BadBase64Response_Subprocess|TestMoesifPump_FatalOnBadBase64_KI)$'
environment_note: Evidence is tied to the listed evidence_manifests entries; reproduce by rerunning the named test or code-signal scan and inspecting code_signal:opengrep:go.deserializer.request-body-readall:pumps/moesif.go:117.
introduced_in: inception
mitigation: Pre-validate analytics records or filter out suspect orgs before they reach graylog/moesif. Ensure the Moesif sampling-config API endpoint returns parseable bodies (the response.Body in parseConfiguration is read via ioutil.ReadAll — in production this is over the network and can fail, even though in unit-test httptest fixtures the in-memory buffer never fails). Use a process supervisor to auto-restart after a crash.
remediation: Replace per-record log.Fatal calls in pumps/graylog.go and pumps/moesif.go with log.Error + 'continue' so the bad record is skipped, not fatal. For pumps/moesif.go:121 (parseConfiguration), replace log.Fatal with log.Error + return the previous sampling values so the next purge cycle re-attempts — the function already has a fallback return statement after the log.Fatal call.
owner: tyk-team
