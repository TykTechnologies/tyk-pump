id: graylog-moesif-logfatal-on-record-error
title: Graylog and Moesif pumps log.Fatal on per-record (and Moesif getConfig) decode errors
introduced_in: inception
description: 'pumps/graylog.go uses log.Fatal on per-record errors at lines 120, 126, 155, and 168. pumps/moesif.go uses log.Fatal at lines 349, 356, 379, and 386 for similar per-record decode/parse failures, plus line 121 in parseConfiguration (the getConfig sampling-rate fetch surface — Wave 3a AST scanner finding) where a malformed Moesif API response body crashes the host process. A single malformed record (or one bad sampling-config response) crashes the entire tyk-pump process via log.Fatal, taking down every other pump and the purge loop. Violates SYS-REQ-004''s independent-failures requirement because one record''s (or one transient API response''s) parsing issue is fatal to all pumps.'
affected_requirements:
    - SYS-REQ-004
    - SW-REQ-049
    - SW-REQ-052
evidence_manifests:
    - code_signal:opengrep:go.deserializer.request-body-readall:pumps/moesif.go:117
    - code_signal:opengrep:go.log.fatal-in-init:pumps/moesif.go:121
environment_note: |-
  Evidence is tied to the listed evidence_manifests entries; reproduce by rerunning the named test or code-signal scan and inspecting code_signal:opengrep:go.deserializer.request-body-readall:pumps/moesif.go:117.
reproducer_command: rg -n "p\.log\.Fatal\(err\)|Fatal\\(\"Couldn't parse configuration" pumps/graylog.go pumps/moesif.go
severity: medium
mitigation: Pre-validate analytics records or filter out suspect orgs before they reach graylog/moesif. Ensure the Moesif sampling-config API endpoint returns parseable bodies (the response.Body in parseConfiguration is read via ioutil.ReadAll — in production this is over the network and can fail, even though in unit-test httptest fixtures the in-memory buffer never fails). Use a process supervisor to auto-restart after a crash.
remediation: Replace per-record log.Fatal calls in pumps/graylog.go and pumps/moesif.go with log.Error + 'continue' so the bad record is skipped, not fatal. For pumps/moesif.go:121 (parseConfiguration), replace log.Fatal with log.Error + return the previous sampling values so the next purge cycle re-attempts — the function already has a fallback return statement after the log.Fatal call.
owner: tyk-team
release_disposition: ship_with_known_issue
status: open
