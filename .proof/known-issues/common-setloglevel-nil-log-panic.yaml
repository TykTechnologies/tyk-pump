id: common-setloglevel-nil-log-panic
title: CommonPumpConfig.SetLogLevel panics if called before Init
description: pumps/common.go:80-82 'func (p *CommonPumpConfig) SetLogLevel(level logrus.Level) { p.log.Level = level }'. p.log is set inside each pump's Init (typically 'p.log = log.WithField(...)'). If the pump-loader calls SetLogLevel BEFORE Init (e.g. propagating a global log level early during setup), p.log is nil and the assignment panics with nil-pointer-deref. SW-REQ-016's 'field_persisted_on_struct' FRETish verifies the setter writes the value; the focused KI tripwire now documents the missing precondition by exercising the zero-value panic path.
affected_requirements:
    - SW-REQ-016
evidence_manifests:
    - .proof/evidence/ki-common-setloglevel-nil-log-panic.yaml
severity: low
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run TestCommonPumpConfig_SetLogLevelBeforeInitPanics_KI ./pumps
environment_note: Run the focused pumps tripwire; it calls CommonPumpConfig.SetLogLevel on a zero-value config before Init initializes p.log and expects the current panic.
introduced_in: inception
mitigation: Current pump-loader order always calls Init before SetLogLevel (initialise.go orchestrates this). The panic is dormant unless a future loader change re-orders these calls.
remediation: Guard with 'if p.log != nil { p.log.Level = level }' OR lazy-init log to a package-level default at struct construction.
