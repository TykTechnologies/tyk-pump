id: main-startup-logfatal-on-transient-backend
title: main.go startup uses log.Fatal/Fatalf on operator-recoverable conditions
description: 'main.go startup helpers (setupAnalyticsStore, storeVersion, initialisePumps, setLogLevel) call log.Fatal/Fatalf on a mix of fail-fast-at-boot and transient-backend conditions, killing the entire tyk-pump process instead of returning an error the operator (or a supervisor) can act on without restart. Confirmed sites: main.go:111 (invalid log level config), main.go:130 (analytics storage NewTemporalStorageHandler error — redis unreachable counts), main.go:136 (analytics storage Init error — redis unreachable counts), main.go:148 (uptime storage NewTemporalStorageHandler error), main.go:155 (uptime storage Init error — redis unreachable counts), main.go:161 (invalid analytics_storage_type config), main.go:173 (version storage NewTemporalStorageHandler error), main.go:180 (version storage Init error), main.go:230 (no pumps successfully configured). Some of these are genuinely fail-fast (invalid log level, invalid storage type, zero pumps) — for those log.Fatal is defensible. The transient-backend cases (Redis NewTemporalStorageHandler/Init errors at 130, 136, 148, 155, 173, 180) are the real defect: a temporarily unreachable Redis crashes the process at boot, forcing container/orchestrator restart loops with the associated latency penalty. The transient sites should return wrapped errors and let main() compose a retry-with-backoff (the pattern is already used in the purge loop). Distinct from pumps-logfatal-on-config-decode (which covers pump Init log.Fatal in pumps/*.go) and from logfatal-on-statsd-setup (instrumentation_helpers.go:38).'
affected_requirements:
    - SYS-REQ-004
    - SW-REQ-002
    - SW-REQ-016
evidence_manifests:
    - test:pumps/cascade_circuit_breaker_test.go
    - test:pumps/fanout_panic_isolated_test.go
verifying_test: ast-scanner in Wave 3a reproducer (process_exit_on_recoverable obligation)
severity: medium
mitigation: Operators must ensure Redis (analytics_storage), pump backends, and version-check storage are all reachable before starting tyk-pump. Container/orchestrator restart loops mitigate transient unavailability but increase startup latency and produce noisy crash-loop alerts. Pin configs and validate analytics_storage_type + log_level config strings in CI.
remediation: 'Refactor startup helpers to return errors rather than log.Fatal. Specifically replace log.Fatal at main.go:130, 136, 148, 155, 173, 180 (the transient-backend sites) with wrapped error returns; have main() retry with backoff (same pattern as the purge loop). Sites at main.go:111 (invalid log level), main.go:161 (invalid analytics_storage_type), and main.go:230 (zero pumps configured) are genuine fail-fast cases and may keep log.Fatal, though replacing with a structured exit code + log.Error message is preferred so supervisors can distinguish config errors from transient errors. Pairs with pumps-logfatal-on-config-decode (pump Init) and logfatal-on-statsd-setup (instrumentation).'
