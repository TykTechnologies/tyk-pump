id: sql-aggregate-upsert-order-undocumented
title: SQL aggregate upsert ordering obligation remains proof-tracked documentation debt
description: SW-REQ-067 carries ordering_guarantees_documented for the SQL aggregate upsert path. DoAggregatedWriting iterates dimensions derived from Go maps and then batches whatever slice order results; correctness is keyed by deterministic row id plus INSERT ... ON CONFLICT semantics, not by write order. SW-REQ-067 now explicitly documents that row order is unspecified and irrelevant, so the remaining debt is proof-model/obligation attribution debt until the documentation-only ordering obligation can be satisfied without overclaiming runtime ordering evidence.
