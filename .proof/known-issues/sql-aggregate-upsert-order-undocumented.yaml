risk: compliance
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored rg -n 'func \(.*\) Dimensions|DoAggregatedWriting|OnConflict|ordering_guarantees_documented' analytics/aggregate.go pumps/sql_aggregate.go docs/requirements/SW-REQ-067.md specs/software/requirements/SW-REQ-067.req.yaml
environment_note: Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source, requirement text, and command output.
introduced_in: inception
mitigation: Consumers should rely on the aggregate row key and ON CONFLICT merge semantics, not insertion order; SW-REQ-067 now states this explicitly.
remediation: Retire or reclassify the ordering_guarantees_documented obligation for this path as documentation evidence once proof can represent documentation-only satisfaction without requiring a runtime ordering witness.
