id: sql-background-index-concurrency-unbounded
title: SQL background index creation uses goroutines and channel signaling without an explicit lifecycle contract
description: 'pumps/sql.go:498-513 starts background index-creation goroutines and signals completion on c.backgroundIndexCreated. A guarded pumps proof run reproduced a panic in TestEnsureIndexSQL/index_created_correctly,_background: one goroutine called SQLPump.createIndex and Gorm panicked in Statement.WriteByte while building Exec SQL from the shared DB statement. The requirement does not specify the goroutine lifecycle, channel ownership, cancellation, or concurrent WriteData behavior for this background path. Until the lifecycle is specified and the shared-statement concurrency is remediated, the background index obligation for SW-REQ-040 is tracked debt.'
affected_requirements:
    - SW-REQ-040
evidence_manifests:
    - .proof/evidence/ki-sql-background-index-concurrency-unbounded.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestSQLPumpEnsureIndexBackgroundFailureIsNotSurfaced_KI$' ./pumps
environment_note: Reproducer uses an in-memory SQLite child process while forcing the Postgres background-index branch. It demonstrates the background lifecycle/error-surfacing gap deterministically and also accepts the stronger historical panic reproduction if the child panics in SQLPump background index creation.
introduced_in: inception
mitigation: Avoid background SQL index creation on live startup paths when a foreground migration/index step can be used, and monitor startup logs for background index failures.
remediation: Specify the background index lifecycle, avoid sharing mutable Gorm statements across index goroutines, make cancellation and channel ownership explicit, and add a concurrency/race witness for the background path.
