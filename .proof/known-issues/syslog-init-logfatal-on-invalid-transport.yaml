id: syslog-init-logfatal-on-invalid-transport
title: Syslog initConfigs log.Fatal exits the process on invalid transport
description: pumps/syslog.go initConfigs calls s.log.Fatal when the configured transport is not udp, tcp, or tls. A single invalid syslog transport value in pump configuration therefore exits the whole tyk-pump process instead of returning a configuration error for the syslog pump.
affected_requirements:
    - SYS-REQ-004
    - SW-REQ-050
evidence_manifests:
    - test:pumps/udp_file_pumps_mcdc_100_test.go:TestSyslogPump_initConfigs_InvalidTransport_InProcess
    - .proof/evidence/ki-syslog-init-logfatal-on-invalid-transport.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestSyslogPump_initConfigs_InvalidTransport_InProcess$' ./pumps
environment_note: Run the focused Syslog invalid-transport tripwire under the monitor. The accepted ship disposition is a process-exit risk for malformed syslog configuration, mitigated operationally by pre-deployment config validation and a supervisor restart.
introduced_in: inception
mitigation: Validate syslog transport settings before deployment and rely on a process supervisor to restart tyk-pump after fatal exits.
remediation: Return an invalid-transport error from syslog initialisation instead of calling log.Fatal, so the pump host can skip or report the failing syslog pump without exiting.
