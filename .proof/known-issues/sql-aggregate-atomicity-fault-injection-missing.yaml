id: sql-aggregate-atomicity-fault-injection-missing
title: SQL aggregate upsert atomicity obligation lacks a transaction/failure harness
description: SW-REQ-067 uses a single GORM Create call with clause.OnConflict to express an INSERT ... ON CONFLICT DO UPDATE upsert. Existing tests prove sequential accumulation, but they do not inject database transaction failures, serialization failures, or concurrent writers to prove the typed atomicity obligation. The missing evidence is a proof-harness gap; it should not be replaced by a broad comment that merely says ON CONFLICT exists.
affected_requirements:
    - SW-REQ-067
severity: low
severity_basis: risk
risk: data_integrity
reproducer_command: rg -n "DoAggregatedWriting|OnConflict|Create\\(|atomicity|transaction|failure" pumps/sql_aggregate.go pumps/sql_aggregate_test.go docs/requirements/SW-REQ-067.md
environment_note: Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source and command output.
introduced_in: inception
mitigation: Rely on database single-statement upsert semantics and existing sequential accumulation tests until a transaction/failure harness exists.
remediation: Add a fake driver or database-backed test that injects serialization/deadlock/transaction errors around the upsert and proves retry/reporting semantics.
owner: tyk-team
release_disposition: ship_with_known_issue
status: open
