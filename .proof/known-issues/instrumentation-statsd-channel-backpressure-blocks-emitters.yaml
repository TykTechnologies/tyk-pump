id: instrumentation-statsd-channel-backpressure-blocks-emitters
title: Instrumentation StatsD sink can block emitters when its command channel is full
description: |
    instrumentation_statsd_sink.go creates cmdChan with a fixed buffer of 8192
    commands. EmitTiming, Incr, Gauge, and other emit paths send to that channel
    synchronously. If the sink worker is slow, stopped, or unable to drain fast
    enough, callers can block on metrics emission even though the instrumentation
    contract says sink failures must not affect the purge loop.
affected_requirements:
    - SW-REQ-005
    - SYS-REQ-017
commands:
    - rg -n "cmdChan|EmitTiming|Incr|Gauge|make\\(chan" instrumentation_statsd_sink.go
evidence_manifests:
    - code_signal:manual:metrics.channel-backpressure:instrumentation_statsd_sink.go:107
    - code_signal:manual:metrics.channel-backpressure:instrumentation_statsd_sink.go:151
    - .proof/evidence/ki-instrumentation-statsd-channel-backpressure-blocks-emitters.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored rg -n 'cmdChan|EmitTiming|Incr|Gauge|make\(chan' instrumentation_statsd_sink.go
environment_note: Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source and command output.
introduced_in: inception
mitigation: Operators can disable instrumentation or ensure the configured StatsD endpoint is local and healthy to keep the sink worker draining.
remediation: Make metrics emission non-blocking with an explicit drop/count policy, or bound caller wait time and expose dropped-metric counters.
