id: retry-backoff-duration-not-deadline-bounded
title: HTTP retry strategy has bounded attempts but no declared elapsed-time budget
description: retry/http-retry.go:96-98 uses backoff.WithMaxRetries(backoff.NewExponentialBackOff(), s.maxRetries). This proves retry attempts are bounded by count. It does not prove a customer-visible defect by itself because SW-REQ-030 does not currently declare a maximum elapsed retry duration or deadline semantics for the exponential schedule. This record tracks accepted proof/product-spec debt for the retry_budget_bounded obligation until elapsed retry budget semantics are explicit and tested.
affected_requirements:
    - SW-REQ-030
evidence_manifests:
    - .proof/evidence/ki-retry-backoff-duration-not-deadline-bounded.yaml
severity: low
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored rg -n 'WithMaxRetries|NewExponentialBackOff|maxRetries' retry/http-retry.go
environment_note: Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source or rerunning the exponential-backoff code-signal scan. The accepted debt is missing elapsed-time policy, not an observed retry loop escaping maxRetries.
introduced_in: inception
mitigation: Configure retry counts conservatively and rely on the max retry count to avoid unbounded repeated attempts while elapsed-time policy remains unspecified.
remediation: Decide whether the product contract requires a maximum elapsed retry duration. If yes, specify the bound in SW-REQ-030, wire it into the retry strategy, and add tests for both attempt and elapsed-time exhaustion. If no, narrow the obligation so count-bounded retry is the explicit contract.
