id: retry-backoff-duration-not-deadline-bounded
title: HTTP retry strategy has bounded attempts but no explicit elapsed-time deadline
description: retry/http-retry.go:96-98 uses backoff.WithMaxRetries(backoff.NewExponentialBackOff(), s.maxRetries). The retry count is bounded, but the requirement does not specify or test the maximum elapsed retry duration from the exponential schedule. The retry_budget_bounded obligation is tracked debt until elapsed retry budget semantics are explicit.
affected_requirements:
    - SW-REQ-030
evidence_manifests:
    - .proof/evidence/ki-retry-backoff-duration-not-deadline-bounded.yaml
severity: low
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored rg -n 'WithMaxRetries|NewExponentialBackOff|maxRetries' retry/http-retry.go
environment_note: Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source or rerunning the exponential-backoff code-signal scan.
introduced_in: inception
mitigation: Configure retry counts conservatively and rely on the max retry count to avoid unbounded repeated attempts.
remediation: Specify a maximum elapsed retry duration, wire it into the retry strategy, and add tests for both attempt and elapsed-time exhaustion.
