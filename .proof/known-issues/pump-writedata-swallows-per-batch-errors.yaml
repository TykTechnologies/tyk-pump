    - .proof/evidence/ki-pump-writedata-swallows-per-batch-errors.yaml
severity: high
severity_basis: risk
risk: data_integrity
cve_surface: possible
affected_api: Pump.WriteData implementations and main.execPumpWriting success/error accounting
attacker_input: backend write failure, malformed batch member, or downstream service partial failure crossing the pump backend trust boundary
sanitizer: manual:contract-audit+table-driven-static-tripwire
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestSQLPumpWriteDataSwallowsBatchError_KI$' ./pumps
environment_note: Table-driven static source tripwire only; no Mongo, AWS, Graylog, Syslog, Logzio, Segment, Influx, external service, or container is required. MongoAggregate is intentionally excluded because current WriteData returns DoAggregatedWriting errors.
introduced_in: inception
minimization_status: candidate
mitigation: Operators must inspect pump logs for per-batch errors; the WriteData return value is currently a weak signal.
remediation: Refactor each named pump's WriteData to wrap per-batch errors into a multierr or surface the last error; update tests + KI status to fixed.
