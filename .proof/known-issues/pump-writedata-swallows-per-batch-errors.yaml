id: pump-writedata-swallows-per-batch-errors
title: Multiple pumps do not surface WriteData backend errors to the caller
description: 'INT-REQ-004 contracts that Pump.WriteData returns an error on backend failure. Several registered pumps still fail to surface backend/write failures: MongoSelective logs ensureIndexes/Insert errors then returns nil; Kinesis logs API-level PutRecords errors then returns nil (per-record failures are tracked separately by kinesis-putrecords-per-record-failures-return-nil); SQL logs Create-batch errors then returns nil; Graylog uses a client Log call with no error channel and returns nil; Syslog explicitly discards fmt.Fprintf errors; Logzio ignores sender.Send errors; Segment ignores WriteDataRecord errors and WriteDataRecord logs Track errors then returns nil; Influx v1 ignores c.Write errors; Influx v2 writes asynchronously and never drains WriteAPI.Errors before returning nil. Standard Mongo is excluded because SW-REQ-034 proves the first insert error is returned. MongoAggregate is excluded because current WriteData returns DoAggregatedWriting errors. Affects the caller (main.execPumpWriting) which interprets nil as success and increments success counters.'
