id: graph-sql-aggregate-atomicity-fault-injection-missing
title: Graph SQL aggregate transaction isolation harness remains incomplete
description: SW-REQ-043 uses a single GORM Create call with clause.OnConflict to express an INSERT ... ON CONFLICT DO UPDATE upsert for Graph SQL aggregate rows. TestGraphSQLAggregateDoAggregatedWritingReturnsCreateErrorWithoutRows_KI now injects a Create/tx.Error failure and proves caller-visible error propagation with no committed rows, so the forced backend-error portion is witnessed. The remaining proof-harness gap is concurrent writer and serialization/deadlock behavior; existing tests still do not inject database transaction isolation failures or concurrent upsert interleavings for Graph SQL aggregate counters.
affected_requirements:
    - SW-REQ-043
evidence_manifests:
    - test:pumps/graph_sql_aggregate_test.go:TestGraphSQLAggregateDoAggregatedWritingReturnsCreateErrorWithoutRows_KI
    - test:pumps/graph_sql_aggregate_test.go:TestGraphSQLAggregateTransactionIsolationHarnessMissing_KI
    - .proof/evidence/ki-graph-sql-aggregate-atomicity-fault-injection-missing.yaml
severity: low
severity_basis: risk
risk: data_integrity
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^(TestGraphSQLAggregateDoAggregatedWritingReturnsCreateErrorWithoutRows_KI|TestGraphSQLAggregateTransactionIsolationHarnessMissing_KI)$' ./pumps
environment_note: SQLite in-memory test plus static source tripwire only; no Postgres, external database, or container is required. The create-error witness covers forced Create/tx.Error propagation and no-row atomicity; the static tripwire pins the remaining missing explicit transaction/isolation declaration.
introduced_in: inception
mitigation: Rely on database single-statement upsert semantics, the forced Create/tx.Error tripwire, and existing successful Graph SQL aggregate write/API-partition tests until concurrent writer and serialization/deadlock harnesses exist.
remediation: Add a database-backed transaction-isolation test that injects concurrent writers and serialization/deadlock failures around the Graph SQL aggregate upsert and proves the declared retry/reporting semantics.
