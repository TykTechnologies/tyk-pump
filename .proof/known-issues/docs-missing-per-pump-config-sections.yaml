mitigation: Code comments in each pump source file enumerate the config keys; per-pump *_test.go files show example configs.
remediation: Add per-pump configuration sections in tyk-docs/content/shared/pump-config.md for all 11 missing pump types. Highest priority for the four MCP variants (entire feature surface invisible).
