severity: low
mitigation: Local proof runs treat pump packages as out-of-scope for tests_pass / code MC/DC; CI (bin/ci-test.sh) runs all packages against provisioned backends.
remediation: Stand up the full backend matrix in a docker-compose for local proof runs, or split pump tests into hermetic unit subsets that can be MC/DC-measured without external services.
