id: pump-package-tests-skipped-locally
title: pumps package excluded from local tests_pass / code MC/DC (needs external backends)
description: 'The pumps package is excluded from tests_pass and code_mcdc targets in proof.yaml (project.commands.test lists only ./analytics ./analytics/demo ./serializer ./storage ./logger .; code_mcdc.targets enumerate analytics, serializer, retry, logger, server, root) because most pump implementations require external services not available locally: Kafka, Elasticsearch, Influx, Moesif, Segment, Logz.io, Splunk, AWS SQS/Kinesis/Timestream. The mongo pump tests additionally hit known-issue mongo-test-panic-under-mongo6. Locally only the analytics, serializer, retry, logger, server, and root packages are MC/DC-measured. This is a scoping decision, not a code defect; the pump tests still exist and run against their actual backends in proper CI (see bin/ci-test.sh which iterates ''go list github.com/TykTechnologies/tyk-pump/...'' and runs each package against provisioned backends). Workaround: run pump tests in environments with the appropriate backends provisioned.'
