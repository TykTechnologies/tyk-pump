environment_note: |-
  Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source or documentation surface and following the described scenario.
severity: low
mitigation: Local proof runs keep pump packages in scope but must run with serialized Go package execution and the memory monitor; CI (bin/ci-test.sh) runs all packages against provisioned backends.
remediation: Stand up the full backend matrix in docker-compose with shared/reused testcontainers for local proof runs, or split pump tests into hermetic unit subsets that can be MC/DC-measured without external services while keeping the full backend suite in CI.
