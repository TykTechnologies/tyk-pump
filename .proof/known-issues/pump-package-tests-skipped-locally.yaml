id: pump-package-tests-skipped-locally
title: pumps package local proof runs need external backends and strict memory guarding
introduced_in: inception
description: 'The pumps package is included in proof.yaml tests_pass and code_mcdc targets via ./..., but local proof runs are high-risk without external backend discipline: many pump implementations require Kafka, Elasticsearch, Influx, Moesif, Segment, Logz.io, Splunk, AWS SQS/Kinesis/Timestream, and several tests use testcontainers. Running those packages concurrently can exhaust a developer laptop. The current proof configuration keeps the tests in scope and constrains Go package concurrency with -p=1; local operators must still run proof under bin/run-monitored so the process tree is terminated before OOM. CI remains the authoritative environment for backend-provisioned pump test coverage (see bin/ci-test.sh, which iterates go list github.com/TykTechnologies/tyk-pump/... against provisioned backends).'
