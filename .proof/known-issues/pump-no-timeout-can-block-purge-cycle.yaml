id: pump-no-timeout-can-block-purge-cycle
title: Pump with timeout=0 can block purge cycle indefinitely
description: main.go:443 ('if pmp.GetTimeout() == 0') only logs a warning when a pump's configured timeout is zero. The time.AfterFunc at main.go:442 is a warning timer, not an enforcement timer. main.go:469 explicitly uses context.WithCancel (no deadline) when timeout is 0, so a pump with the default timeout=0 can block its purge-cycle goroutine forever. SYS-REQ-005's per-pump-timeout claim is therefore operator-conditional rather than unconditionally enforced.
