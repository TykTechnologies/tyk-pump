severity: medium
severity_basis: risk
risk: availability
reproducer_command: go test -count=1 -timeout=180s -run '^TestExecPumpWritingTimeoutWarningBranches$' .
environment_note: Evidence is tied to the listed evidence_manifests entries; reproduce by rerunning the named test and inspecting the zero-timeout branch at main.go:443 and context.WithCancel path at main.go:469. The older Elasticsearch client-timeout signal remains adjacent pump timeout debt, but is not the primary timeout=0 reproducer.
introduced_in: inception
mitigation: Operators must explicitly set a non-zero 'timeout' value per pump in production YAML. Audit pump configs for missing or zero timeout values.
remediation: Enforce a non-zero default timeout (e.g. equal to purge_delay) when pump configuration omits the field, or fail Init when timeout=0 is set.
