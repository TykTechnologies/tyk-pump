id: systemconfig-omitdetailedrecording-unused
title: Global omit_detailed_recording config field is dead; only per-pump value is honored
description: 'config.go:84 declares ''SystemConfig.OmitDetailedRecording bool'', but the actual filterData logic in main.go:389/400 only checks pump.GetOmitDetailedRecording() — i.e., the per-pump value set at main.go:210 from PumpConfig.OmitDetailedRecording (config.go:247). The global value passed to StartPurgeLoop at main.go:542 is never propagated to per-pump defaults. This is a configuration-surface/product-behavior mismatch: SYS-REQ-015 is intentionally per-backend, but the top-level field makes operators expect a global privacy default that is silently ignored.'
affected_requirements:
    - SYS-REQ-015
evidence_manifests:
    - test:main_test.go:TestGlobalOmitDetailedRecordingIsNotAppliedToPump_KI
    - .proof/evidence/ki-systemconfig-omitdetailedrecording-unused.yaml
severity: low
severity_basis: risk
risk: correctness
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestGlobalOmitDetailedRecordingIsNotAppliedToPump_KI$' .
environment_note: Run the focused global-only omit tripwire; it sets SystemConfig.OmitDetailedRecording=true, leaves the per-pump flag false, and observes raw_request/raw_response still survive filterData.
introduced_in: inception
mitigation: 'Set omit_detailed_recording: true on each pump''s meta block explicitly; do not rely on the top-level config.'
remediation: Either (a) propagate SystemConfig.OmitDetailedRecording to every pump as the default when the per-pump value is unset, or (b) remove the dead config field and document per-pump only.
