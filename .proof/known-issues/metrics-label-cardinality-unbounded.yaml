id: metrics-label-cardinality-unbounded
title: Metrics pumps allow unbounded label and tag cardinality from request data
description: |
    StatsD allows operator-configured tags to be populated from arbitrary
    analytics fields, including high-cardinality values such as api_key,
    time_stamp, or raw request fields. DogStatsD default/request tags include
    path and may include oauth_id. Prometheus exposes labels including path,
    api_key, and key, and stores aggregate metrics keyed by joined label values.
    TT-9873's default Prometheus path collapse is covered by SW-REQ-078, and
    its explicit opt-in preservation branches are covered by SW-REQ-079, but a
    large stream of intentionally tracked paths, keys, or configured tag values
    can still grow downstream metric cardinality and the Prometheus in-process
    aggregate map without an explicit budget.
affected_requirements:
    - SW-REQ-023
    - SW-REQ-024
commands:
    - rg -n "Tags|GetLabelsValues|metricData|api_key|path|oauth_id" pumps/statsd.go pumps/dogstatsd.go pumps/prometheus.go
evidence_manifests:
    - code_signal:manual:metrics.label-cardinality:pumps/statsd.go:140
    - code_signal:manual:metrics.label-cardinality:pumps/dogstatsd.go:206
    - code_signal:manual:metrics.label-cardinality:pumps/prometheus.go:438
    - code_signal:manual:metrics.label-cardinality:pumps/prometheus.go:500
    - .proof/evidence/ki-metrics-label-cardinality-unbounded.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored rg -n 'Tags|GetLabelsValues|metricData|api_key|path|oauth_id' pumps/statsd.go pumps/dogstatsd.go pumps/prometheus.go
environment_note: Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source and command output.
introduced_in: inception
mitigation: Operators should avoid high-cardinality tags and Prometheus labels such as path, key, api_key, oauth_id, or raw request-derived fields unless their value set is externally bounded.
remediation: Add an explicit allowlist/denylist and cardinality budget for metric labels/tags, hash or bucket high-cardinality dimensions, and document which labels are safe for production scraping.
