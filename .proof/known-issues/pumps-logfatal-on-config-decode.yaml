id: pumps-logfatal-on-config-decode
title: Pump Init log.Fatals on mapstructure.Decode error, crashing tyk-pump
introduced_in: inception
description: 'pumps/statsd.go:62, pumps/syslog.go:82, pumps/graylog.go:76, pumps/prometheus.go:193, pumps/csv.go:57, pumps/stdout.go:65, pumps/kafka.go:103, pumps/elasticsearch.go:364 all use s.log.Fatal("Failed to decode configuration: ", err) inside Init when mapstructure.Decode returns an error. log.Fatal calls os.Exit(1), which kills the entire tyk-pump process instead of disabling the offending pump and letting siblings continue. SYS-REQ-004 (per-backend failure independence) is violated: a single misconfigured pump entry in pump_conf prevents the rest of the pump fleet from starting. Contrast with pumps/dogstatsd.go which returns a wrapped error from Init — that is the desired contract.'
