id: mcdc-pumps-audit-vs-standalone-discrepancy
title: 'pumps MC/DC: audit-driven measurement reports ~60% vs standalone 99.6%'
introduced_in: inception
description: Standalone 'proof mcdc code measure ./pumps -- -timeout=20m' reports 561/563 fully-covered decisions (99.6% decisions / 99.5% conditions) with only 2 remaining incomplete decisions (switch-case decisions in kinesis.go that the Go MC/DC instrumenter does not currently support //mcdc:ignore for). However, 'proof audit' re-runs the pumps suite in its own instrumented workspace (a copied module directory), where the testcontainer-backed tests (mongo/mysql/postgres/kafka/elasticsearch) hit race conditions that do not occur in the standalone run — many decisions therefore never have both T and F arms exercised, and audit reports ~60% decisions / 61% conditions. The 99.6% standalone figure is the correct measurement of the pumps test suite's true MC/DC coverage; the ~60% audit figure is a measurement artifact of the audit's instrumented-workspace test execution environment.
affected_requirements:
    - SW-REQ-034
commands:
    - proof mcdc code measure ./pumps -- -timeout=20m
reproducer_command: |-
  proof mcdc code measure ./pumps -- -timeout=20m
severity: low
mitigation: Trust the standalone 'proof mcdc code measure ./pumps' measurement (99.6%/99.5%) as the ground truth. CI should publish both the standalone .proof/mcdc/go/adhoc/latest.json artifact (99.6%) and the audit-driven measurement (~60%) so the discrepancy is visible. The standalone artifact is regenerated by 'proof mcdc code measure ./pumps -- -timeout=20m' and is checked into .proof/mcdc/go/adhoc/.
remediation: 'Two options: (a) fix the testcontainer race in the audit''s instrumented workspace so the pumps suite passes deterministically when run from a copied module dir; (b) teach ''proof audit'' to consume the standalone .proof/mcdc/go/adhoc/latest.json artifact for any code_mcdc target that has a fresh standalone run, instead of re-instrumenting from scratch.'
