id: kafka-writedata-marshal-err-structurally-unreachable
title: Kafka WriteData json.Marshal err branch is structurally unreachable
introduced_in: inception
description: pumps/kafka.go:231 guards jsonError from json.Marshal(message) where message is map[string]interface{} composed exclusively of safely-marshalable values (strings, ints, time.Time, []string, map[string]string from MetaData merge). json.Marshal of these basic Go types cannot fail — Encoder errors fire only on unsupported types (chan/func/complex) or cyclic references, none of which are reachable from AnalyticsRecord fields or KafkaConf.MetaData. The branch is dead code from an MC/DC perspective; tests cannot drive the err side without a structural rewrite of the message map.
affected_requirements:
    - SW-REQ-021
environment_note: |-
  Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source or documentation surface and following the described scenario.
severity: low
mitigation: None required — the guard is harmless plumbing.
remediation: Either remove the unreachable err handling (json.Marshal of map[string]interface{} with basic types never fails) or refactor to a helper that can return a typed error and is unit-testable. Until then the line carries //mcdc:ignore.
