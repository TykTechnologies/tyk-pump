id: sql-batch-size-zero-infinite-loop
title: SQL-family batch loops can stall forever when BatchSize is zero or negative
description: >-
    The SQL, Graph SQL, MCP SQL, SQL aggregate, Graph SQL aggregate, and MCP SQL aggregate write paths iterate batches with loops of the form for i := 0; i < len(recs); i += BatchSize. Current Init paths default BatchSize only when it is exactly zero; they do not reject or clamp negative values, and the write loops still depend on BatchSize as the stride. The active gap is non-positive validation across the SQL family: zero is defaulted on normal Init paths, while negative configuration or direct test wiring can make slicing boundaries invalid. The input_size_bounded and malformed_input obligations for these paths remain tracked debt until BatchSize is validated as positive before every batch loop.
