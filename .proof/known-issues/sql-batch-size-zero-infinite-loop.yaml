severity: high
severity_basis: risk
risk: availability
cve_surface: possible
affected_api: SQL-family pump batch writer loops
attacker_input: operator BatchSize configuration at zero or negative value; non_attacker_trigger for normal deployments
sanitizer: manual:static-loop-stride-audit
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestSQLFamilyBatchSizeNonPositive_KI$' ./pumps
environment_note: >-
    Run the focused static tripwire; it scans the six SQL-family source files and proves the current source shape defaults only BatchSize == 0 while batch loops still advance by BatchSize without <= 0 or < 1 validation.
introduced_in: inception
minimization_status: candidate
mitigation: Operators should configure positive SQL batch sizes and avoid zero or negative batch settings; use default initialization paths that set a positive batch size.
remediation: >-
    Validate BatchSize during Init for every SQL-family pump and defensively clamp or reject non-positive values before entering the batching loops; then split/retire the stale zero-only portion of this record once the title and evidence are narrowed.
