risk: availability
reproducer_command: rg -n "for i := 0; i < len\\(recs\\); i \\+= .*BatchSize|for i := 0; i < len\\(typedData\\); i \\+= .*BatchSize" pumps/sql.go pumps/sql_aggregate.go pumps/graph_sql.go pumps/graph_sql_aggregate.go pumps/mcp_sql.go pumps/mcp_sql_aggregate.go
environment_note: Static evidence is documented in this KnownIssue description; reproduce by inspecting the loop-stride code-signal hits in the listed pump files.
introduced_in: inception
mitigation: Operators should configure positive SQL batch sizes and avoid zero or negative batch settings; use default initialization paths that set a positive batch size.
remediation: Validate BatchSize during Init for every SQL-family pump and defensively clamp or reject non-positive values before entering the batching loops.
