id: hybrid-getdialfn-leaks-conn-on-handshake-fail
title: Hybrid getDialFn leaks conn if proto2 handshake write fails partway
description: 'pumps/hybrid.go:259-263 (getDialFn returned closure): after dialer.Dial or tls.DialWithDialer succeeds and returns ''conn'', the function loops ''for _, data := range initWrite { if _, err := conn.Write(data); err != nil { return nil, err } }''. The early-return on Write failure does NOT close ''conn''. The fd/socket is leaked, and over many failed dial attempts (e.g. during MDCB outage) the leak accumulates. SW-REQ-029''s TLS-attach claim does not name resource discipline so the audit does not flag this.'
affected_requirements:
    - SW-REQ-029
severity: low
severity_basis: risk
risk: availability
reproducer_command: rg -n "conn\.Write\(data\)|return nil, err" pumps/hybrid.go
environment_note: Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source or documentation surface and following the described scenario.
introduced_in: inception
mitigation: Production MDCB outages typically resolve within retry backoff; the leak is bounded by gorpc's reconnection cap. Operators monitoring fd count on tyk-pump should set ulimits.
remediation: Add 'defer func() { if err != nil { conn.Close() } }()' immediately after the dial succeeds, so any subsequent Write failure releases the socket.
owner: tyk-team
release_disposition: ship_with_known_issue
status: open
