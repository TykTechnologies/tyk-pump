id: kafka-writedata-full-batch-allocation-unbounded
title: Kafka WriteData allocates one kafka.Message per input record before backend write
description: |
    KafkaPump.WriteData builds a slice of kafka.Message values for the whole
    input batch before calling Writer.WriteMessages. The code appends one
    encoded message per analytics record without a Kafka-specific batch memory
    budget. Very large input batches can therefore pressure heap memory before
    the backend write starts, even when the eventual broker call is bounded by
    context.
affected_requirements:
    - SW-REQ-021
commands:
    - rg -n "make\\(\\[\\]kafka\\.Message|append\\(messages|WriteMessages" pumps/kafka.go
evidence_manifests:
    - code_signal:manual:kafka.full-batch-allocation:pumps/kafka.go:198
severity: medium
severity_basis: risk
risk: availability
environment_note: Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source and command output.
introduced_in: inception
mitigation: Operators should bound purge batch sizes and record sizes so Kafka message materialization fits comfortably in process memory.
remediation: Stream records to Kafka in bounded chunks or enforce an explicit Kafka batch byte/record budget before allocating all messages.
owner: tyk-team
review_date: "2026-11-30"
release_disposition: ship_with_known_issue
status: open
history:
