id: health-endpoint-is-liveness-only
title: Health endpoint always returns 200 (liveness only, not readiness)
description: 'server/server.go:49 Healthcheck always writes HTTP 200 with body {"status": "ok"} regardless of pump-process state. Even during startup when setupAnalyticsStore is still failing or before any pump has initialised, the endpoint reports healthy. Operators using /health as a Kubernetes readiness probe will see false positives. STK-REQ-004''s observability claim is therefore liveness-only, not readiness-capable.'
affected_requirements:
    - SW-REQ-032
    - STK-REQ-004
severity: low
severity_basis: risk
risk: availability
reproducer_command: 'rg -n "func Healthcheck|WriteHeader\\(http\\.StatusOK\\)|\\{\\\"status\\\": \\\"ok\\\"\\}" server/server.go'
environment_note: Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source and command output.
introduced_in: inception
mitigation: Use process-level liveness (e.g. pod restart on crash) rather than /health for readiness. Layer external probes (e.g. Redis-backed lag metric) for readiness signals.
remediation: Add a separate /ready endpoint that returns non-200 until setupAnalyticsStore completes and the first purge cycle has succeeded.
owner: tyk-team
release_disposition: ship_with_known_issue
status: open
