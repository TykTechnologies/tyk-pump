id: pump-no-per-pump-circuit-breaker
title: Purge dispatcher has no per-pump circuit breaker; failing pumps invoked every cycle
description: main.go execPumpWriting dispatches to every configured pump every purge cycle with no consecutive-failure tracking and no cooldown. A persistently failing pump receives N writes across N purge cycles (Wave 3c TestPerPumpCircuitBreaker_NoBackoffOnRepeatedFailure confirmed 100/100 invocations across 100 cycles). Healthy pumps still make progress — the cascade is contained by the per-pump goroutine fan-out — so the cost is observability noise (one error log per cycle per failing pump) and wasted CPU/network on the doomed dispatch, not data loss or correctness regression. Severity is therefore low. The reproducer test acts as a regression guard if a circuit breaker is added in the future.
affected_requirements:
    - SW-REQ-001
    - SW-REQ-075
evidence_manifests:
    - test:cascade_circuit_breaker_test.go:TestPerPumpCircuitBreaker_NoBackoffOnRepeatedFailure
    - .proof/evidence/ki-pump-no-per-pump-circuit-breaker.yaml
severity: low
severity_basis: risk
risk: correctness
reproducer_command: go test -count=1 -timeout=180s -run '^TestPerPumpCircuitBreaker_NoBackoffOnRepeatedFailure$' .
environment_note: Evidence is tied to the listed evidence_manifests entries; reproduce by rerunning the named test or code-signal scan and inspecting test:cascade_circuit_breaker_test.go:TestPerPumpCircuitBreaker_NoBackoffOnRepeatedFailure.
introduced_in: inception
mitigation: Operators monitor pump-specific error rates (logs or telemetry) and disable persistently failing pumps via pump_conf when sustained failure is observed. Severity is bounded because healthy pumps continue to make progress — the cost is log spam and wasted dispatch, not lost data.
remediation: Add a per-pump consecutive-failure counter in execPumpWriting; after N consecutive failures (e.g. N=5) mark the pump as in cooldown for M purge cycles (e.g. M=10, with exponential backoff up to a ceiling). Reset the counter on the first success after cooldown. Emit a structured log event on entering/exiting cooldown so operators can alert. Wave 3c reproducer test (TestPerPumpCircuitBreaker_NoBackoffOnRepeatedFailure) flips from regression-guard to acceptance-test once the breaker is shipped.
