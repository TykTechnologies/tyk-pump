reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored rg -n 'for batchSize < len\(records\)|records\[batchSize:\]' pumps/kinesis.go
environment_note: Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source or documentation surface and following the described scenario.
introduced_in: inception
mitigation: Production code always sets BatchSize=100 default before calling splitIntoBatches. The bug is dormant unless a future code change bypasses the default.
remediation: Add 'if batchSize <= 0 { batchSize = 100 }' at the top of splitIntoBatches, making the helper self-defending against caller misuse.
