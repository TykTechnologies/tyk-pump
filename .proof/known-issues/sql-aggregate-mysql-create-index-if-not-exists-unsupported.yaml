id: sql-aggregate-mysql-create-index-if-not-exists-unsupported
title: SQL aggregate emits CREATE INDEX IF NOT EXISTS which MySQL rejects
description: 'pumps/sql_aggregate.go ensureIndex issues CREATE INDEX IF NOT EXISTS unconditionally for non-Postgres dialects; only the CONCURRENTLY keyword is gated on dbType == postgres. MySQL deployments before 8.0.29, and common compatible client/server paths, reject IF NOT EXISTS on CREATE INDEX, so fresh SQL Aggregate startup or shard creation can fail even though SQLConf.Type documents MySQL as supported. This is distinct from the aggregate upsert ''excluded'' pseudo-table KI: this failure occurs during index DDL before writes.'
affected_requirements:
    - SW-REQ-066
    - SW-REQ-041
severity: medium
severity_basis: risk
risk: correctness
reproducer_command: rg -n "CREATE INDEX .*IF NOT EXISTS|dbType == \"postgres\"|OmitIndexCreation|ensureIndex" pumps/sql_aggregate.go docs/requirements/SW-REQ-066.md specs/software/requirements/SW-REQ-066.req.yaml
introduced_in: 657436f
mitigation: MySQL operators should pre-create the SQL Aggregate dimension index out-of-band and set omit_index_creation=true, or run SQL Aggregate on Postgres until dialect-specific index DDL is implemented.
remediation: Gate IF NOT EXISTS by dialect/version, or use a backend-specific HasIndex pre-check plus plain CREATE INDEX for MySQL-compatible backends, then add a MySQL integration witness for SW-REQ-066 backend_ddl_valid.
owner: tyk-team
release_disposition: ship_with_known_issue
status: open
history:
