id: uptime-pump-init-error-ignored
title: Uptime pump Init return errors are ignored
description: main.go:239 initialiseUptimePump calls UptimePump.Init for the SQL or Mongo uptime pump but does not check the returned error before logging that the uptime pump was initialized. A backend initialization failure can therefore leave uptime forwarding misconfigured while startup continues without propagating the failure.
affected_requirements:
    - SW-REQ-003
    - SYS-REQ-021
evidence_manifests:
    - .proof/evidence/ki-uptime-pump-init-error-ignored.yaml
severity: medium
severity_basis: risk
risk: correctness
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestInitialiseUptimePumpIgnoresInitError_KI$' .
introduced_in: inception
mitigation: Disable uptime purging when backend configuration is not validated externally, or verify uptime backend connectivity independently before starting the pump.
remediation: Check the UptimePump.Init return value and either fail startup with a typed error or mark uptime forwarding unavailable in an observable way.
