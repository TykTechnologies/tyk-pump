id: mcdc-system-invariant-reqs-no-runtime-witness
title: 'MCDC: 4 system-invariant constraint reqs (SYS-REQ-024..027) have no runtime test witness'
description: 'SYS-REQ-024 (go_125_or_later), SYS-REQ-025 (redis_protocol_compatible), SYS-REQ-026 (fips_build_available), SYS-REQ-027 (single_process_only) are environment/build/runtime invariants whose witness rows cannot be discharged by a unit test in pure Go: they describe properties of the build toolchain (go.mod), build target (Makefile fips), wire-protocol compatibility of the storage backend, and deployment shape — none of which a process can observe at runtime in a way that meaningfully witnesses both T and F arms of the partition. The audit-cache previously masked this state; the warning surfaced after SYS-REQ-027 was re-described in Phase F. Each req is independently verifiable by inspection of the artifacts it constrains (go.mod, Makefile, storage/temporal_storage.go imports, main.go runtime topology).'
affected_requirements:
    - SYS-REQ-027
commands:
    - grep -E '^(id|fretish|description):' specs/system/requirements/SYS-REQ-02[4-7].req.yaml
severity: low
severity_basis: risk
risk: correctness
reproducer_command: grep -E '^(id|fretish|description):' specs/system/requirements/SYS-REQ-02[4-7].req.yaml
introduced_in: inception
mitigation: 'Each requirement carries informal_verification.method: inspection with explicit evidence pointers; SYS-REQ-024 is witnessed by go.mod, SYS-REQ-025 by storage/temporal_storage.go imports, SYS-REQ-026 by Makefile build-fips target, SYS-REQ-027 by main.go runtime model. These are honest discharges for invariants Go code cannot self-witness.'
remediation: 'Either (a) introduce a build-time check (e.g., go generate inspector that asserts go.mod toolchain version and emits a // Verifies: SYS-REQ-024 annotation in a synthetic _test.go), or (b) extend proof to recognise inspection-witnessed invariants as legitimate MCDC discharges.'
