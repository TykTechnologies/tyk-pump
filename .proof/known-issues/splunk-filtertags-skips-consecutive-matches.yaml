id: splunk-filtertags-skips-consecutive-matches
title: Splunk FilterTags iterates while mutating slice, skipping every other matching tag
description: 'pumps/splunk.go:162-177 (FilterTags): the inner loop is ''for key, currentTag := range filteredTags { if HasPrefix(...) { copy(filteredTags[key:], filteredTags[key+1:]); ... filteredTags = filteredTags[:len(filteredTags)-1] } }''. This is the textbook Go anti-pattern of mutating a slice during a range-loop: ''range filteredTags'' evaluates len(filteredTags) once at entry, and indices advance even after the removal shifts subsequent elements left. Example: filteredTags=[''ignored-a'',''ignored-b'',''keep''] with excludeTag=''ignored-'': iter key=0 removes ''ignored-a'' → slice becomes [''ignored-b'',''keep'']; iter key=1 inspects ''keep'' (not the bumped-up ''ignored-b'' which is now at index 0) and stops. ''ignored-b'' is incorrectly retained and shipped to Splunk.'
affected_requirements:
    - SW-REQ-048
evidence_manifests:
    - test:pumps/http_pumps_mcdc_test.go:TestSplunkPump_FilterTagsSkipsConsecutiveMatches_KI
    - .proof/evidence/ki-splunk-filtertags-skips-consecutive-matches.yaml
severity: medium
severity_basis: risk
risk: data_integrity
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run TestSplunkPump_FilterTagsSkipsConsecutiveMatches_KI ./pumps
environment_note: Run the focused Splunk tripwire; it filters two consecutive tags with the same ignored prefix and expects the second ignored tag to remain under current behavior.
introduced_in: inception
mitigation: 'Operators using ignore_tag_prefix_list should audit Splunk index for un-filtered tags after deploys. Workaround: list each prefix that could appear consecutively as a separate distinct prefix to avoid the slip pattern.'
remediation: 'Replace the in-place shift with a filter-and-rebuild: ''out := filteredTags[:0]; for _, t := range filteredTags { skip := false; for _, p := range p.config.IgnoreTagPrefixList { if strings.HasPrefix(t,p) { skip = true; break } }; if !skip { out = append(out, t) } }; return out''.'
