severity: medium
risk: data_integrity
mitigation: Operators should run tyk-gateway and tyk-pump with TZ=UTC so emitted AnalyticsRecord.TimeStamp values are already UTC; this makes date-shard routing and aggregation windows deterministic. Avoid table_sharding across DST boundaries in non-UTC deployments.
remediation: Pin AnalyticsRecord.TimeStamp to UTC on construction/decode (call t.UTC() in the decode path) or document a UTC-only convention in the struct doc comment, and route date shards from the UTC instant.
