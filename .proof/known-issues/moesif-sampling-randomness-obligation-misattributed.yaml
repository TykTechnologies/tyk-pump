id: moesif-sampling-randomness-obligation-misattributed
title: Moesif sampling randomness is not a deterministic-output guarantee
description: 'pumps/moesif.go imports math/rand and uses rand.Intn for percentage sampling. SW-REQ-052 now explicitly specifies probabilistic Moesif sampling and weighted event submission, so the remaining debt is not a missing sampling product contract. The remaining gap is proof/spec attribution: the generic randomness signal is mapped to the determinism obligation even though intentional probabilistic sampling is not a deterministic-output guarantee unless a separate seed/control contract is required.'
affected_requirements:
    - SW-REQ-052
evidence_manifests:
    - .proof/evidence/ki-moesif-sampling-randomness-obligation-misattributed.yaml
severity: low
severity_basis: risk
risk: correctness
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored rg -n 'math/rand|rand\.Seed|rand\.Intn' pumps/moesif.go specs/software/requirements/SW-REQ-052.req.yaml
environment_note: Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source or rerunning the random-dependency code-signal scan.
introduced_in: inception
mitigation: Treat Moesif sampling as intentionally probabilistic behavior under SW-REQ-052. Do not claim deterministic output for sampled event selection unless a separate seed/control requirement is introduced.
remediation: Adjust the signal/obligation mapping so intentional Moesif sampling does not attach to SW-REQ-052 determinism, or add a separate seeded/control sampling requirement if deterministic selection is actually required.
