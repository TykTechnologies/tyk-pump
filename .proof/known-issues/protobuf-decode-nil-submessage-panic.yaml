id: protobuf-decode-nil-submessage-panic
title: Protobuf decode can panic on malformed input or missing nested messages
description: serializer/protobuf.go:26 type-asserts Decode input to []byte and TransformSingleProtoToAnalyticsRecord dereferences nested Geo, Country, City, Location, and Network messages without nil guards. A malformed caller input type or a syntactically valid protobuf payload with missing nested submessages can panic instead of returning a typed decode error.
affected_requirements:
    - SW-REQ-008
    - INT-REQ-003
evidence_manifests:
    - test:serializer/protobuf_mcdc_test.go:TestProtobuf_DecodeNilSubmessagesPanic_KI
    - .proof/evidence/ki-protobuf-decode-nil-submessage-panic.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestProtobuf_DecodeNilSubmessagesPanic_KI$' ./serializer
environment_note: Run the focused serializer tripwire; it feeds non-byte input and syntactically valid protobuf payloads missing Geo, Network, or Latency and expects the current panic behavior.
introduced_in: inception
mitigation: Only feed protobuf data generated by the paired encoder or pre-validate protobuf payload shape before Decode.
remediation: Change Decode and TransformSingleProtoToAnalyticsRecord to validate input type and required nested message presence, returning explicit errors instead of panicking.
