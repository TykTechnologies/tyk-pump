id: docs-sql-migrate-sharded-tables-undocumented
title: 'Documentation gap: SQL pump migrate_sharded_tables meta field undocumented in tyk-docs'
description: pumps/sql.go:89 declares MigrateShardedTables bool with mapstructure tag migrate_sharded_tables and an in-source comment about migration semantics ('performance impact from the migration … test carefully'). tyk-docs/content/shared/pump-config.md SQL section does not surface this knob. Operationally important — defaults to false, which causes prior-day shards to retain stale schema (KI sql-default-migration-today-only).
affected_requirements:
    - SW-REQ-040
commands:
    - grep -n 'migrate_sharded_tables\|MigrateShardedTables' /Users/buger/go/src/tyk-pump/pumps/sql.go
