id: elasticsearch-writedata-errors-swallowed
title: Elasticsearch WriteData logs process errors but returns success
description: pumps/elasticsearch.go:431 calls operator.processData without checking its returned error, while each Elasticsearch operator logs bad record or index errors and returns nil. Non-bulk indexing failures and invalid records are therefore visible only in logs; the purge caller sees WriteData return nil and records the pump write as successful.
affected_requirements:
    - SW-REQ-077
evidence_manifests:
    - test:pumps/elasticsearch_mcdc_test.go:TestElasticsearchPump_WriteData_V7ProcessDataIndexError
    - .proof/evidence/ki-elasticsearch-writedata-errors-swallowed.yaml
severity: medium
severity_basis: risk
risk: data_integrity
reproducer_command: go test -count=1 -run '^TestElasticsearchPump_WriteData_V7ProcessDataIndexError$' ./pumps
introduced_in: inception
mitigation: Monitor Elasticsearch pump logs and backend rejected/indexing metrics independently; avoid relying on WriteData nil as proof of per-record success.
remediation: Propagate processData errors from WriteData and aggregate per-record indexing failures into a typed partial-progress result or retry/DLQ path.
