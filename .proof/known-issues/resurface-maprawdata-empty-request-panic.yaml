id: resurface-maprawdata-empty-request-panic
title: Resurface mapRawData panics on AnalyticsRecord with empty RawRequest but non-empty RawResponse
description: pumps/resurface.go:166 (mapRawData) splits the decoded raw request on whitespace via strings.Fields(req[0]) and indexes [1] to extract the path. When AnalyticsRecord.RawRequest is empty but RawResponse is not, the partial-raw guard at resurface.go:253 (len==0 && len==0) does NOT skip the record, and mapRawData proceeds to panic with 'index out of range [1] with length 0'. The whole pump goroutine crashes and the buffered channel is left in a broken state. Reachable from any deployment that produces records with one side of the raw HTTP transaction missing.
affected_requirements:
    - SW-REQ-054
commands:
    - go test -count=1 -run 'TestResurfacePump_MapRawData_EmptyRequest_PanicKI' ./pumps
severity: high
severity_basis: risk
risk: availability
cve_surface: possible
affected_api: Resurface pump WriteData/mapRawData raw HTTP analytics-record handling
attacker_input: analytics record with empty RawRequest and non-empty RawResponse derived from gateway traffic or upstream record production
sanitizer: go-test:panic-tripwire
reproducer_command: go test -count=1 -run 'TestResurfacePump_MapRawData_EmptyRequest_PanicKI' ./pumps
introduced_in: inception
minimization_status: minimized
mitigation: Operators must ensure every analytics record has both RawRequest and RawResponse populated before reaching the resurface pump.
remediation: Either tighten the early-return guard in writeData to skip records with EITHER side empty (change && to ||), or harden mapRawData against empty rawReq/rawRes inputs by returning an error instead of indexing.
