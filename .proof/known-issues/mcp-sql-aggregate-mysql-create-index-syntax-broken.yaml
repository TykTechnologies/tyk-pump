id: mcp-sql-aggregate-mysql-create-index-syntax-broken
title: MCP-SQL aggregate pump emits "CREATE INDEX IF NOT EXISTS" which MySQL <8.0.29 rejects
description: pumps/mcp_sql_aggregate.go issues CREATE INDEX IF NOT EXISTS unconditionally for non-Postgres dialects; only the CONCURRENTLY keyword is gated on dbType == postgres. MySQL deployments before 8.0.29, and common compatible client/server paths, reject IF NOT EXISTS on CREATE INDEX, so fresh MCP SQL Aggregate startup can fail even though SQLConf.Type documents MySQL as supported. The sibling SQL Aggregate path is tracked separately by KI sql-aggregate-mysql-create-index-if-not-exists-unsupported.
affected_requirements:
    - SW-REQ-045
    - SW-REQ-041
evidence_manifests:
    - code_signal:opengrep:go.sql.formatted-write-exec:pumps/mcp_sql_aggregate.go:127
    - test:pumps/known_issue_tripwire_test.go:TestSQLMySQLCreateIndexIfNotExists_KI
    - .proof/evidence/ki-mcp-sql-aggregate-mysql-create-index-syntax-broken.yaml
severity: medium
severity_basis: risk
risk: correctness
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestSQLMySQLCreateIndexIfNotExists_KI$' ./pumps
environment_note: Reproducer is a static source tripwire that pins the MCP SQL Aggregate DDL template and dialect gating; no MySQL container is required.
introduced_in: inception
mitigation: Operators on MySQL should either pre-create the dimension index out-of-band and set omit_index_creation=true on the aggregate pumps, or stick to Postgres for aggregate workloads.
remediation: Gate IF NOT EXISTS behind a dialect check for MCP SQL Aggregate, or use a backend-specific HasIndex pre-check plus plain CREATE INDEX for MySQL-compatible backends, then add a MySQL integration witness for SW-REQ-045 backend_ddl_valid.
