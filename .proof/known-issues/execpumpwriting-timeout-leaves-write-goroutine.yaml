id: execpumpwriting-timeout-leaves-write-goroutine
title: execPumpWriting stops waiting on timeout but leaves the inner WriteData goroutine running
description: |-
    main.go:469 starts an inner goroutine for pmp.WriteData and main.go:480 returns from execPumpWriting when ctx.Done fires. If the pump implementation ignores ctx cancellation, execPumpWriting logs the timeout and releases its WaitGroup while the inner WriteData goroutine remains blocked until the pump call eventually returns. This is distinct from timeout=0 behavior: it can occur with a positive per-pump timeout whenever the backend/pump does not observe the provided context. Specific production pumps that ignore caller context are tracked separately, but the fanout lifecycle contract itself has no join/cleanup path for the inner goroutine after timeout.
affected_requirements:
    - SYS-REQ-005
    - SW-REQ-072
evidence_manifests:
    - test:main_test.go:TestExecPumpWritingTimeoutLeavesInnerGoroutine_KI
    - .proof/evidence/ki-execpumpwriting-timeout-leaves-write-goroutine.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestExecPumpWritingTimeoutLeavesInnerGoroutine_KI$' .
environment_note: In-memory mock pump ignores the provided context until the test releases it; the test does not use external services or containers and releases the blocked goroutine before exit.
introduced_in: inception
mitigation: Ensure pump implementations honor ctx cancellation and configure backend/client-level timeouts so WriteData returns shortly after execPumpWriting's context deadline.
remediation: |-
    Make execPumpWriting's timeout semantics explicit: either require and verify pump-level ctx compliance for all implementations, or add a bounded cleanup/join strategy and observability for inner WriteData goroutines that outlive the timeout.
