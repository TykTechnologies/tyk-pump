id: geoip-non-nil-db-branch-requires-maxmind
title: GeoIP non-nil-DB MC/DC branches require a real MaxMind database fixture
description: GetGeo's 'GeoIPDB == nil' (analytics/analytics.go:374) and GeoIPLookup's 'ip == nil' (analytics/analytics.go:404) both have F-side branches that depend on dereferencing a non-nil *maxminddb.Reader. Without a real MaxMind GeoIP2 .mmdb fixture, calling GeoIPDB.Lookup panics on nil deref. Several adjacent error paths are already marked //mcdc:ignore for the same reason.
affected_requirements:
    - SW-REQ-071
commands:
    - go test -count=1 -run TestGeoIPLookup_Coverable ./analytics
severity: low
severity_basis: risk
risk: correctness
reproducer_command: go test -count=1 -run TestGeoIPLookup_Coverable ./analytics
introduced_in: inception
mitigation: Logic is delegated to the well-tested maxminddb-golang library; misuse is impossible from internal callers, who always check the DB pointer before delegating.
remediation: Either commit a small synthetic .mmdb test fixture and add a TestGeoIPLookup_RealDB exercising both branches, or extend the //mcdc:ignore comments to cover the outer if-statements as well.
