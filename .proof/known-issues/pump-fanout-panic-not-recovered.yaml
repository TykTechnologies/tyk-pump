risk: availability
reproducer_command: go test -count=1 -timeout=180s -run '^TestFanoutPanicIsolated_PanicInOneDoesNotStallOthers$' .
environment_note: Evidence is tied to the listed evidence_manifests entries; reproduce by rerunning the named test or code-signal scan and inspecting test:fanout_panic_isolated_test.go:TestFanoutPanicIsolated_PanicInOneDoesNotStallOthers.
introduced_in: inception
mitigation: Pumps are expected to be well-behaved; panics typically originate in third-party SDK code paths (mongo driver, kafka client, prometheus client) rather than the pump glue. Operators rely on container/orchestrator restart to recover from host-process crash. Run with restart=always under systemd/docker/k8s.
remediation: |-
    Trivial fix at main.go:469 — wrap the goroutine body in:
      defer func() {
          if r := recover(); r != nil {
              log.WithField("pump", pmp.GetName()).Errorf("pump panicked: %v", r)
              ch <- fmt.Errorf("pump panic: %v", r)
          }
      }()
    This converts a host-process crash into a per-pump WriteData error, which execPumpWriting already handles (logs + continues). The older no-panic-recovery-in-exec-pump-writing record is retained only as a legacy alias for this same remediation.
