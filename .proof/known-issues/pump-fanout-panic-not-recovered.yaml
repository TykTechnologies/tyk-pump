id: pump-fanout-panic-not-recovered
title: Pump fanout goroutines lack recover barriers; a pump panic crashes the host process
description: main.go:469 spawns an inner goroutine per pump per purge cycle to invoke pmp.WriteData. The goroutine body has no defer recover(). Per Go semantics ("an unrecovered panic in a goroutine terminates the program"), a panic inside any pump implementation (commonly third-party SDK bugs in mongo driver, kafka client, prometheus client, etc.) crashes the entire tyk-pump host process — taking down every other pump and the purge loop with it. Several pump-internal goroutines also lack local recover barriers. TestFanoutPanicIsolated_PanicInOneDoesNotStallOthers (subprocess re-exec harness) confirms the main fanout missing-recover path empirically. This is the canonical KI for the older duplicate no-panic-recovery-in-exec-pump-writing and the accepted risk pump-panic-crashes-process.
