id: elasticsearch-invalid-version-logfatal
title: Elasticsearch invalid version paths call log.Fatal
description: Elasticsearch version selection calls log.Fatal for invalid versions both in getOperator and Init. This is a value-validation/setup failure, not a mapstructure decode failure, and can terminate the whole pump process for one bad Elasticsearch pump config.
affected_requirements:
    - SYS-REQ-004
    - SW-REQ-068
evidence_manifests:
    - code_signal:process_exit_on_recoverable:pumps/elasticsearch.go:337
    - code_signal:process_exit_on_recoverable:pumps/elasticsearch.go:391
    - .proof/evidence/ki-elasticsearch-invalid-version-logfatal.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored rg -n 'Invalid version|Only 3, 5, 6, 7 are valid values' pumps/elasticsearch.go
environment_note: Static source tripwire; no Elasticsearch service or container is required.
introduced_in: inception
mitigation: Validate Elasticsearch Version config before deployment and use only supported values 3, 5, 6, or 7.
remediation: Return a validation error from Init/getOperator instead of calling log.Fatal so the caller can reject only the misconfigured pump.
owner: tyk-team
review_date: "2026-11-30"
release_disposition: ship_with_known_issue
status: open
history:
    - at: "2026-06-26T20:34:00Z"
      by: agent:codex
      action: created
      detail: split from pumps-logfatal-on-config-decode
