id: prometheus-metric-maps-race
title: Prometheus metric aggregation maps are mutated without synchronization
description: PrometheusMetric.Inc, Observe, and Expose mutate counterMap and histogramMap without a mutex or other synchronization. If WriteData/processMetric/Expose are invoked concurrently for the same metric, Go map writes can race or panic, so SW-REQ-024's concurrent race evidence cannot be honestly claimed until the metric aggregation state is protected or made single-threaded by design.
affected_requirements:
    - SW-REQ-024
severity: medium
reproducer_command: rg -n "counterMap map\[string\]counterStruct|histogramMap[[:space:]]+map\[string\]histogramCounter|pm\.counterMap\[|pm\.histogramMap\[|pm\.counterMap = make|pm\.histogramMap = make" pumps/prometheus.go
introduced_in: inception
mitigation: Avoid concurrent WriteData calls against the same PrometheusPump instance; production purge dispatch should serialize writes per pump until the metric maps are protected.
remediation: Add synchronization around PrometheusMetric counterMap/histogramMap mutations or replace the aggregation state with concurrency-safe structures, then add a go test -race witness for concurrent WriteData/processMetric.
owner: tyk-team
release_disposition: ship_with_known_issue
status: open
history:
