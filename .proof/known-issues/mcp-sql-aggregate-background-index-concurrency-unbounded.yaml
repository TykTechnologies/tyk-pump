id: mcp-sql-aggregate-background-index-concurrency-unbounded
title: MCP SQL aggregate background index creation lacks an explicit goroutine and channel lifecycle contract
description: pumps/mcp_sql_aggregate.go:141-147 starts background index creation and pumps/mcp_sql_aggregate.go:133-135 signals on s.backgroundIndexCreated. The requirement does not specify cancellation, channel ownership, or concurrent WriteData/Init behavior for this background path. Until that lifecycle is specified and tested, the concurrent obligation for SW-REQ-045 is tracked debt.
affected_requirements:
    - SW-REQ-045
evidence_manifests:
    - .proof/evidence/ki-mcp-sql-aggregate-background-index-concurrency-unbounded.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestMCPSQLAggregateEnsureIndexBackgroundFailureIsNotSurfaced_KI$' ./pumps
environment_note: Reproducer uses in-memory SQLite while forcing the Postgres background-index branch; no external SQL backend or container is required.
introduced_in: inception
mitigation: Avoid concurrent initialization/index-creation paths against the same MCP SQL aggregate pump instance and monitor startup logs for background index failures.
remediation: Specify the background index lifecycle, make cancellation and channel ownership explicit, and add a concurrency/race witness for the background path.
