id: uptime-onconflict-request-time-is-zero-unreachable
title: MC/DC F-side of '!field.IsZero()' on Counter.RequestTime is unreachable
description: analytics/uptime_data.go:86 inside OnConflictUptimeAssignments iterates the embedded Counter fields and tests '!field.IsZero()' for the request_time field. The function constructs an empty UptimeReportAggregateSQL{} via 'f := UptimeReportAggregateSQL{}', so f.Counter.RequestTime is always the zero float and IsZero() is always true. The F side of IsZero() (== T side of !IsZero()) is therefore structurally unreachable without restructuring the function.
affected_requirements:
    - SW-REQ-073
commands:
    - PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestOnConflictUptimeAssignments_RequestTimeZeroSkipped$' ./analytics
evidence_manifests:
    - .proof/evidence/ki-uptime-onconflict-request-time-is-zero-unreachable.yaml
severity: low
severity_basis: risk
risk: data_integrity
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestOnConflictUptimeAssignments_RequestTimeZeroSkipped$' ./analytics
environment_note: Run the focused OnConflict uptime tripwire; it proves request_time is omitted for the locally constructed zero-value Counter while analytics/uptime_data.go carries an explicit mcdc:ignore documenting that the non-zero RequestTime branch is structurally unreachable in this function.
introduced_in: inception
mitigation: The dead branch is benign — it gates a GORM expression that the test suite confirms is omitted, matching production behaviour where on-conflict updates only ever assign request_time as a derived ratio of the always-present total_request_time and hits columns.
remediation: Either drop the IsZero check entirely when code is next simplified, or keep the current //mcdc:ignore on uptime_data.go:86 as the explicit structural proof waiver.
