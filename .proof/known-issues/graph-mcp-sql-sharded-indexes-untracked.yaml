id: graph-mcp-sql-sharded-indexes-untracked
title: Graph and MCP SQL sharded tables have no explicit per-shard index contract
description: Graph SQL and MCP SQL sharded write paths create date-suffixed tables via AutoMigrate, and the aggregate variants create sharded aggregate tables directly, but these paths do not declare or witness a per-shard index set comparable to standard SQL's tyk_analytics shard indexes or SQL Aggregate's dimension index. The current tests assert shard tables and records, not expected indexes. This leaves TT-13421-style shard-index regressions unmodeled for Graph/MCP SQL variants.
affected_requirements:
  - SW-REQ-042
  - SW-REQ-043
  - SW-REQ-044
  - SW-REQ-045
severity: low
severity_basis: risk
risk: performance
reproducer_command: rg -n "ensureMCPShardedTable|ensureMCPAggregateShardedTable|AggregateGraphSQLTable|AutoMigrate|CreateTable|ensureIndex" pumps/graph_sql.go pumps/graph_sql_aggregate.go pumps/mcp_sql.go pumps/mcp_sql_aggregate.go
introduced_in: inception
mitigation: Treat Graph/MCP SQL shard-index expectations as operator-managed unless a per-variant index contract and tests are added.
remediation: Define the expected Graph/MCP SQL shard indexes, create or ensure them when shard tables are created, and add per-variant tests asserting every expected index exists on every created shard.
owner: tyk-team
review_date: "2026-11-30"
release_disposition: ship_with_known_issue
status: open
