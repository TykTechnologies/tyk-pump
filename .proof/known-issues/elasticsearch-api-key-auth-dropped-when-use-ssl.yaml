id: elasticsearch-api-key-auth-dropped-when-use-ssl
title: Elasticsearch API-key auth transport is replaced when use_ssl is enabled
description: |
    pumps/elasticsearch.go configures an ApiKeyTransport when auth_api_key and
    auth_api_key_id are set, but the later UseSSL branch replaces httpClient with
    a new http.Client whose transport is only &http.Transport{TLSClientConfig:
    tlsConf}. When both API-key auth and use_ssl are configured, the outbound
    Elasticsearch client loses the Authorization: ApiKey header wiring.
affected_requirements:
    - SW-REQ-068
evidence_manifests:
    - test:pumps/elasticsearch_test.go:TestElasticsearchPump_ApiKeyAuthDroppedWhenUseSSL_KI
    - .proof/evidence/ki-elasticsearch-api-key-auth-dropped-when-use-ssl.yaml
severity: medium
severity_basis: risk
risk: data_integrity
reproducer_command: go test -count=1 -run '^TestElasticsearchPump_ApiKeyAuthDroppedWhenUseSSL_KI$' ./pumps
environment_note: 'Static reproducer test asserts the current bad ordering/wiring: API-key transport assignment is followed by a TLS client assignment that does not preserve or wrap ApiKeyTransport.'
introduced_in: 84f3855
mitigation: Avoid combining auth_api_key/auth_api_key_id with use_ssl until the transport composition is fixed; use basic auth over TLS or network-level controls where acceptable.
remediation: Compose the TLS transport with API-key header injection instead of replacing it, for example by making ApiKeyTransport wrap a base RoundTripper configured with TLSClientConfig.
owner: tyk-team
