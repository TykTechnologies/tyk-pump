id: instrumentation-goroutines-no-recover-or-shutdown
title: Instrumentation background goroutines lack defer recover and explicit shutdown
description: 'The StatsD/health instrumentation sink spawns long-lived background goroutines without a top-of-body defer recover(): the GC-stats monitor at instrumentation_helpers.go:52-67 is an unbounded for{} loop (ReadGCStats + GaugeKv + time.Sleep) with neither recover nor a stop channel, and the StatsDSink flush/loop goroutines at instrumentation_statsd_sink.go:123,130,170-174 run loop-backed workers driven by cmdChan. A panic inside one of these instrumentation goroutines (e.g. a health-client bug) is not recovered and would terminate the host process, and the GC monitor has no shutdown path so it leaks for the process lifetime. Per SW-REQ-005 the instrumentation path must not affect the purge loop; today an instrumentation-goroutine panic violates that isolation. The StatsDSink path does have channel-based Stop/Drain lifecycle; the gap there is the missing per-goroutine recover, not ownership.'
affected_requirements:
    - SW-REQ-005
evidence_manifests:
    - code_signal:opengrep:go.concurrency.goroutine-spawn:instrumentation_helpers.go:52
    - code_signal:opengrep:go.concurrency.goroutine-spawn:instrumentation_statsd_sink.go:123
    - code_signal:opengrep:go.concurrency.channel-send:instrumentation_statsd_sink.go:130
    - code_signal:opengrep:go.goroutine.no-recover:instrumentation_helpers.go:52
    - code_signal:opengrep:go.goroutine.no-recover:instrumentation_statsd_sink.go:170
    - test:instrumentation_test.go:TestInstrumentationBackgroundGoroutinesLackRecover_KI
    - test:instrumentation_test.go:TestInstrumentationGCMonitorHasNoShutdownSignal_KI
    - .proof/evidence/ki-instrumentation-goroutines-no-recover-or-shutdown.yaml
severity: low
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^(TestInstrumentationBackgroundGoroutinesLackRecover_KI|TestInstrumentationGCMonitorHasNoShutdownSignal_KI)$' .
environment_note: Run the focused static tripwires; they inspect instrumentation source without starting the unbounded GC monitor, pin missing recover guards on background goroutines, and pin the GC monitor's unbounded sleep loop without a context, stop channel, or done channel.
introduced_in: inception
mitigation: Instrumentation is opt-in (enabled only when instrumentation + a StatsD endpoint are configured); run with instrumentation disabled if goroutine isolation is required.
remediation: Add a top-of-body defer recover() that logs and returns to each instrumentation goroutine, and give the GC-stats monitor a stop channel wired to shutdown.
