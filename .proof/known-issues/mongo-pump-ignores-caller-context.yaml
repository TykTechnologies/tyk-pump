id: mongo-pump-ignores-caller-context
title: MongoPump.WriteData ignores caller ctx, bypassing per-pump write timeout
description: 'The whole mongo pump family ignores the caller ctx and passes context.Background() to the temporal store: pumps/mongo.go:435 (MongoPump.WriteData), pumps/mongo_selective.go:242 and :375 (MongoSelectivePump.WriteData / WriteUptimeData), pumps/graph_mongo.go:148 (GraphMongoPump.WriteData), and pumps/mcp_mongo.go:138 (MCPMongoPump.WriteData) all call store.Insert(context.Background(), ...). main.go:execPumpWriting (main.go:435-471) sets context.WithTimeout per pump and selects on ctx.Done(), but mongo writes ignore that ctx. SYS-REQ-005''s per-pump-timeout claim is therefore false for every mongo variant: a mongo write that hangs will not be cancelled by the configured per-pump timeout, and the Pump-interface contract from INT-REQ-004 of surfacing write errors via ctx is broken. Workaround: operators relying on per-pump timeouts for mongo today have no recourse; tune mongo client-side timeouts via the mongo connection string instead.'
affected_requirements:
    - SYS-REQ-005
    - INT-REQ-004
    - SW-REQ-072
    - SW-REQ-034
    - SW-REQ-035
    - SW-REQ-037
    - SW-REQ-038
evidence_manifests:
    - code_signal:opengrep:go.concurrency.unguarded-channel-send:pumps/mongo.go:438
    - code_signal:opengrep:go.concurrency.unguarded-channel-send:pumps/graph_mongo.go:135
    - code_signal:opengrep:go.context.dropped-on-floor:pumps/graph_mongo.go:101
    - code_signal:opengrep:go.context.dropped-on-floor:pumps/mongo.go:402
    - code_signal:opengrep:go.context.dropped-on-floor:pumps/mongo_selective.go:203
severity: medium
severity_basis: risk
risk: availability
environment_note: Evidence is tied to the listed evidence_manifests entries; reproduce by rerunning the named test or code-signal scan and inspecting code_signal:opengrep:go.concurrency.unguarded-channel-send:pumps/mongo.go:438.
introduced_in: inception
mitigation: Configure mongo client-side timeouts via the connection string (connectTimeoutMS, socketTimeoutMS) until the pump forwards the caller ctx to m.store.Insert.
remediation: Replace context.Background() with the ctx parameter received by WriteData in all four files — pumps/mongo.go:435, pumps/mongo_selective.go:242 and :375, pumps/graph_mongo.go:148, pumps/mcp_mongo.go:138. Add a test that cancels ctx and asserts WriteData returns promptly with ctx.Err() for each variant.
owner: tyk-team
release_disposition: ship_with_known_issue
status: open
