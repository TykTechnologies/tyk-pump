id: docs-sqlite-still-listed-as-supported-sql-type
title: 'Documentation gap: SQLite still listed as supported SQL pump type in tyk-docs after v1.12.0 removal'
introduced_in: inception
description: 'pumps/sql.go:65 rejects sqlite from v1.12.0 onward, but 8 sites across tyk-docs still list it: tyk-docs/content/api-management/tyk-pump.md:117, :154, :470, :518, :571, :766 (Graph SQL ''supports postgres, sqlite, mysql''), and tyk-docs/content/shared/pump-config.md:44, :179, :3760, :3987. New deployments following the docs will get an error.'
