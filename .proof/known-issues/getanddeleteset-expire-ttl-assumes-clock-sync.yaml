severity: low
severity_basis: risk
risk: data_integrity
environment_note: Evidence is tied to the listed evidence_manifests entries; reproduce by rerunning the named test or code-signal scan and inspecting code_signal:opengrep:go.time.absolute-expire-on-local-clock:storage/temporal_storage.go:294.
introduced_in: inception
mitigation: No mitigation required for the withdrawn clock-skew claim; the remaining real storage risks are tracked by getanddeleteset-expire-fail-loses-records and storage-retry-maxelapsed-zero-is-unbounded.
remediation: 'Withdrawn: current storage/temporal_storage.go uses Redis EXPIRE with a relative time.Duration, and storage/clock_skew_tolerated_test.go witnesses the relative-TTL behavior under SW-REQ-006. The stale SW-REQ-007 deferral is removed instead of tracking a non-reproducing issue.'
