id: no-panic-recovery-in-exec-pump-writing
title: execPumpWriting has no defer recover; a panicking pump crashes the whole process
description: 'main.go:435 execPumpWriting (and the inner goroutine at main.go:468) have no ''defer recover()''. Any panic in a backend pump''s WriteData call propagates up the goroutine and crashes the whole tyk-pump process. SYS-REQ-004''s per-backend independence claim is therefore violated: a single panicking pump implementation takes down every other pump and stops the purge loop entirely.'
affected_requirements:
    - SYS-REQ-004
    - SW-REQ-024
    - SW-REQ-037
    - SW-REQ-040
    - SW-REQ-041
    - SW-REQ-045
    - SW-REQ-064
    - SW-REQ-065
    - SW-REQ-066
    - SW-REQ-067
evidence_manifests:
    - code_signal:opengrep:go.goroutine.no-recover:pumps/graph_mongo.go:114
    - code_signal:opengrep:go.goroutine.no-recover:pumps/mcp_sql_aggregate.go:143
    - code_signal:opengrep:go.goroutine.no-recover:pumps/mongo.go:429
    - code_signal:opengrep:go.goroutine.no-recover:pumps/prometheus.go:215
    - code_signal:opengrep:go.goroutine.no-recover:pumps/sql.go:498
    - code_signal:opengrep:go.goroutine.no-recover:pumps/sql_aggregate.go:182
    - .proof/evidence/ki-no-panic-recovery-in-exec-pump-writing.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored go test -p=1 -count=1 -timeout=180s -run '^TestFanoutPanicIsolated_PanicInOneDoesNotStallOthers$' .
environment_note: Evidence is tied to the listed evidence_manifests entries; reproduce by rerunning the named test or code-signal scan and inspecting code_signal:opengrep:go.goroutine.no-recover:pumps/graph_mongo.go:114.
introduced_in: inception
mitigation: Avoid pumps with known panic paths; pin pump implementations to versions that have been runtime-tested under hostile inputs.
remediation: Wrap each pump goroutine with 'defer func() { if r := recover(); r != nil { log + metric }; wg.Done() }()' so the failing pump is taken out without affecting siblings.
