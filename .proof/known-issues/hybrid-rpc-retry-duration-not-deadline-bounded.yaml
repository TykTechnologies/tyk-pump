id: hybrid-rpc-retry-duration-not-deadline-bounded
title: Hybrid RPC login retry budget is attempt-bounded but not tied to an explicit deadline
description: pumps/hybrid.go:44-49 wraps hybrid RPC connection attempts with backoff.WithMaxRetries(backoff.NewExponentialBackOff(), 3). The attempt count is bounded, but the retry helper is not tied to the caller context or a requirement-level elapsed-time deadline. The retry_budget_bounded obligation for the hybrid RPC connection path is therefore tracked debt until the elapsed retry budget is specified and tested.
affected_requirements:
    - SW-REQ-029
severity: low
severity_basis: risk
risk: availability
reproducer_command: rg -n "retryAndLog|WithMaxRetries|NewExponentialBackOff" pumps/hybrid.go
environment_note: Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source or rerunning the exponential-backoff code-signal scan.
introduced_in: inception
mitigation: Operators should configure sane RPC endpoints and rely on the three-attempt cap to bound repeated connection attempts in normal conditions.
remediation: Tie the retry helper to a context/deadline or document the exact maximum elapsed retry window and add a witness for timeout exhaustion.
owner: tyk-team
release_disposition: ship_with_known_issue
