severity: low
mitigation: 'Phase C closed 21 of 30 originally-incomplete decisions via analytics/mcdc_coverage_test.go. The remaining 9 are structurally unreachable (5 sibling KIs: aggregate-mcdc-unreachable-string-assertion-ok, setaggregatetimestamp-mcdc-unreachable-not-ok, uptime-onconflict-request-time-is-zero-unreachable, uptime-aggregate-erasstr-itoa-always-nonempty, geoip-non-nil-db-branch-requires-maxmind). Closing to 95/95 requires either //mcdc:ignore on those lines or a synthetic MaxMind fixture.'
remediation: Either (a) add //mcdc:ignore lines on the 4 string-assertion sites, the map-zero short-circuit, the always-zero RequestTime, and the strconv.Itoa-always-nonempty sites (production-code annotation change), or (b) commit a synthetic MaxMind .mmdb fixture and exercise the GeoIP DB-present paths.
