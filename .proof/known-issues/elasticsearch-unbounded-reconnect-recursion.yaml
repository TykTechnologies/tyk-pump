id: elasticsearch-unbounded-reconnect-recursion
title: Elasticsearch pump uses unbounded recursion on connection failure
description: 'pumps/elasticsearch.go:407-415 connect() recurses to itself on failure with only a 5-second sleep and no retry bound: ''e.log.Error(...); time.Sleep(5 * time.Second); e.connect()''. pumps/elasticsearch.go:419-432 WriteData also re-enters connect+WriteData recursively when e.operator==nil. A persistent ES outage causes unbounded recursion, eventually stack-overflowing the goroutine. Violates SYS-REQ-005 (no timeout bound) and SYS-REQ-004 (a stack overflow takes down the whole process, not just this pump).'
affected_requirements:
    - SYS-REQ-004
    - SYS-REQ-005
severity: medium
mitigation: Avoid persistent ES outages; monitor ES uptime out-of-band. Stop and restart tyk-pump if recurring ES errors appear in logs.
remediation: Replace recursion with the retry package's bounded ExponentialBackoff and a retry-count limit; on exhaustion, return an error from WriteData so the batch is logged-and-skipped rather than recursing.
owner: tyk-team
release_disposition: ship_with_known_issue
status: open
history:
    - at: "2026-05-30T08:34:32Z"
      by: human:buger
      action: created
    - at: "2026-05-31T07:30:00Z"
      by: agent:claude
      action: regression_test_added
      note: |
        Added regression test pumps/elasticsearch_mcdc_test.go:TestElasticsearchPump_KI_UnboundedReconnectRecursion.
        It points the pump at 127.0.0.1:1 (immediate ECONNREFUSED), launches connect()
        in a goroutine, captures a goroutine stack snapshot after ~8s and asserts
        that the symbol
        github.com/TykTechnologies/tyk-pump/pumps.(*ElasticsearchPump).connect
        appears in the live stack — proving the recursive self-call is active.
        The goroutine is deliberately leaked because connect() has no
        cancellation mechanism; this is bounded by the test-process lifetime.
        Observation: after ~8s the goroutine is inside the first time.Sleep
        between iterations (depth=1 frame); further depth grows by 1 every 5s
        until a stack-overflow finally kills the process under sustained
        outage. The test asserts presence-of-recursion, not depth, to keep
        the wall-clock cost bounded.
