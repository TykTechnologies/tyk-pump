id: mongo-aggregate-last-document-query-ignores-timeout
title: Mongo aggregate last-document query ignores caller timeout context
description: 'MongoAggregatePump.getLastDocumentTimestamp queries the mixed aggregate collection with context.Background() instead of a caller-provided or bounded context: pumps/mongo_aggregate.go:418 calls m.store.Query(context.Background(), ...). The query is used during MongoAggregatePump.Init to seed the aggregate timestamp, so a hung Mongo query is not bounded by the pump timeout contract. The SW-REQ-036 query_timeout_bounded obligation is therefore a real product gap, not only missing test evidence.'
affected_requirements:
    - SW-REQ-036
evidence_manifests:
    - .proof/evidence/ki-mongo-aggregate-last-document-query-ignores-timeout.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored rg -n 'func \(m \*MongoAggregatePump\) getLastDocumentTimestamp|store\.Query\(context\.Background\(' pumps/mongo_aggregate.go
environment_note: Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source and command output.
introduced_in: inception
mitigation: Configure MongoDB client-side timeouts in the connection string until the aggregate timestamp query accepts and uses a bounded context.
remediation: Thread a caller-provided context into getLastDocumentTimestamp, use that context for m.store.Query, and add a cancellation/timeout test proving the query returns promptly when the context is canceled.
