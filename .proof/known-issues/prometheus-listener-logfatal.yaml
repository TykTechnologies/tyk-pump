id: prometheus-listener-logfatal
title: Prometheus listener failure calls log.Fatal from a goroutine
description: Prometheus Init starts http.ListenAndServe in a goroutine and wraps it with log.Fatal. A listener bind/runtime failure exits the whole process from the goroutine instead of returning an Init error or surfacing a bounded listener-lifecycle failure.
affected_requirements:
    - SYS-REQ-004
    - SW-REQ-024
evidence_manifests:
    - code_signal:process_exit_on_recoverable:pumps/prometheus.go:216
    - .proof/evidence/ki-prometheus-listener-logfatal.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored rg -n -F 'log.Fatal(http.ListenAndServe' pumps/prometheus.go
environment_note: Static source tripwire; it does not bind a listener.
introduced_in: inception
mitigation: Ensure Prometheus listen_addr/path are unique and available before starting tyk-pump; run under a process supervisor.
remediation: Construct a dedicated server, return bind failures from Init, and avoid log.Fatal from the listener goroutine.
owner: tyk-team
review_date: "2026-11-30"
release_disposition: ship_with_known_issue
status: open
history:
