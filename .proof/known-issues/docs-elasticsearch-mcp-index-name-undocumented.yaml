id: docs-elasticsearch-mcp-index-name-undocumented
title: 'Documentation gap: Elasticsearch pump mcp_index_name meta field undocumented in tyk-docs'
description: pumps/elasticsearch.go:96 declares MCPIndexName string with mapstructure tag mcp_index_name; lines 452-455 route MCP-classified records to this separate index. tyk-docs/content/shared/pump-config.md's elasticsearch meta section (~lines 740-960) does not mention this field. Operators have no way to learn that MCP records can be routed to a separate index.
affected_requirements:
    - SW-REQ-069
commands:
    - grep -n 'mcp_index_name\|MCPIndexName' /Users/buger/go/src/tyk-pump/pumps/elasticsearch.go
evidence_manifests:
    - .proof/evidence/ki-docs-elasticsearch-mcp-index-name-undocumented.yaml
severity: medium
severity_basis: risk
risk: correctness
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored bash -lc "rg -n 'MCPIndexName|mcp_index_name|getIndexNameForRecord|IsMCPRecord' pumps/elasticsearch.go pumps/elasticsearch_test.go docs/requirements/SW-REQ-069.md specs/software/requirements/SW-REQ-069.req.yaml && ! rg -n 'mcp_index_name|MCPIndexName|MCP index|mcp index' /Users/buger/go/src/tyk-docs/tyk-docs/content/shared/pump-config.md /Users/buger/go/src/tyk-docs/tyk-docs/content/api-management/tyk-pump.md"
introduced_in: inception
mitigation: Default behavior (empty mcp_index_name) routes MCP records to the same index as analytics records.
remediation: Add pumps.elasticsearch.meta.mcp_index_name entry to pump-config.md.
