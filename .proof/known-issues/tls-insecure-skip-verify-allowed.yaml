id: tls-insecure-skip-verify-allowed
title: TLS-enabled pumps allow operator configuration to skip certificate verification
description: The shared TLS helper and several pump-specific TLS configurations pass operator-controlled InsecureSkipVerify values into tls.Config. pumps/common.go:267 assigns cfg.InsecureSkipVerify, pumps/hybrid.go:191 assigns SSLInsecureSkipVerify, and the Elasticsearch/Kafka/Splunk TLS paths inherit the same operator-controlled skip-verification posture. This is a deliberate compatibility knob, but it means cert_validation_strict cannot be claimed for production configurations unless insecure skip is forbidden or constrained by policy.
affected_requirements:
    - SW-REQ-016
    - SW-REQ-021
    - SW-REQ-029
    - SW-REQ-048
    - SW-REQ-068
severity: medium
severity_basis: risk
risk: compliance
reproducer_command: rg -n "InsecureSkipVerify|SSLInsecureSkipVerify" pumps/common.go pumps/hybrid.go pumps/kafka.go pumps/splunk.go pumps/elasticsearch.go
environment_note: Static evidence is documented in this KnownIssue description; reproduce by inspecting the named source or rerunning the OpenGrep TLS skip-verification signal.
introduced_in: inception
mitigation: Operators should leave insecure skip-verification disabled in production and supply a valid CA/server name configuration for TLS-enabled pumps.
remediation: Reject insecure skip-verification in production mode, or gate it behind an explicit unsafe/debug setting with documentation and tests proving strict verification remains the default.
