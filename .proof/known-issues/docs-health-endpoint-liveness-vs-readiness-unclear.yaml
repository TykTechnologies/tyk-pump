id: docs-health-endpoint-liveness-vs-readiness-unclear
title: 'Documentation gap: tyk-docs /health description implies readiness; endpoint is actually liveness-only'
description: KI health-endpoint-is-liveness-only documents that server/server.go:49 returns 200 unconditionally — even during startup before any pump initialized. tyk-docs/content/shared/pump-config.md:5035-5050 introduces /health as 'to confirm the Pump is running' — operators reading this naturally configure it as a Kubernetes readiness probe and get false positives. The doc is technically correct but misleading.
affected_requirements:
    - SW-REQ-032
commands:
    - sed -n '5035,5055p' /Users/buger/go/src/tyk-docs/tyk-docs/content/shared/pump-config.md
evidence_manifests:
    - .proof/evidence/ki-docs-health-endpoint-liveness-vs-readiness-unclear.yaml
severity: medium
severity_basis: risk
risk: availability
reproducer_command: PATH=/Users/buger/go/bin:$PATH PROOF_MONITOR_MIN_FREE_PERCENT=3 PROOF_MONITOR_KILL_FREE_PERCENT=2 PROOF_MONITOR_KILL_SAMPLES=5 ./bin/run-monitored bash -lc "rg -n 'Healthcheck|status.*ok|liveness|readiness|health' server/server.go main.go docs/requirements/SW-REQ-032.md docs/requirements/SYS-REQ-012.md README.md config.go && rg -n 'confirm the Pump is running|/health|health_check_endpoint' /Users/buger/go/src/tyk-docs/tyk-docs/content/shared/pump-config.md && ! rg -n 'readiness|liveness' /Users/buger/go/src/tyk-docs/tyk-docs/content/shared/pump-config.md /Users/buger/go/src/tyk-docs/tyk-docs/content/api-management/tyk-pump.md"
introduced_in: inception
mitigation: KI health-endpoint-is-liveness-only is the engineering record.
remediation: Update the /health doc to make liveness-vs-readiness semantics explicit, suggest combining with an external Redis-lag check for true readiness probes.
