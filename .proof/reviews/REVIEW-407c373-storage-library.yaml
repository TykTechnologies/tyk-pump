comment: 'Commit-level assurance review for TT-10520: current proof already models storage pop/expire behavior and KI-backed retry/cancellation/wire-format gaps, but the historical storage-library migration depended on preserving legacy full-drain chunkSize=0 semantics. SW-REQ-006 now carries full_drain_semantics with direct adapter evidence that chunkSize=0 normalizes to the backend -1 sentinel and skips remainder Expire, plus live Redis evidence that full-drain leaves no list remainder. Redis Cluster/Sentinel/TLS parity remains future hardening work rather than claimed coverage.'
