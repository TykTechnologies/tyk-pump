comment: 'Commit-level assurance review for TT-6671: AWS Kinesis was an additive product backend feature, not DEFECT/DFX material. Current proof covers registry support via SW-REQ-017, default/custom Kinesis environment override behavior and batching/payload/partition semantics via SW-REQ-056, and later KMS behavior via SW-REQ-105. Live Kinesis gaps remain explicit KnownIssues, including random partition-key idempotency, zero-batch helper safety, API-level PutRecords error surfacing, per-record PutRecords failure surfacing, README env typo, and the newly recorded batch_size >500 AWS limit gap. No product runtime behavior was changed.'
