id: DEFECT-32
title: MongoAggregate mixed write discarded retained dimensions twice
introduced_in: unknown
description: |
  TT5516 (commit 2e26ba7) fixed a MongoAggregate mixed-collection data loss
  bug. When ignore_aggregations was configured, DoAggregatedWriting already
  removed ignored dimensions from the incoming update document. The historical
  mixed-collection path then discarded the same dimensions again after Mongo had
  merged and returned the aggregate document, which could erase dimension
  counters that were previously written by a non-ignoring writer.

  Current code applies DiscardAggregations once before building AsChange and
  uses the merged document only to recalculate averages.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: 2e26ba7
    reference: TT5516
    date: "2022-06-10"
classification:
    surface: data_integrity
    defect_class: mongo_aggregate_double_discard
    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: true
    notes: |
      SW-REQ-060 modeled Mongo aggregate counter upsert mechanics, and
      SW-REQ-059 modeled mixed-collection routing, but proof did not state the
      retained-dimension invariant for shared mixed aggregates when writers use
      different ignore_aggregations settings.
