schema_version: 1
id: DEFECT-36
title: Elasticsearch decode_base64 stored decoded payload bytes as binary
introduced_in: unknown
description: |
  TN-6 (commit 0adb849, merging the 416d1c7 fix) fixed Elasticsearch
  decode_base64 mapping. Before the fix, getMapping called
  base64.StdEncoding.DecodeString for raw_request and raw_response but assigned
  the returned []byte directly into the generic mapping document. Go's JSON
  encoder serializes []byte as base64, so Elasticsearch received re-encoded
  data instead of the plaintext payload the operator requested.

  Current code converts decoded bytes with string(rawRequest) and
  string(rawResponse) before assigning the mapping fields. The successful
  decode path is covered by SW-REQ-068 and direct getMapping evidence. A
  separate live malformed-input gap remains: getMapping still ignores
  DecodeString errors and emits empty/partial decoded strings; that is tracked
  as a KnownIssue, not fixed here.
