          witness: "base_metric_disabled=F, base_metric_family_absent=F => TRUE"
        - requirement: SW-REQ-090
          witness: "base_metric_disabled=T, base_metric_family_absent=F => FALSE"
        - requirement: SW-REQ-090
          witness: "base_metric_disabled=T, base_metric_family_absent=T => TRUE"
    proposed_classes:
