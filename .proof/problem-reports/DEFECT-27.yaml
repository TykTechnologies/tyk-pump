schema_version: 1
id: DEFECT-27
title: Prometheus base metric families could not be disabled
introduced_in: unknown
description: |
  TT-6799 (commit 155b05a) added Prometheus disabled_metrics support for the
  fixed built-in base metric family set. Before that change, Prometheus pump
  startup always registered all base families, and WriteData always iterated
  them through allMetrics. Operators could not remove unwanted or high-cost
  built-in families from the scrape surface.

  Current code filters built-in base metric families by exact name before
  registration. Disabled families are removed from allMetrics and therefore
  are not updated or exposed later. Custom metrics are initialized after the
  base-family filter and are not suppressed by disabled_metrics.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: 155b05a
    reference: TT-6799
    date: "2022-10-18"
classification:
    surface: config_behavior
    defect_class: prometheus_base_metric_disable_missing
    severity: low
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: true
    notes: |
      SW-REQ-024 modeled the broad Prometheus scrape endpoint and default path
      behavior but did not give disabled_metrics a first-class requirement or
      MC/DC-bearing variables. Existing tests asserted internal slice trimming,
      but the proof model did not define the exact controlled family set or the
      custom-metric non-suppression boundary.
impact_analysis:
    affected_requirements:
        - SW-REQ-024
        - SW-REQ-090
    affected_code:
        - pumps/prometheus.go
        - pumps/prometheus_test.go
hardening:
