schema_version: 1
id: DEFECT-25
title: Elasticsearch pump lacked explicit TLS skip-verify and client certificate controls
introduced_in: unknown
description: |
  TT-3067 (commit 84f3855) added Elasticsearch pump TLS configuration fields
  for use_ssl, ssl_insecure_skip_verify, ssl_cert_file, and ssl_key_file. Before
  that change, operators could not explicitly configure the Elasticsearch
  client TLS posture from pump configuration when connecting to deployments that
  required custom client certificates or compatibility with non-standard
  certificate chains.

  Current code routes Elasticsearch TLS setup through the shared NewTLSConfig
  helper, including client cert/key, CA trust roots, server-name handling, and
  explicit insecure-skip-verify. Current proof closes the ES-specific path under
  SW-REQ-068, which references the shared helper without making this ES defect
  report a closure claim over every SW-REQ-016 common-base behavior. Strict
  production certificate validation remains tracked debt under KI
  tls-insecure-skip-verify-allowed.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: 84f3855
    reference: TT-3067
    date: "2022-11-02"
classification:
    surface: config_behavior
    defect_class: elasticsearch_tls_config_knobs_missing
    severity: medium
    security_relevant: true
root_cause:
    missing_requirement: false
    missing_test_partition: false
    missing_mcdc_variable: false
    notes: |
      Current SW-REQ-068 already names Elasticsearch custom TLS configuration
      through the shared TLS helper. The proof gap for this historical row was
      traceability: SW-REQ-068 did not carry the tls_verification_explicit
      obligation even though Elasticsearch exposes SSLInsecureSkipVerify.
