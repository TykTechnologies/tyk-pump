schema_version: 1
id: DEFECT-38
title: Mongo logBrowserIndex rename conflict was treated as schema setup failure
introduced_in: unknown
description: |
  Commit 6a8ab73 fixed Mongo index setup when an equivalent logBrowserIndex
  already existed under a different name. Before the fix, both the standard and
  selective Mongo pumps returned the mgo EnsureIndex error
  "already exists with a different name" even though the existing index had the
  same key definition. Operators saw startup/write-time index errors during
  upgrades that renamed the index while preserving its content.

  Current MongoSelective still treats that compatible logBrowserIndex conflict
  as idempotent success, and this behavior is now specified under SW-REQ-035.
  Current standard Mongo avoids the historical StandardMongo case through the
  collection-exists shortcut, but non-StandardMongo compatible logBrowserIndex
  conflicts are still returned and logged; that current behavior is tracked as
  a KnownIssue rather than fixed here.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: 6a8ab73
    reference: "#234/#237"
    date: "2020-03-12"
classification:
    surface: runtime_code
    defect_class: compatible_index_rename_reported_as_failure
    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      Existing Mongo requirements mentioned baseline index creation but did not
      require schema setup to be idempotent when a compatible index already
      existed under a different name. Existing selective tests also discarded
      the returned error instead of asserting the sentinel conflict is nil.
