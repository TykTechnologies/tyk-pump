schema_version: 1
id: DEFECT-50
title: Graph SQL aggregate merged same-organisation API partitions
introduced_in: 5ccf526
description: |
  TT-100053 (commit 7af2a45) fixed Graph SQL aggregate ownership so aggregate
  rows are partitioned by API ID, not only organisation. Before the fix,
  analytics.AggregateGraphData keyed the aggregate map by OrgID and
  Graph SQL aggregate row IDs did not include APIID, so same-organisation
  GraphQL records with the same dimension/window could merge across APIs.

  Current AggregateGraphData keys graph aggregates by APIID, and
  GraphSQLAnalyticsRecordAggregate stores APIID in the persisted row. SW-REQ-043
  now states the per-(API, graph dimension) upsert contract and carries the
  aggregate_partition_isolated obligation.
