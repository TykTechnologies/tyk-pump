    date: "2023-09-18"
classification:
    surface: data_integrity
    defect_class: graph_sql_aggregate_api_partition_merge
    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      SW-REQ-043 described Graph SQL aggregate writes, but the proof model did
      not explicitly name API ownership as an aggregate partition invariant.
      Existing tests covered graph aggregate dimensions without proving
      same-org/different-API separation.
