schema_version: 1
id: DEFECT-7
title: Sharded SQL tables were created without the expected indexes
introduced_in: 544ccb3
description: |
  TT-13421 (#861, commit 544ccb3) fixed a sharded SQL schema setup gap:
  date-suffixed SQL pump tables could be created without the indexes operators
  relied on for analytics lookup and aggregate queries. The standard SQL path
  now routes shard creation through ensureTable/ensureIndex and uses
  shard-unique index names for responsecode, apikey, timestamp, apiid, orgid,
  and oauthid. SQL Aggregate uses <table>_idx_dimension for the composite
  aggregate dimension index so every shard can have its own index name.
  The current proof model now treats per-shard index creation and backend-DDL
  validity as first-class obligations instead of relying on generic
  table-sharding coverage.
source:
  type: upstream_commit
  repo: TykTechnologies/tyk-pump
  commit: 544ccb3
  reference: TT-13421
  date: "2024-12-05"
classification:
  surface: runtime_code
  defect_class: sharded_schema_index_gap
  severity: medium
  security_relevant: false
root_cause:
  missing_requirement: false
  missing_test_partition: true
  missing_mcdc_variable: false
  notes: |
    Existing sharded-table tests asserted rows/tables but did not force the
    proof model to ask whether every created shard carried the expected index
    set. The standard SQL Postgres lifecycle test already asserted every
    expected index on every shard; SQL Aggregate's sharded test now also asserts
    the per-shard composite dimension index. Graph/MCP variants and MySQL DDL
    compatibility remain tracked debt instead of being claimed as covered.
