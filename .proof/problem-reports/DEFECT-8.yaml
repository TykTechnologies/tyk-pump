  missing_mcdc_variable: false
  notes: |
    SW-REQ-066 already described the SQL Aggregate index lifecycle and tests
    asserted the index name existed. The missing partition was exact physical
    index definition evidence: the Postgres catalog was not checked for the
    documented key order that supports the dashboard query path.
