schema_version: 1
id: DEFECT-8
title: SQL Aggregate dimension index lifecycle was implicit and weakly verified
introduced_in: 657436f
description: |
  TT-9468 (#694, commit 657436f) fixed the SQL Aggregate index strategy by
  removing GORM struct-tag ownership of the aggregate dimension index and
  adding explicit ensureTable/ensureIndex behavior. The fixed path creates a
  per-table composite index named <table>_idx_dimension on
  (dimension, timestamp, org_id, dimension_value), supports
  omit_index_creation, uses PostgreSQL CONCURRENTLY, and creates the index for
  sharded SQL Aggregate tables as they are created.

  Before proof hardening, the assurance model could see that an index existed,
  but it did not make the exact composite index definition a first-class
  obligation. A regression that kept the name but changed or dropped key
  columns could therefore remain weakly modeled.
