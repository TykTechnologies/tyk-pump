    # per-{orgid,timestamp,owner_apiid} upsert), so no NEW requirement was
    # authored. root_cause.missing_test_partition was the real gap: no test
    # asserted that two APIs in one (org,timestamp) bucket produce two distinct
    # documents. Strengthened by attaching the edge_case obligation (the
    # cross-api same-bucket interaction) and annotating the regression test as
    # its example evidence so the audit enforces it henceforth.
    new_requirements: []
    strengthened_requirements:
