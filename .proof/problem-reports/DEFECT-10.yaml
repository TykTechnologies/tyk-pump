schema_version: 1
id: DEFECT-10
title: Graph SQL migration generated DDL against the wrong model table identity
introduced_in: 3bf1f85
description: |
  TT-9855 (commit 3bf1f85) fixed a Graph SQL pump startup migration failure by
  binding `analytics.GraphSQLTableName` to the configured Graph SQL table before
  GORM migrates `analytics.GraphRecord`. Without that binding,
  `GraphRecord.TableName()` fell through to the embedded `AnalyticsRecord`
  default table, so GORM schema generation could create index or relationship
  DDL against `tyk_analytics` rather than the configured Graph SQL table.

  Before proof hardening, SW-REQ-042 described Graph SQL routing and had tests
  for table existence and graph-record writes, but it did not make the
  model-table identity used during migration a first-class obligation.
source:
  type: upstream_commit
  repo: TykTechnologies/tyk-pump
  commit: 3bf1f85
  reference: TT-9855
  date: "2023-08-23"
classification:
  surface: runtime_code
  defect_class: graph_sql_migration_table_identity_gap
  severity: medium
  security_relevant: false
root_cause:
  missing_requirement: true
  missing_test_partition: true
  missing_mcdc_variable: false
  notes: |
    The Graph SQL proof model asserted that configured tables were created and
    graph records were routed, but it did not bind GraphRecord.TableName to the
    configured table before migration. The hardening adds SW-REQ-080, the
    migration_model_table_identity_bound obligation, and a Postgres Init
    witness for the configured-table binding.
