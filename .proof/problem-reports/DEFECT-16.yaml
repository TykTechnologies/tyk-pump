schema_version: 1
id: DEFECT-16
title: Mongo selective writes targeted the default collection
introduced_in: unknown
description: |
  TT-8793 (commit 1fd5ba9) fixed MongoSelective collection targeting. The pump
  grouped records by the per-organisation collection name from
  `GetCollectionName(orgid)`, but `AccumulateSet` did not stamp each DBObject's
  `CollectionName`. Storage therefore fell back to the AnalyticsRecord default
  table name (`tyk_analytics`) instead of writing to `z_tyk_analyticz_<orgid>`.

  Current proof closes this through SW-REQ-035 and `TestWriteData`, which
  writes records for OrgID `abc` and queries the derived per-org collection.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: 1fd5ba9
    reference: TT-8793
    date: "2023-04-27"
classification:
    surface: data_integrity
    defect_class: mongo_selective_collection_target_drift
    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: false
    missing_test_partition: false
    missing_mcdc_variable: false
    notes: |
      SW-REQ-035 already states the per-org collection routing contract, and
      the current test queries the derived collection rather than the default
      AnalyticsRecord collection.
