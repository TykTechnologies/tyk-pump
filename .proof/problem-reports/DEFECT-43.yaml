schema_version: 1
id: DEFECT-43
title: Influx v1 wrote cumulative batches inside the record loop
introduced_in: unknown
description: |
  Commit 51af27d fixed InfluxPump.WriteData so it writes the accumulated
  BatchPoints once after all records have been processed. Before the fix,
  c.Write(bp) was inside the per-record loop. A purge with N records therefore
  sent N backend write requests containing cumulative prefixes: the first
  request had 1 point, the second had 2 points, and so on. For large purges this
  multiplied backend load and duplicated earlier records.

  Current code adds each point to the BatchPoints inside the loop and calls
  c.Write(bp) once after the loop. SW-REQ-101 now records this as an explicit
  output-cardinality invariant under the Influx v1 parent requirement.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: 51af27d
    reference: tyk-pump#138
    date: "2019-08-13"
classification:
    surface: data_integrity
    defect_class: influx_v1_cumulative_batch_writes
    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      SW-REQ-046 already carried output_cardinality_bounded as an obligation
      and the current round-trip test covered a single-record write, but the
      product contract did not explicitly state that a multi-record purge must
      produce exactly one Influx v1 write request after accumulation.
