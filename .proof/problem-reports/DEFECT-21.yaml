schema_version: 1
id: DEFECT-21
title: Raw request and response payload decode was not configurable per pump
introduced_in: unknown
description: |
  TT-7216 (commit e2f277a) introduced per-pump raw_request_decoded and
  raw_response_decoded options so operators can choose whether each backend
  receives plaintext raw request/response payloads or the gateway-emitted
  base64 strings. Before that behavior, downstream sinks that expected
  readable payloads had no per-backend decode switch in the pump core.

  Current proof covers the system privacy contract under SYS-REQ-011 and now
  decomposes the software implementation point under SW-REQ-088. The existing
  TestDecodedKey covers request-only, response-only, both, and neither
  toggles, and the malformed-base64 test now exercises the actual per-pump
  flags rather than the deprecated global fields.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: e2f277a
    reference: TT-7216
    date: "2023-01-12"
classification:
    surface: config_behavior
    defect_class: raw_payload_decode_configuration_missing
    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: false
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      SYS-REQ-011 already modeled decode_request_enabled and
      decode_response_enabled independently, but the proof model lacked a
      dedicated SW requirement for main.filterData's per-pump decode behavior.
      SW-REQ-088 now carries that implementation-level contract and evidence.
impact_analysis:
    affected_requirements:
        - SYS-REQ-011
        - SW-REQ-001
        - SW-REQ-016
        - SW-REQ-088
    affected_code:
