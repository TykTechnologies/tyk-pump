        # analytics-timestamp-timezone-convention-unpinned is a distinct open
        # KI about AnalyticsRecord.TimeStamp lacking a UTC convention, which
        # affects which YYYYMMDD shard a record routes to. Linked for traceability.
        - analytics-timestamp-timezone-convention-unpinned
        - mapstructure-decode-silently-drops-unknown-keys
        - no-panic-recovery-in-exec-pump-writing
        # Overlap-only link required by problem_reports_reviewed because this
        # covered_by_requirement report and the active KI share SW-REQ-040.
        # It is not the root cause of this historical shard-migration defect.
        - pump-no-timeout-can-block-purge-cycle
        - pump-writedata-swallows-per-batch-errors
