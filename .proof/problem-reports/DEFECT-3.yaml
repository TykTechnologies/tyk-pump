    # creation path; INT-REQ-007 carries the SQL schema expand-then-contract
    # interface contract. The historical gap was missing_test_partition: no
    # test asserted that sharding-enabled migration work was still reached when
    # table_sharding=true. Current witnesses cover HandleTableMigration's
    # migrate-all/current-day branches and MigrateAllShardedTables' valid shard
    # discovery. Residual default-mode-only and no-schema-version behavior
    # remain KI-tracked rather than overclaimed as complete forward-compatible
    # schema policy.
    new_requirements: []
    strengthened_requirements:
        - SW-REQ-040
        - INT-REQ-007
    added_obligations:
        - requirement: SW-REQ-040
