schema_version: 1
id: DEFECT-19
title: Graph SQL aggregate sharded writes targeted the wrong table
introduced_in: unknown
description: |
  TT-7820 (commit 7fa0754) fixed Graph SQL Aggregate sharded writes. Before
  the fix, the sharding loop selected day-specific table names, but aggregation
  and writes happened outside the shard slice loop, and DoAggregatedWriting
  used analytics.AggregateGraphSQLTable rather than the caller-selected shard
  table. In sharded mode, records could therefore be aggregated across day
  slices and written/upserted to the base aggregate table or the wrong shard.

  Current proof closes this through SW-REQ-086, a child of SW-REQ-043, and
  TestGraphSQLAggregatePump_WriteData_Sharded, which enables table sharding,
  writes records from two dates, verifies both shard tables exist, verifies
  representative aggregate rows exist exactly once in each selected shard, and
  verifies the base aggregate table remains absent.

  The same upstream commit also refactored legacy raw GraphQL parsing so
  malformed parse inputs no longer dropped the entire graph record. The current
  product implementation later moved GraphRecord projection to GraphQLStats;
  that current projection path is owned by SW-REQ-013 rather than this sharded
  aggregate table-target defect.
