    requirements:
        - SW-REQ-050
    # These active SW-REQ-050 KIs are adjacent syslog/pump debts, not the
    # TT-15532 fragmentation defect fixed by escaped raw HTTP newlines.
    known_issues:
        - mapstructure-decode-silently-drops-unknown-keys
        - pump-no-timeout-can-block-purge-cycle
        - pump-writedata-swallows-per-batch-errors
        - pumps-logfatal-on-config-decode
        - syslog-init-logfatal-on-invalid-transport
        - syslog-initwriter-logfatal-on-dial-error
    evidence:
