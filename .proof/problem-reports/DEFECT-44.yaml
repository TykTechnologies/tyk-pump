schema_version: 1
id: DEFECT-44
title: Mongo aggregate mixed collection lost Lists projection data
introduced_in: unknown
description: |
  Commit d4d1cf7 restored the Lists field on AnalyticsRecordAggregate after an
  earlier change removed it. Without that field, aggregate documents written to
  the shared mixed Mongo aggregate collection did not preserve the list
  projection used by dashboard listing queries, even though the aggregate
  dimension counters existed.

  Current AnalyticsRecordAggregate carries Lists as AggregateFieldList, and
  AsTimeUpdate writes lists.* fields derived from aggregate counters. SW-REQ-102
  now makes the full restored Lists persistence shape explicit, with live
  readback evidence for per-org and mixed aggregate documents.
source:
    type: upstream_commit
