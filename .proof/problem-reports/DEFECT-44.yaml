    reference: tyk-pump#135
    date: "2019-08-08"
classification:
    surface: data_integrity
    defect_class: mongo_aggregate_lists_projection_dropped
    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      SW-REQ-059 modeled mixed collection routing and later tests asserted
      aggregate counters, but the Lists projection was not an explicit
      software requirement. Existing mixed-collection evidence now asserts
      Lists.APIKeys readback and is bound to SW-REQ-102.
