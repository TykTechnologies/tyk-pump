schema_version: 1
id: DEFECT-14
title: Standard Mongo excluded GraphQL-classified records
introduced_in: c54eed3
description: |
  PR #638 (commit 0ed84b9) fixed standard Mongo writes so
  GraphQL-classified non-MCP analytics records were no longer excluded from the
  standard collection. The earlier c54eed3 graph-separation change skipped
  records carrying the legacy `tyk-graph-analytics` tag, because
  `IsGraphRecord()` was tag-based at that point. In current code the equivalent
  graph predicate is `GraphQLStats.IsGraphQL`; a recurrence would again make
  operators lose GraphQL traffic from the standard Mongo analytics collection
  unless they also depended on the graph-specific pump.

  Current proof now closes this defect through SW-REQ-082: standard Mongo must
  insert every valid non-MCP analytics record into the standard collection,
  including ordinary records and records whose GraphQLStats mark them as
  GraphQL. The same requirement also catches the later 0ed84b9 regression
  recorded as DEFECT-13.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: 0ed84b9
    reference: PR-638
    date: "2023-05-17"
classification:
    surface: data_integrity
    defect_class: mongo_standard_graph_records_excluded
    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      The original skip policy treated graph-classified records as outside the
      standard Mongo contract. At c54eed3 that classification came from the
      legacy graph tag; in current code it comes from GraphQLStats.IsGraphQL.
      SW-REQ-082 now makes the inclusion policy explicit and requires evidence
      for both ordinary and GraphQL-classified non-MCP records.
