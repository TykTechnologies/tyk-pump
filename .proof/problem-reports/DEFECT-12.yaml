    detail: |
      Added config_file_omission_suppresses_file_read and a focused
      TestIgnoreConfig subtest that captures loader logs while
      TYK_PMP_OMITCONFIGFILE=true and the config path is nonexistent. The test
      proves existing defaults are preserved and misleading file-read/unmarshal
      errors are not emitted.
