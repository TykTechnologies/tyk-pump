schema_version: 1
id: DEFECT-12
title: Omit-config-file mode did not prove missing-file log suppression
introduced_in: 6820131
description: |
  TT-9126 (commit 6820131) fixed env-only startup with
  `TYK_PMP_OMITCONFIGFILE=true` by skipping config-file read and unmarshal
  entirely. The original bug emitted misleading "Couldn't load configuration
  file" and "Couldn't unmarshal configuration" errors even though the operator
  explicitly chose to omit the file.

  Before this hardening pass, current proof already modeled the omit-config
  branch through SW-REQ-002 and caught the destructive old behavior that cleared
  caller defaults. It did not directly assert the ticket-title observability
  behavior: omit=true with a nonexistent config path must not emit file-read or
  JSON-unmarshal error logs.
source:
  type: upstream_commit
  repo: TykTechnologies/tyk-pump
  commit: 6820131
  reference: TT-9126
  date: "2023-06-12"
classification:
  surface: runtime_code
  defect_class: config_omit_file_false_error_log
  severity: low
  security_relevant: false
root_cause:
  missing_requirement: false
  missing_test_partition: true
  missing_mcdc_variable: false
  notes: |
    SW-REQ-002 already modeled the omit-config-file gate and had strong MC/DC
    alignment for LoadConfig. The missing piece was an observability assertion
    that no missing-file/unmarshal error is emitted when file omission is
    intentional.
impact_analysis:
