schema_version: 1
id: DEFECT-13
title: Standard Mongo WriteData used graph-only accumulation
introduced_in: 0ed84b9
description: |
  TT-8884 (commit 2d3c296) fixed standard Mongo writes by removing the
  graph-only accumulation constraint from `MongoPump.WriteData`. Before that
  fix, the standard Mongo pump called `AccumulateSet(data, true)`, which is the
  graph-only mode, so ordinary non-MCP analytics records were skipped before
  insertion into the standard collection.

  The graph-only call was introduced by commit 0ed84b9 while fixing the older
  defect where standard Mongo excluded GraphQL-classified records. The later
  TT-8884 fix kept GraphQL-classified records included while restoring ordinary
  record insertion.

  Current live Mongo evidence would catch the recurrence, because
  `TestMongoPump_WriteData` writes ordinary records and GraphQL-classified
  non-MCP records through the standard Mongo storage path and asserts they are
  present in the configured collection. The proof model still needed a direct
  requirement because SW-REQ-034's formal contract only modeled MCP filtering,
  not the standard-pump inclusion rule for ordinary and GraphQL-classified
  non-MCP records.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: 2d3c296
    reference: TT-8884
    date: "2023-05-25"
classification:
    surface: data_integrity
    defect_class: mongo_standard_graph_only_accumulation
    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: false
    missing_mcdc_variable: true
    notes: |
      The regression witness already existed as a live Mongo test, but the
      formal proof model attached it to SW-REQ-034's MCP filter contract. The
      product rule "standard Mongo inserts every valid non-MCP analytics
      record, including GraphQL-classified records" is now represented by
      SW-REQ-082 with explicit MC/DC variables.
