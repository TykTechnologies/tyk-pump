schema_version: 1
id: DEFECT-31
title: filterData mutated the shared fan-out batch
introduced_in: unknown
description: |
  TT-5776 (commit df6d589) fixed a fan-out data-isolation bug in main.filterData.
  Before the fix, filterData used `filteredKeys := keys[:]` and then wrote each
  backend's filtered/transformed records into that slice. Because this reused
  the caller's backing array, one pump's filter, omit-detailed-recording, trim,
  ignore-fields, or decode path could mutate the shared decoded batch observed
  by sibling pump goroutines.

  Current code allocates a new slice and copies the input before writing the
  backend-specific view, so the caller's dispatch batch remains unchanged.
