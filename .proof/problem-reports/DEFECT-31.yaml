    missing_mcdc_variable: false
    notes: |
      SW-REQ-075 modeled per-backend error/timeout independence and
      SW-REQ-010/SW-REQ-076 modeled filter/privacy semantics, but proof did not
      make per-backend input isolation first-class. The existing multi-pump
      filter test asserted counts, not that a filtering pump left the shared
