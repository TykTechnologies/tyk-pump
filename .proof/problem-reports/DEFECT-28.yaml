schema_version: 1
id: DEFECT-28
title: Prometheus histogram type label schema was not normalized before observation
introduced_in: unknown
description: |
  TT-6482 (commit 97bbecc) fixed Prometheus histogram label handling. Histogram
  observation prepends a synthetic latency type value such as total, upstream,
  or gateway, so the registered label schema must contain exactly one "type"
  label at position 0. Before the fix, custom histogram labels could omit
  type, put type in another position, or repeat type, causing observe-time
  label cardinality errors or values bound to the wrong label names.

  Current code calls ensureLabels before histogram registration. The helper
  removes all configured type labels and prepends exactly one type label,
  preserving the relative order of all configured non-type labels. Counter
  metrics are not modified by this histogram-specific normalization.
