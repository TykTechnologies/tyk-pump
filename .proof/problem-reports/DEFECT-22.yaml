schema_version: 1
id: DEFECT-22
title: Demo mode records used wall-clock timestamps instead of synthetic generated-hour timestamps
introduced_in: unknown
description: |
  TT-5426 (commit ca44921) fixed demo data generation so every generated
  AnalyticsRecord receives a TimeStamp inside the requested synthetic demo hour.
  Before the fix, WriteDemoData rewrote Day, Month, Year, and Hour from the
  synthetic hour, but TimeStamp remained the wall-clock value assigned by
  GenerateRandomAnalyticRecord. Backends that aggregate, shard, or query by
  TimeStamp could therefore see demo records clumped at generation time while
  the denormalized date fields claimed a different hour.

  Current proof now decomposes the demo timestamp behavior under SW-REQ-089 and
  pins the historical regression with
  TestWriteDemoDataAssignsSyntheticTimestampsAcrossHour.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: ca44921
    reference: TT-5426
    date: "2022-11-23"
classification:
    surface: data_integrity
    defect_class: demo_timestamp_generation_mismatch
    severity: low
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      Demo generation had been traced to SW-REQ-009, which is about deterministic
      AnalyticsRecord field-name/value accessors. That owner would not catch a
      mismatch between synthetic demo date fields and TimeStamp. SW-REQ-089 now
      owns the demo generated-hour timestamp contract directly.
