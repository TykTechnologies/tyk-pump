schema_version: 1
id: DEFECT-35
title: Syslog pump did not inherit omit-detailed-recording configuration
introduced_in: unknown
description: |
  Commit 34e1a2c fixed the Syslog pump's omit_detailed_recording behavior by
  embedding CommonPumpConfig in SyslogPump. Before the fix, syslog did not
  expose the shared SetOmitDetailedRecording/GetOmitDetailedRecording surface
  used by main.filterData, so a syslog backend could receive raw_request and
  raw_response payload bytes even when the operator enabled per-pump
  omit_detailed_recording.

  Current code embeds CommonPumpConfig, main.filterData clears RawRequest and
  RawResponse for the syslog pump when the per-pump flag is set, and the syslog
  backend output contains the redacted empty fields rather than the original
  payload bytes.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: 34e1a2c
    reference: omit_detailed_recording_syslog
    date: "2020-08-19"
classification:
    surface: security_behavior
    defect_class: backend_privacy_transform_not_applied
    severity: high
    security_relevant: true
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      SYS-REQ-015 covered the generic privacy transform and SW-REQ-016 covered
      common pump setters/getters, but SW-REQ-050 did not state that the syslog
      backend output must reflect per-pump omit-detailed-recording. Existing
      syslog tests covered output shape and newline escaping, not privacy
      redaction at the backend boundary.
impact_analysis:
    affected_requirements:
        - SYS-REQ-015
        - SW-REQ-050
    affected_code:
        - main.go
        - main_test.go
        - pumps/syslog.go
        - pumps/common.go
hardening:
