        - pump-writedata-swallows-per-batch-errors
        - pump-no-timeout-can-block-purge-cycle
        - pumps-logfatal-on-config-decode
        - syslog-init-logfatal-on-invalid-transport
        - syslog-initwriter-logfatal-on-dial-error
    evidence:
        verified_by:
            - main_test.go:TestSyslogPump_OmitDetailedRecordingRedactsForwardedPayloads
            - main_test.go:TestOmitDetailsFilterData
        notes: |
            The syslog regression evidence now checks both the core filtered
