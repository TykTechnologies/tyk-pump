schema_version: 1
id: DEFECT-15
title: Prometheus aggregation split label values containing the internal separator
introduced_in: 2622d9b
description: |
  TT-876 (commit 8173c7e) fixed Prometheus in-memory metric aggregation that
  used `strings.Join(labelValues, "--")` as the map key and later reconstructed
  labels with `strings.Split(key, "--")`. If an API ID, path, alias, key, or
  other label value contained `--`, expose-time code could split one logical
  label value into multiple labels, corrupting the label tuple and failing to
  represent the original metric series.

  The current implementation still uses a joined key for aggregation identity,
  but stores the original `labelValues` alongside the counter/histogram state
  and replays those stored values on expose. SW-REQ-083 makes that
  tuple-boundary preservation explicit for both counter and aggregated
  histogram paths; the broader risk that operators may configure unbounded
  high-cardinality labels remains KI-backed debt.
