    requirements:
        - SW-REQ-024
        - SW-REQ-094
    known_issues:
        - mapstructure-decode-silently-drops-unknown-keys
        - metrics-label-cardinality-unbounded
        - no-panic-recovery-in-exec-pump-writing
        - prometheus-init-mutates-default-mux
        - prometheus-metric-maps-race
        - prometheus-metrics-auth-not-enforced
        - pumps-logfatal-on-config-decode
    evidence:
        verified_by:
            - pumps/prometheus_test.go:TestPrometheusInitCustomMetrics
        requirement_mcdc_witnesses:
            - requirement: SW-REQ-094
              witness: "custom_metric_instances_preserved=F, valid_custom_metrics_configured=F => TRUE (no valid custom metric exists, so there is no instance identity to preserve)"
            - requirement: SW-REQ-094
              witness: "custom_metric_instances_preserved=F, valid_custom_metrics_configured=T => FALSE (violation row: valid configured custom metrics collapse into one runtime identity or are skipped by an invalid sibling)"
            - requirement: SW-REQ-094
              witness: "custom_metric_instances_preserved=T, valid_custom_metrics_configured=T => TRUE (valid custom metrics retain distinct runtime identities)"
        obligation_evidence:
