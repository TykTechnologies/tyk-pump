schema_version: 1
id: DEFECT-30
title: Prometheus custom metrics reused the range variable address
introduced_in: unknown
description: |
  TT-6343 (commit 1cdc76c) fixed Prometheus custom metric initialization.
  Before the fix, InitCustomMetrics iterated configured custom metrics with a
  Go range value and appended the address of that loop variable. Multiple
  configured metrics could therefore collapse into one runtime metric identity
  rather than preserving distinct configured custom metrics.

  The same fix kept invalid custom metric definitions non-blocking: an invalid
  metric logs an initialization error and is skipped, while valid siblings are
  still initialized and appended.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: 1cdc76c
    reference: TT-6343
    date: "2022-08-19"
classification:
    surface: data_integrity
    defect_class: prometheus_custom_metric_identity_collapsed
    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: true
    notes: |
      SW-REQ-024 modeled broad Prometheus metric exposition, but did not make
      custom metric instance identity a first-class contract. The existing
      InitCustomMetrics test checked only the count of appended metrics; the
      historical identity-collapse bug can preserve count while losing names,
      labels, and collectors.
impact_analysis:
    affected_requirements:
        - SW-REQ-024
        - SW-REQ-094
    affected_code:
        - pumps/prometheus.go
        - pumps/prometheus_test.go
hardening:
    new_requirements:
        - SW-REQ-094
    strengthened_requirements:
        - SW-REQ-024
    added_obligations:
        - requirement: SW-REQ-094
          obligation_class: custom_metric_identity_preserved
    regression_tests:
        - pumps/prometheus_test.go:TestPrometheusInitCustomMetrics
    mcdc_witnesses:
        - requirement: SW-REQ-094
          witness: "custom_metric_instances_preserved=F, valid_custom_metrics_configured=F => TRUE"
        - requirement: SW-REQ-094
          witness: "custom_metric_instances_preserved=F, valid_custom_metrics_configured=T => FALSE"
        - requirement: SW-REQ-094
          witness: "custom_metric_instances_preserved=T, valid_custom_metrics_configured=T => TRUE"
    proposed_classes:
        - custom_metric_identity_preserved
disposition:
