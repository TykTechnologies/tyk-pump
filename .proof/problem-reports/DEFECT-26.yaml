schema_version: 1
id: DEFECT-26
title: Graph Mongo records lost raw payloads when max_document_size_bytes was exceeded
introduced_in: unknown
description: |
  TT-6012 (commit ff7574e) fixed a historical Graph Mongo failure mode where
  MongoPump.AccumulateSet applied the standard Mongo max_document_size_bytes
  raw-body rewrite to graph records. Oversized graph analytics records had
  RawRequest cleared and RawResponse replaced with a diagnostic string before
  the graph pump consumed the accumulated records, causing graph payload loss
  and, in the legacy raw-parser architecture, graph conversion failures.

  Current code uses AnalyticsRecord.GraphQLStats as the authoritative graph
  projection source, but GraphRecord still embeds the AnalyticsRecord. Graph
  Mongo therefore keeps the graph-mode boundary explicit: GraphQLStats-backed
  records are filtered through AccumulateSet(data, true), non-graph records are
  skipped, and RawRequest/RawResponse remain unchanged even when their size
  exceeds MaxDocumentSizeBytes.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: ff7574e
    reference: TT-6012
    date: "2022-10-25"
classification:
    surface: data_integrity
    defect_class: graph_mongo_payload_size_policy
    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      SW-REQ-034 modeled the standard Mongo raw-body rewrite, and SW-REQ-037
      modeled Graph Mongo forwarding, but SW-REQ-037 did not explicitly own
      the graph-mode exception to MaxDocumentSizeBytes as a boundary
      obligation. The existing AccumulateSetIgnoreDocSize regression test used
      a legacy graph tag, which is no longer the current graph predicate, so it
      could pass without retaining any graph record.
