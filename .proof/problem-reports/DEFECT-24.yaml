schema_version: 1
id: DEFECT-24
title: Mongo aggregate documents exceeded backend max size without self-healing
introduced_in: unknown
description: |
  TT-506 (commit d13b62e) fixed a historical MongoAggregate failure mode where
  high-cardinality aggregate documents could grow past the MongoDB 16 MiB
  document limit (or equivalent CosmosDB/DocumentDB max-update limits) and keep
  failing in the same aggregation window.

  The fix added configurable aggregation windows and self-healing: when a
  backend size-limit error is classified and self-healing is enabled, the pump
  halves AggregationTime, resets the last-document timestamp tracker, and
  retries the same input so future writes form smaller aggregate documents.
  Current proof coverage models this behavior in SW-REQ-058 and SW-REQ-062.
source:
    type: upstream_commit
    repo: TykTechnologies/tyk-pump
    commit: d13b62e
    reference: TT-506
    date: "2022-11-02"
classification:
    surface: error_handling
    defect_class: mongo_aggregate_document_size_self_heal_missing
    severity: medium
    security_relevant: false
root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      The historical model had no explicit requirement for backend max-document
      size recovery and no bounded evidence that size-limit classification
      changed the future aggregation bucket. Current SW-REQ-062 covers the
      self-heal predicate and side effects without requiring a 16 MiB stress
      test.
