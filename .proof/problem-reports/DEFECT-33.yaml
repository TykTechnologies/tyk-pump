root_cause:
    missing_requirement: true
    missing_test_partition: true
    missing_mcdc_variable: false
    notes: |
      Standard and selective Mongo requirements described broad write behavior,
      while aggregate index behavior was modeled separately. Proof did not make
      the backend-specific DocumentDB index compatibility rule explicit across
      all three affected ensureIndexes implementations.
