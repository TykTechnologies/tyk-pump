id: DEFECT-33
title: Mongo DocumentDB index ensure used collection-listing shortcut
introduced_in: unknown
description: |
  TT-5302 (commit 224f919) fixed a DocumentDB compatibility defect in the
  Mongo, MongoSelective, and MongoAggregate index ensure paths. Before the fix,
  ensureIndexes used the collection-exists probe for every Mongo-compatible
  backend. The historical probe used CollectionNames(), which leaked cursors on
  DocumentDB, and an existing DocumentDB collection could incorrectly skip Tyk's
  baseline index creation.

  Current code runs the collection-exists shortcut only for StandardMongo,
  honors OmitIndexCreation explicitly, and creates foreground indexes for
  DocumentDB.
