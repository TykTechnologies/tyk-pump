rules:
  - id: go.process.shell-interpreter
    message: Shell interpreter execution may require argument-safety and cancellation evidence when inputs cross a trust boundary.
    languages: [go]
    severity: WARNING
    metadata:
      proof:
        signal_id: process.shell_interpreter
        provider: opengrep
        tags: [process_dependency, command_execution]
        confidence: low
    pattern-either:
      - pattern: exec.Command("sh", "-c", ...)
      - pattern: exec.Command("bash", "-c", ...)
      - pattern: exec.Command("cmd", "/c", ...)
      - pattern: exec.Command("powershell", "/c", ...)
      - pattern: exec.Command("powershell", "-Command", ...)
      - pattern: exec.Command("pwsh", "-Command", ...)
      - pattern: exec.CommandContext($CTX, "sh", "-c", ...)
      - pattern: exec.CommandContext($CTX, "bash", "-c", ...)
      - pattern: exec.CommandContext($CTX, "cmd", "/c", ...)
      - pattern: exec.CommandContext($CTX, "powershell", "/c", ...)
      - pattern: exec.CommandContext($CTX, "powershell", "-Command", ...)
      - pattern: exec.CommandContext($CTX, "pwsh", "-Command", ...)

  - id: go.process.exec-wrapper
    message: Project-specific process wrapper starts a subprocess; require timeout/cancellation and argument-safety evidence.
    languages: [go]
    severity: WARNING
    metadata:
      proof:
        signal_id: process.exec_wrapper
        provider: opengrep
        tags: [process_dependency, command_execution]
        obligations: [external_call_timeout_bounded, malformed_input]
        confidence: medium
    pattern-either:
      - pattern: $X.exec.Command(...)
      - pattern: $X.execCommand(...)

  - id: go.net.lookup-then-dial
    message: DNS lookup is separated from later network use; require DNS pinning or private-network policy evidence.
    languages: [go]
    severity: WARNING
    metadata:
      proof:
        signal_id: network.lookup_then_connect
        provider: opengrep
        tags: [http_client, network_boundary]
        obligations: [ssrf_protection, redirect_policy_explicit]
        confidence: medium
    pattern-either:
      - pattern: |
          net.LookupHost($HOST)
          ...
          http.Get($URL)
      - pattern: |
          net.LookupHost($HOST)
          ...
          http.NewRequest(..., $URL, ...)
      - pattern: |
          net.LookupIP($HOST)
          ...
          net.Dial($NETWORK, $ADDR)

  - id: go.boundary.slice-range-boundary-fields
    message: Slice range uses boundary-shaped fields; require bounds and integer-width evidence for the field source.
    languages: [go]
    severity: WARNING
    metadata:
      proof:
        signal_id: go.integer_narrowing_index
        provider: opengrep
        tags: [panic_safety]
        obligations: [boundary, overflow_safety]
        confidence: medium
    pattern-either:
      - pattern: $BUF[$R.Start:$R.End]
      - pattern: $BUF[$R.Offset:$R.End]
      - pattern: $BUF[$R.Start:$R.Length]
      - pattern: $BUF[$R.Offset:$R.Length]
      - pattern: $BUF[$R.Start:$R.Len]
      - pattern: $BUF[$R.Offset:$R.Len]

  - id: go.boundary.unchecked-tail-access
    message: Slice or array tail access uses len(x)-N without an obvious nearby length guard.
    languages: [go]
    severity: WARNING
    metadata:
      proof:
        signal_id: go.unchecked_slice_tail_access
        provider: opengrep
        tags: [panic_safety]
        obligations: [boundary, nil_safety, panic_free_input_handling]
        confidence: medium
    patterns:
      - pattern-either:
          - pattern: return $X[len($X)-$N]
          - pattern: $Y := $X[len($X)-$N]
          - pattern: $Y = $X[len($X)-$N]
          - pattern: $Y := &$X[len($X)-$N]
          - pattern: $Y = &$X[len($X)-$N]
          - pattern: $Y, $OK := $X[len($X)-$N].($T)
          - pattern: $Y, $OK = $X[len($X)-$N].($T)
          - pattern: $A, $B := $X[0], $X[len($X)-$N]
          - pattern: $A, $B = $X[0], $X[len($X)-$N]
      - metavariable-comparison:
          metavariable: $N
          comparison: int($N) > 0
      - pattern-not-inside: |
          func $F(...) {
            if len($X) == 0 { return ... }
            ...
            $X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) {
            if len($X) == 0 { return }
            ...
            $X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) {
            if ... || len($X) == 0 { return ... }
            ...
            $X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) $RET {
            if len($X) == 0 { return ... }
            ...
            $X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) $RET {
            if ... || len($X) == 0 { return ... }
            ...
            $X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) {
            if len($X) < 2 { return ... }
            ...
            $X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) $RET {
            if len($X) < $N { return ... }
            ...
            return $X[len($X)-$N]
          }
      - pattern-not-inside: |
          func $F(...) $RET {
            if len($X) <= $N { return ... }
            ...
            return $X[len($X)-$N]
          }
      - pattern-not-inside: |
          func $F(...) {
            if len($X) < 2 { continue }
            ...
            $X[len($X)-1]
          }
      - pattern-not-inside: |
          for ... {
            if len($X) < 2 { continue }
            ...
            $X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) $RET {
            if len($X) < 2 { return ... }
            ...
            $X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) {
            if len($X) <= 2 { return ... }
            ...
            $X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) $RET {
            if len($X) <= 2 { return ... }
            ...
            $X[len($X)-1]
          }
      - pattern-not-inside: |
          if len($X) > 0 {
            ...
            $X[len($X)-1]
            ...
          }
      - pattern-not-inside: |
          if len($X) >= 1 {
            ...
            $X[len($X)-1]
            ...
          }
      - pattern-not-inside: |
          if len($X) >= 2 {
            ...
            $X[len($X)-1]
            ...
          }
      - pattern-not-inside: |
          if len($X) < 2 || $X[len($X)-1] == ... {
            ...
          }
      - pattern-not-inside: |
          if len($X) < 2 || $X[len($X)-1] != ... {
            ...
          }
      - pattern-not-inside: |
          func $F(...) {
            if len($Y) == 0 { return ... }
            ...
            $X := $Y[:1]
            ...
            $X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) $RET {
            if len($Y) == 0 { return ... }
            ...
            $X := $Y[:1]
            ...
            $X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) $RET {
            $X := append(...)
            ...
            return $X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) $RET {
            $X := append(...)
            ...
            return $X[len($X)-2]
          }
      - pattern-not-inside: |
          func $F(...) {
            $X = append($X, ...)
            ...
            &$X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) $RET {
            $X = append($X, ...)
            ...
            &$X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) $RET {
            $X = append($X, ...)
            ...
            return $X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) {
            $X = append($X, ...)
            ...
            return $X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) $RET {
            $X := append(...)
            ...
            $Y := $X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) {
            $X := append(...)
            ...
            $Y := $X[len($X)-1]
          }
      - pattern-not-inside: |
          func $F(...) {
            $X = append($X, ...)
            ...
            &$X[len($X)-1]
          }
      - pattern-not-inside: |
          $X := strings.Split(...)
          ...
      - pattern-not-inside: |
          $X = strings.Split(...)
          ...
      - pattern-not-inside: |
          $X := strings.SplitN(...)
          ...
      - pattern-not-inside: |
          $X = strings.SplitN(...)
          ...
      - pattern-not-inside: |
          $X := strings.Fields(...)
          ...
      - pattern-not-inside: |
          $X = strings.Fields(...)
          ...
      - pattern-not-inside: |
          $X := strings.FieldsFunc(...)
          ...
      - pattern-not-inside: |
          $X = strings.FieldsFunc(...)
          ...
