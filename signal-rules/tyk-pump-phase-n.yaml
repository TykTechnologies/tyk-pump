rules:
  - id: go.pkgvar.mutated-without-sync
    # overrides: intentional replacement of the same-id builtin go/default rule
    #   (tyk-pump-tuned patterns); declares the provider-rule replacement so the
    #   signal-rule validator does not abort on the duplicate provider rule id.
    overrides: ["opengrep:go.pkgvar.mutated-without-sync"]
    severity: WARNING
    languages: [go]
    message: |
      Package-level mutable variable is assigned from a method body. Without
      explicit synchronisation (sync.Mutex, atomic, or channel ownership) the
      read/write pair is a data race when the method may be invoked from
      multiple goroutines. Move the state behind a Mutex, use sync/atomic, or
      scope it to a struct field with a documented owner.
    metadata:
      proof:
        signal_id: tyk_pump.pkgvar_mutated_without_sync_tuned
        provider: opengrep
        tags: [concurrent, process_local]
        obligations: [concurrent]
        confidence: medium
        notes: |
          Fires when an identifier matching a singleton-style suffix
          (Singleton/Instance/Global/Connector/Conn/Pool/Once/Registry) is
          assigned via `=` (not `:=`) inside a receiver method. FP risk: a
          local variable that happens to end in one of those suffixes
          (e.g. `httpClient` is safe, but `customSingleton :=` followed by
          `customSingleton =` would match). To minimise FPs the rule pairs
          with metavariable-regex on the LHS identifier and excludes calls
          inside sync.Once.Do, atomic.Store*, and any function whose body
          opens with a Mutex.Lock.
    paths:
      exclude:
        - "*_test.go"
        - "cmd/**"
        - "main.go"
    patterns:
      - pattern-either:
          - pattern: |
              func ($RECV $T) $M(...) error {
                ...
                $PKGVAR = $V
                ...
              }
          - pattern: |
              func ($RECV $T) $M(...) {
                ...
                $PKGVAR = $V
                ...
              }
          - pattern: |
              func ($RECV $T) $M(...) ($A, $B) {
                ...
                $PKGVAR = $V
                ...
              }
      - metavariable-regex:
          metavariable: $PKGVAR
          regex: '^[a-z][A-Za-z0-9]*(Singleton|Instance|Connector|Registry|Global)$'
      - pattern-not-inside: |
          func ($RECV $T) $M(...) {
            ...
            $MU.Lock()
            ...
          }
      - pattern-not-inside: |
          func ($RECV $T) $M(...) error {
            ...
            $MU.Lock()
            ...
          }
      - pattern-not-inside: |
          $ONCE.Do(func() {
            ...
          })
      - pattern-not: atomic.StorePointer(...)
      - pattern-not: atomic.StoreInt32(...)
      - pattern-not: atomic.StoreInt64(...)
      - pattern-not: atomic.StoreUint32(...)
      - pattern-not: atomic.StoreUint64(...)
  - id: go.dial-return-without-close
    # overrides: intentional replacement of the same-id builtin go/default rule
    #   (tyk-pump-tuned patterns); declares the provider-rule replacement so the
    #   signal-rule validator does not abort on the duplicate provider rule id.
    overrides: ["opengrep:go.dial-return-without-close"]
    severity: ERROR
    languages: [go]
    message: |
      A net.Conn returned by a custom dialer (closure-shaped, where conn IS
      the success-return value) writes a setup payload in a loop. The
      Write's error arm returns `(nil, err)` without first calling
      `conn.Close()`. The connection (and its socket / FD / TLS session)
      leaks. Add `defer conn.Close()` immediately after the successful dial,
      OR explicit Close() before the return-on-error in the loop.
    metadata:
      proof:
        signal_id: tyk_pump.dial_return_without_close_tuned
        provider: opengrep
        tags: [http_client, network_boundary]
        obligations: [external_call_failure_observable]
        confidence: high
        notes: |
          Anchored on the closure / method shape that returns
          `(conn net.Conn, err error)` and contains a `for $_, $V := range
          $INIT { if $_, $E := conn.Write($V); $E != nil { return nil, $E
          } }` initialiser. pattern-not handles the safe case where defer
          conn.Close() appears between the dial and the write. Custom
          dialer callbacks (the tyk-pump hybrid dialer) where the conn IS
          the returned value to the caller still match — that is the bug
          shape we want.
    paths:
      exclude:
        - "*_test.go"
        - "cmd/**"
        - "main.go"
    patterns:
      - pattern-either:
          - pattern: |
              return func($A string) (conn net.Conn, err error) {
                ...
                for $K, $V := range $INIT {
                  if $X, $E2 := conn.Write($V); $E2 != nil {
                    return nil, $E2
                  }
                }
                ...
              }
          - pattern: |
              func ($R $RT) $M(...) (conn net.Conn, err error) {
                ...
                for $K, $V := range $INIT {
                  if $X, $E2 := conn.Write($V); $E2 != nil {
                    return nil, $E2
                  }
                }
                ...
              }
      - pattern-not: |
          conn, err = $D.Dial(...)
          ...
          defer conn.Close()
      - pattern-not: |
          conn, err = tls.DialWithDialer(...)
          ...
          defer conn.Close()
  # ──────────────────────────────────────────────────────────────────────
  # Phase R dogfood. Every rule below binds via obligations: (no proposes_class
  # remains). The bindings fall into two groups:
  #   (a) Shipped-catalog classes — go.tls-skip-verify-config binds to the
  #       shipped domain class cert_validation_strict (exact match: a config-
  #       driven InsecureSkipVerify is precisely "TLS verification disabled").
  #   (b) Project overlay classes in .proof/catalog/property/ — 11 genuinely
  #       novel failure-mode classes with no shipped equivalent: the time-
  #       correctness family (dst_transition_safe, tz_explicit,
  #       temporal_window_inclusive, clock_skew_tolerated), the fanout-failure
  #       family (cascade_circuit_breaker, failure_independence_proven,
  #       partial_progress_observable, fanout_panic_isolated,
  #       per_pump_circuit_breaker), the component-exit class
  #       (process_exit_on_recoverable), and the retry-deadline class
  #       (retry_budget_bounded — distinct from the shipped retry_policy_explicit,
  #       which is HTTP-client policy declaration, not the count-vs-deadline bound).
  # These overlay classes are the legitimate blind-spot-loop output; the .gitignore
  # tracks .proof/catalog/ so they commit and the pack stays bindable on a clean
  # checkout. obligations: fail-validates at load time, so deleting any overlay
  # without a shipped replacement would re-block this pack.
  # ──────────────────────────────────────────────────────────────────────
  - id: go.sql-aggregate-upsert-without-table-target
    severity: WARNING
    languages: [go]
    message: |
      SQL aggregate upsert builds conflict-update assignments for a caller
      supplied table but the GORM insert chain does not bind the insert target
      with `.Table(table)`. In sharded mode this writes to the model default
      table instead of the selected shard, or fails when that base table is
      absent. Bind the selected routing target into the insert call.
    metadata:
      proof:
        signal_id: go.sql_aggregate_upsert_without_table_target
        provider: opengrep
        confidence: high
        framework_hints:
          - CWE-669
          - CWE-697
        notes: |
          TT-16778 / upstream commit 140ef71 fixed this exact shape by changing
          c.db.WithContext(ctx).Clauses(...).Create(...) to
          c.db.WithContext(ctx).Table(table).Clauses(...).Create(...). The rule
          intentionally matches the unsafe GORM chain where OnConflictAssignments
          receives the selected table but the insert target is not bound to it.
        obligations: [routing_target_consistent]
    paths:
      include:
        - "pumps/sql_aggregate.go"
      exclude:
        - "*_test.go"
        - "vendor/**"
    patterns:
      - pattern: |
          $DB.WithContext($CTX).Clauses(clause.OnConflict{
            Columns: $COLS,
            DoUpdates: clause.Assignments(analytics.OnConflictAssignments($TABLE, $EXCLUDED)),
          }).Create($RECS)
  - id: go.graph-sql-migration-without-table-binding
    severity: WARNING
    languages: [go]
    message: |
      Graph SQL migration runs AutoMigrate/HandleTableMigration for
      analytics.GraphRecord without first binding analytics.GraphSQLTableName
      to the configured Graph SQL table. GORM may consult GraphRecord.TableName
      while generating table, index, or relationship DDL; if the model hook
      falls through to AnalyticsRecord's default table, startup can generate
      DDL against tyk_analytics instead of the configured graph table.
    metadata:
      proof:
        signal_id: go.graph_sql_migration_without_table_binding
        provider: opengrep
        confidence: high
        framework_hints:
          - CWE-669
          - CWE-697
        notes: |
          TT-9855 / upstream commit 3bf1f85 fixed this exact Graph SQL shape
          by assigning analytics.GraphSQLTableName = g.tableName before
          HandleTableMigration(..., &analytics.GraphRecord{}, ...). The rule
          matches GraphSQLPump.Init migration paths that still call the GraphRecord
          migration without the preceding model-table binding.
        obligations: [migration_model_table_identity_bound]
    paths:
      include:
        - "pumps/graph_sql.go"
      exclude:
        - "*_test.go"
        - "vendor/**"
    patterns:
      - pattern: |
          func ($G *GraphSQLPump) Init($CONF interface{}) error {
            ...
            if err := HandleTableMigration($DB, $SQLCONF, $TABLE, &analytics.GraphRecord{}, $LOG, $MIGRATE); err != nil {
              ...
            }
            ...
          }
      - pattern-not: |
          func ($G *GraphSQLPump) Init($CONF interface{}) error {
            ...
            analytics.GraphSQLTableName = $G.tableName
            ...
            if err := HandleTableMigration($DB, $SQLCONF, $TABLE, &analytics.GraphRecord{}, $LOG, $MIGRATE); err != nil {
              ...
            }
            ...
          }
  # ──────────────────────────────────────────────────────────────────────
  - id: go.wall-clock-arithmetic
    severity: INFO
    languages: [go]
    message: |
      Code measures elapsed duration with `time.Since(...)` or
      `time.Now().Sub(...)` against a wall-clock instant. On DST transitions,
      manual clock adjustments, or NTP step events the returned Duration can
      go negative or jump by hours, producing nonsense timings, fake SLA
      breaches, or — when used as a loop guard — instant time-outs.
      Prefer `time.Now()` paired with a monotonic-clock-safe helper, or
      explicitly check `d < 0` and clamp.
    metadata:
      proof:
        signal_id: go.wall_clock_arithmetic
        provider: opengrep
        confidence: medium
        framework_hints:
          - CWE-1247
          - NIST-SP-800-160-3.2.4
        notes: |
          Pure-proposal rule. The proposed class `dst_transition_safe` is
          not yet in the shipped catalog; code_signal_unbindable surfaces
          it and `proof catalog draft --from-signal go.wall_clock_arithmetic`
          renders the YAML stub.
        obligations: [dst_transition_safe]
    paths:
      exclude:
        - "*_test.go"
        - "cmd/**"
        - "vendor/**"
    patterns:
      - pattern-either:
          - pattern: time.Since($T)
          - pattern: time.Now().Sub($T)
  - id: go.multi-pump-fanout
    severity: INFO
    languages: [go]
    message: |
      A per-element goroutine fanout is launched without an explicit
      failure-independence barrier: each pump runs `go execPumpWriting(...)`
      and the outer loop simply `wg.Wait()`s on completion. A single pump
      that panics, hangs, or saturates a shared dependency (DNS resolver
      cache, default HTTP transport pool, root logger) can corrupt
      sibling-pump output or starve them. Document the independence claim
      (process isolation, dedicated client, panic-recovery) AND wire a
      cascade circuit-breaker per pump.
    metadata:
      proof:
        signal_id: go.multi_pump_fanout
        provider: opengrep
        confidence: medium
        framework_hints:
          - CWE-1088
          - CWE-770
          - NIST-SP-800-53-SC-5
        notes: |
          Pure-proposal rule. Carries TWO proposed classes on a single
          signal (the schema supports a list). Pattern matches the
          tyk-pump main.go:367 fanout shape: `wg.Add(len(...))` followed
          by `for ... { go <selector_call>(&wg, ...) }`. FP risk: low —
          the wg.Add(len(...)) precedent narrows to the per-element
          fanout shape.
        obligations: [cascade_circuit_breaker, failure_independence_proven]
    paths:
      exclude:
        - "*_test.go"
        - "cmd/**"
        - "vendor/**"
    patterns:
      - pattern-either:
          - pattern: |
              wg.Add(len($PUMPS))
              for $_, $P := range $PUMPS {
                go $F(&wg, $P, ...)
              }
          - pattern: |
              $WG.Add(len($PUMPS))
              for $_, $P := range $PUMPS {
                go $F(&$WG, $P, ...)
              }
  # ──────────────────────────────────────────────────────────────────────
  # Phase R-expanded dogfood: 8 additional pure-proposal rules covering
  # the time-correctness and failure-cascade blind-spot families called
  # out in plan §0.3 and §F.
  # ──────────────────────────────────────────────────────────────────────
  - id: go.time-field-untagged-tz
    severity: INFO
    languages: [go]
    message: |
      A struct field carries `time.Time` without a documented timezone marker
      (no explicit UTC convention, no sibling string `tz` field, no method
      annotating the field's location). When the producer and consumer run
      in different timezones — or when a producer marshals "Local" time and
      a consumer unmarshals it as wall-clock — aggregation windows shift,
      audit logs misorder, and SQL `WHERE timestamp BETWEEN` queries silently
      drop records. Either pin the field to UTC (a Validate-on-construct
      step that calls `t.UTC()`), document the convention in the struct doc
      comment, or store epoch nanoseconds.
    metadata:
      proof:
        signal_id: go.time_field_untagged_tz
        provider: opengrep
        confidence: medium
        framework_hints:
          - CWE-1278
          - NIST-SP-800-160-3.2.4
        notes: |
          Pure-proposal rule. Real surfaces in tyk-pump:
            - analytics/uptime_data.go:27-28 (TimeStamp, ExpireAt)
            - analytics/uptime_data.go:126-127 (ExpireAt, LastTime in Aggregate)
            - analytics/aggregate.go:46 (LastTime in Aggregate)
            - analytics/aggregate.go:117-118
          Pattern: time.Time struct field with json/bson/gorm tag.
        obligations: [tz_explicit]
    paths:
      exclude:
        - "*_test.go"
        - "cmd/**"
        - "vendor/**"
    patterns:
      - pattern-either:
          - pattern-regex: '\b\w+\s+time\.Time\s+`json:"[^"]+"`'
          - pattern-regex: '\b\w+\s+time\.Time\s+`bson:"[^"]+"`'
          - pattern-regex: '\b\w+\s+time\.Time\s+`bson:"[^"]+" json:"[^"]+"`'
  - id: go.sql-table-sharding-by-date
    severity: INFO
    languages: [go]
    message: |
      Code routes records into per-day SQL tables (`tyk_aggregated_YYYYMMDD`
      shape) based on the wall-clock instant of the record. Two failure
      modes: (a) the window boundary is interpreted half-open in one path
      and closed in another, so a single record either lands in two shards
      or none; (b) records arriving after a DST or clock-skew event get
      routed to a stale shard, breaking range queries. The sharding
      function must declare its boundary semantics (UTC-day, [start, end)
      half-open) and a Validate step must enforce that the chosen instant
      maps to exactly one shard.
    metadata:
      proof:
        signal_id: go.sql_table_sharding_by_date
        provider: opengrep
        confidence: medium
        framework_hints:
          - CWE-1287
          - CWE-1126
        notes: |
          Pure-proposal rule. Real surface in tyk-pump:
            - pumps/sql.go:498 — `go func(baseName, cols string) { ... }`
              spawned per sharded table when TableSharding is enabled,
              table names ending in `_YYYYMMDD`.
          Pattern: TableSharding-conditional code path that mints a
          per-date table name suffix.
        obligations: [temporal_window_inclusive]
    paths:
      exclude:
        - "*_test.go"
        - "cmd/**"
        - "vendor/**"
    patterns:
      - pattern-either:
          - pattern: |
              if $X.TableSharding {
                ...
              }
          - pattern: |
              $X.TableSharding = true
  - id: go.purge-cycle-no-per-pump-result
    severity: INFO
    languages: [go]
    message: |
      The purge cycle fans work out to N pumps via `go execPumpWriting(&wg, pmp, ...)`
      and waits on a single `wg.Wait()`. The outer loop has no per-pump
      success/fail accounting — partial-progress is invisible to operators,
      health probes, or downstream alerting. When 7 of 8 pumps drop a
      batch but the 8th succeeds, the purge cycle reports "done" with no
      diagnosable signal. Expose per-pump result (records-written,
      records-dropped, last-error) via a metric, log line, or job event.
    metadata:
      proof:
        signal_id: go.purge_cycle_no_per_pump_result
        provider: opengrep
        confidence: medium
        framework_hints:
          - CWE-1295
          - NIST-SP-800-160-3.2.4
        notes: |
          Pure-proposal rule. Real surface in tyk-pump:
            - main.go:365-369 — `wg.Add(len(Pumps)); for ... { go execPumpWriting(&wg, pmp, ...) }; wg.Wait()`
          The wg.Wait() returns without per-pump results.
        obligations: [partial_progress_observable]
    paths:
      exclude:
        - "*_test.go"
        - "cmd/**"
        - "vendor/**"
    patterns:
      - pattern-either:
          - pattern: |
              wg.Add(len($P))
              for $_, $X := range $P {
                go $F(&wg, ...)
              }
              wg.Wait()
          - pattern: |
              $WG.Add(len($P))
              for $_, $X := range $P {
                go $F(&$WG, ...)
              }
              $WG.Wait()
  - id: go.redis-expire-shared-key
    severity: INFO
    languages: [go]
    message: |
      Code calls `kv.Expire(ctx, key, expire)` on a Redis key whose lifetime
      is governed by an absolute duration computed on the local clock. Two
      failure modes: (a) the pump and Redis clocks disagree by ε, so the
      pump's "this key is still alive" assumption races Redis's actual
      eviction; (b) when the pump's clock jumps backwards (NTP step,
      virtualization pause), the EXPIRE writes an expiration timestamp
      that's already in the past, causing immediate eviction. Document
      the clock-skew tolerance (`|pump.now - redis.now| < δ`) and either
      assert it on init or switch to relative-TTL semantics validated by
      a probe.
    metadata:
      proof:
        signal_id: go.redis_expire_shared_key
        provider: opengrep
        confidence: medium
        framework_hints:
          - NIST-SP-800-160-3.2.4
          - CWE-1247
        notes: |
          Pure-proposal rule. Real surface in tyk-pump:
            - storage/temporal_storage.go:294 — `r.kv.Expire(ctx, fixedKey, expire)`
          The `expire` duration is computed by the pump and shipped to
          Redis without a documented skew bound.
        obligations: [clock_skew_tolerated]
    paths:
      exclude:
        - "*_test.go"
        - "cmd/**"
        - "vendor/**"
    patterns:
      - pattern-either:
          - pattern: $X.Expire($CTX, $KEY, $D)
          - pattern: $X.kv.Expire($CTX, $KEY, $D)
  - id: go.exponential-backoff-no-deadline
    severity: INFO
    languages: [go]
    message: |
      Code wraps an operation with `backoff.RetryNotify(fn,
      backoff.WithMaxRetries(backoff.NewExponentialBackOff(), N))`. The
      max-retries count bounds the number of attempts but NOT the wall-clock
      time spent — at default exponential growth (initial 500ms, multiplier
      1.5, max-interval 1 minute) N=3 can take up to 90 seconds but N=10
      can take over 15 minutes. A purge loop running at a 1-second interval
      that retries for 15 minutes accumulates 900 missed purge slots; the
      next successful purge is now flushing a saturated upstream. Bound the
      retry budget with an absolute deadline (`backoff.WithContext(ctx,...)`,
      `MaxElapsedTime`) so retries do not consume the whole interval.
    metadata:
      proof:
        signal_id: go.exponential_backoff_no_deadline
        provider: opengrep
        confidence: medium
        obligations: [retry_budget_bounded]
        framework_hints:
          - CWE-1088
          - CWE-1322
          - NIST-SP-800-53-SC-5
        notes: |
          Pure-proposal rule. Real surfaces in tyk-pump:
            - pumps/hybrid.go:45 — `backoff.WithMaxRetries(backoff.NewExponentialBackOff(), 3)` (no context, no MaxElapsedTime override)
            - retry/http-retry.go:96 — same shape with caller-supplied maxRetries
        match_rationale: |
          The exponential backoff has default MaxElapsedTime of 15 minutes
          unless caller overrides; combined with WithMaxRetries(N) the
          actual bound is min(N attempts, 15min) — usually the latter.
    paths:
      exclude:
        - "*_test.go"
        - "cmd/**"
        - "vendor/**"
    patterns:
      - pattern-either:
          - pattern: backoff.WithMaxRetries(backoff.NewExponentialBackOff(), $N)
          - pattern: backoff.RetryNotify($FN, backoff.WithMaxRetries(backoff.NewExponentialBackOff(), $N), $NOTIFY)
  - id: go.tls-skip-verify-config
    severity: INFO
    languages: [go]
    message: |
      A TLS client config sets `InsecureSkipVerify: $CFG.SSLInsecureSkipVerify`
      from a config struct. The field is reachable from operator YAML
      with no audit trail — a single misconfiguration disables certificate
      validation across the deployment, MITM becomes trivially possible,
      and there is no runtime warning. Either restrict the flag to an
      explicit "development mode" that emits a startup WARN, or require a
      paired `RootCAs` override so skipping verification AND ignoring the
      system trust store cannot both happen by default.
    metadata:
      proof:
        signal_id: go.tls_skip_verify_config
        provider: opengrep
        confidence: medium
        framework_hints:
          - CWE-295
          - CWE-297
          - NIST-SP-800-53-SC-8
        notes: |
          Pure-proposal rule. Real surfaces in tyk-pump:
            - pumps/elasticsearch.go:176
            - pumps/hybrid.go:191, 245
            - pumps/kafka.go:118
            - pumps/splunk.go:138
            - pumps/common.go:249
          All set InsecureSkipVerify from operator config with no startup
          warning or audit signal.
        obligations: [cert_validation_strict]
    paths:
      exclude:
        - "*_test.go"
        - "cmd/**"
        - "vendor/**"
    patterns:
      - pattern-either:
          - pattern: |
              InsecureSkipVerify: $CFG.$F
          - pattern: |
              InsecureSkipVerify: $CFG.$X.$F
  - id: go.logfatal-on-config-decode
    severity: INFO
    languages: [go]
    message: |
      A pump's `Init(config)` method calls `log.Fatal(...)` on a config
      decode or connection failure. log.Fatal calls os.Exit(1), bypassing
      every deferred cleanup AND every sibling pump's chance to keep
      working. A single misconfigured pump in a multi-pump deployment
      takes down the whole process. Either return the error to the caller
      (the pump-init driver should decide whether the failure is fatal
      for the WHOLE process, or just for THIS pump), or recover into a
      degraded "this pump is inert" mode while others continue.
    metadata:
      proof:
        signal_id: go.logfatal_on_config_decode
        provider: opengrep
        confidence: high
        framework_hints:
          - CWE-755
          - CWE-1357
          - NIST-SP-800-53-SI-13
        notes: |
          Pure-proposal rule. Real surfaces in tyk-pump:
            - pumps/sqs.go:103 — Fatal on config decode
            - pumps/mongo.go:223 — Fatal on config decode
            - pumps/logzio.go:124 — Fatal on config decode
            - pumps/elasticsearch.go:364 — Fatal on config decode
            - pumps/mongo.go:395 — Fatal on connect
        match_rationale: |
          The known-issues file mcdc-pumps-below-95 acknowledges these
          surfaces as untestable (the process exits during the unit test),
          which is itself the symptom of the violation. A proper
          degraded_mode_declared design would make these arms testable.
        obligations: [process_exit_on_recoverable]
    paths:
      exclude:
        - "*_test.go"
        - "cmd/**"
        - "main.go"
    patterns:
      - pattern-either:
          - pattern: |
              func ($R $T) New(...) (...) {
                ...
                $LOG.Fatal(...)
                ...
              }
          - pattern: |
              func ($R $T) Init(...) error {
                ...
                $LOG.Fatal(...)
                ...
              }
          - pattern: |
              func ($R $T) Init(...) error {
                ...
                $LOG.Fatalf(...)
                ...
              }
  - id: go.kafka-timeout-duration-unit-confusion
    severity: WARNING
    languages: [go]
    message: |
      Kafka timeout configuration is modeled as `time.Duration` or is
      multiplied by `time.Second` at the writer deadline boundary. This can
      double-apply units after mapstructure/env decoding: a configured timeout
      that already represents a duration can become seconds-squared, while
      generic config values can be misread as nanoseconds or zero. Parse Kafka
      timeout values at Init with documented units and assign the resulting
      duration directly to Dialer.Timeout, WriteTimeout, and ReadTimeout.
    metadata:
      proof:
        signal_id: go.kafka_timeout_duration_unit_confusion
        provider: opengrep
        confidence: high
        framework_hints:
          - CWE-20
          - CWE-682
          - CWE-754
        notes: |
          Regression detector for TT-9360. The historical shape was a KafkaConf
          Timeout typed as time.Duration and writer deadlines computed with
          k.kafkaConf.Timeout * time.Second. The fixed code parses duration
          strings and numeric seconds into a local time.Duration, then assigns
          that value directly to all Kafka deadline fields.
        obligations: [timeout_config_units_preserved, external_call_timeout_bounded]
    paths:
      include:
        - "pumps/kafka.go"
      exclude:
        - "*_test.go"
        - "vendor/**"
    patterns:
      - pattern-either:
          - pattern: |
              type KafkaConf struct {
                ...
                Timeout time.Duration `...`
                ...
              }
          - pattern: |
              $W.WriteTimeout = $K.kafkaConf.Timeout * time.Second
          - pattern: |
              $W.ReadTimeout = $K.kafkaConf.Timeout * time.Second
          - pattern: |
              Timeout: $K.kafkaConf.Timeout * time.Second
  - id: go.fanout-goroutine-no-recover
    severity: INFO
    languages: [go]
    message: |
      A goroutine spawned from a fanout (`go execPumpWriting(...)`,
      `go func(){ ch <- pmp.WriteData(...) }()`) has no `defer
      recover()` at the goroutine boundary. A panic inside any one pump's
      WriteData (nil-pointer deref in a marshaller, divide-by-zero in
      an aggregator) propagates up the goroutine stack, terminates the
      process — taking sibling pumps and the purge loop with it.
      The independence claim from `failure_independence_proven`
      cannot hold without a per-fanout-goroutine recover barrier.
    metadata:
      proof:
        signal_id: go.fanout_goroutine_no_recover
        provider: opengrep
        confidence: medium
        framework_hints:
          - CWE-755
          - CWE-1088
          - NIST-SP-800-53-SC-5
        notes: |
          Pure-proposal rule. Real surface in tyk-pump:
            - main.go:469 — `go func(ch chan error, ctx context.Context, pmp pumps.Pump, keys *[]interface{}) { ... ch <- pmp.WriteData(ctx, filteredKeys) }(ch, ctx, pmp, keys)`
          No defer-recover at the goroutine top.
        obligations: [fanout_panic_isolated, per_pump_circuit_breaker]
    paths:
      exclude:
        - "*_test.go"
        - "cmd/**"
        - "vendor/**"
    patterns:
      - pattern-either:
          - pattern: |
              go func($CH chan error, $CTX context.Context, $P $PT, $K $KT) {
                $FILT := $FILTER($P, *$K)
                $CH <- $P.WriteData($CTX, $FILT)
              }($CH, $CTX, $P, $K)
          - pattern: |
              go func($CH chan error, $CTX context.Context, $P pumps.Pump, $K *[]interface{}) {
                ...
                $CH <- $P.WriteData(...)
              }(...)
  - id: go.base64-decode-bytes-assigned-to-interface-map
    severity: WARNING
    languages: [go]
    message: |
      base64.StdEncoding.DecodeString returns []byte, and assigning that value
      directly into a map/document field lets JSON encode it back to base64.
      Convert successful decoded payloads to string before storing them in
      backend text fields.
    metadata:
      proof:
        signal_id: go.base64_decode_bytes_assigned_to_interface_map
        provider: opengrep
        confidence: high
        framework_hints:
          - CWE-704
          - CWE-116
        notes: |
          TN-6 / commits 416d1c7 and 0adb849 fixed this exact Elasticsearch
          mapping bug by changing direct DecodeString assignment into
          string(decodedBytes). The rule catches the unsafe direct assignment
          shape and should not fire on current safe code.
        obligations: [backend_decoded_payload_textual]
    paths:
      include:
        - "pumps/**/*.go"
      exclude:
        - "*_test.go"
        - "vendor/**"
    patterns:
      - pattern-either:
          - pattern: |
              $MAP[$KEY], $_ = base64.StdEncoding.DecodeString($VALUE)
          - pattern: |
              $MAP[$KEY], $_ = b64.StdEncoding.DecodeString($VALUE)
  - id: go.health-listener-loopback-only
    severity: WARNING
    languages: [go]
    message: |
      Operator-facing health listeners must not bind only to localhost when
      orchestration or monitoring probes are expected to reach them from
      outside the process host. Bind the configured port with an empty or
      wildcard host unless loopback-only reachability is the explicit contract.
    metadata:
      proof:
        signal_id: go.health_listener_loopback_only
        provider: opengrep
        confidence: high
        framework_hints:
          - CWE-665
        notes: |
          Commit 402dab8 fixed this exact health endpoint defect by changing
          http.ListenAndServe("localhost:"+port, router) to bind the configured
          port without a loopback-only host.
        obligations: [listener_bind_scope_external]
    paths:
      include:
        - "server/**/*.go"
      exclude:
        - "*_test.go"
        - "vendor/**"
    patterns:
      - pattern-either:
          - pattern: |
              http.ListenAndServe("localhost:" + $PORT, $HANDLER)
          - pattern: |
              http.ListenAndServe("127.0.0.1:" + $PORT, $HANDLER)
          - pattern: |
              http.ListenAndServe("localhost:"+$PORT, $HANDLER)
          - pattern: |
              http.ListenAndServe("127.0.0.1:"+$PORT, $HANDLER)
  - id: go.mongo-aggregate-raw-endpoint-path-key
    severity: WARNING
    languages: [go]
    message: |
      Mongo aggregate endpoint dimensions are later concatenated into update
      field paths. A raw AnalyticsRecord.Path containing "." can split the
      Mongo field path and corrupt the endpoint counter dimension. Encode the
      path with replaceUnsupportedChars before using it as an Endpoints map key.
    metadata:
      proof:
        signal_id: go.mongo_aggregate_raw_endpoint_path_key
        provider: opengrep
        confidence: high
        framework_hints:
          - CWE-20
          - CWE-116
          - CWE-138
        notes: |
          Commit 58da62f fixed this exact aggregate-data corruption by changing
          Endpoints[record.Path] to Endpoints[replaceUnsupportedChars(record.Path)]
          for tracked REST paths while preserving the raw path in identifiers.
        obligations: [backend_field_key_safe]
    paths:
      include:
        - "analytics/aggregate.go"
      exclude:
        - "*_test.go"
        - "vendor/**"
    patterns:
      - pattern-either:
          - pattern: |
              $AGG.Endpoints[$REC.Path] = $VALUE
          - pattern: |
              $VALUE = $AGG.Endpoints[$REC.Path]
  - id: go.aggregate-http-error-threshold-strict-greater-than
    severity: WARNING
    languages: [go]
    message: |
      REST aggregate error classification must include HTTP 400. A strict
      `ResponseCode > 400` predicate counts 401+ but drops the exact 400
      boundary from Total.ErrorTotal, Total.ErrorMap, and per-status Errors.
      Use `ResponseCode >= 400` for aggregate error counters.
    metadata:
      proof:
        signal_id: go.aggregate_http_error_threshold_strict_greater_than
        provider: opengrep
        confidence: high
        framework_hints:
          - CWE-697
          - CWE-193
        notes: |
          Commit c02a2cb fixed this exact REST aggregate boundary bug by
          changing the aggregate error predicate from ResponseCode > 400 to
          ResponseCode >= 400. The rule catches a future reintroduction of
          the historical strict-greater-than threshold in aggregate code.
        obligations: [boundary]
    paths:
      include:
        - "analytics/aggregate.go"
      exclude:
        - "*_test.go"
        - "vendor/**"
    patterns:
      - pattern-either:
          - pattern: |
              if $REC.ResponseCode > 400 {
                ...
              }
          - pattern: |
              if ($REC.ResponseCode > 400) {
                ...
              }
  - id: go.mongo-document-size-counts-raw-request-twice
    severity: WARNING
    languages: [go]
    message: |
      Mongo document-size estimates must count RawRequest and RawResponse once
      each before MaxDocumentSizeBytes decisions. Counting RawRequest twice and
      omitting RawResponse can skip valid request-heavy records or send
      response-heavy records that exceed the backend limit.
    metadata:
      proof:
        signal_id: go.mongo_document_size_counts_raw_request_twice
        provider: opengrep
        confidence: high
        framework_hints:
          - CWE-190
          - CWE-770
        notes: |
          Commits 8bfdb36 and 4c490cb fixed this size-accounting bug in
          standard Mongo and MongoSelective paths by replacing
          RawRequest+RawRequest with RawRequest+RawResponse+1024 before the
          MaxDocumentSizeBytes decision.
        obligations: [document_size_accounting_exact]
    paths:
      include:
        - "pumps/mongo*.go"
      exclude:
        - "*_test.go"
        - "vendor/**"
    patterns:
      - pattern-either:
          - pattern: |
              $SIZE := len($REC.RawRequest) + len($REC.RawRequest)
          - pattern: |
              $SIZE := len([]byte($REC.RawRequest)) + len([]byte($REC.RawRequest))
