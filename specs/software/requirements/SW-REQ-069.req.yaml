description: 'When RollingIndex is true, the Elasticsearch pump shall append -YYYY.MM.DD (UTC system time) to the target index name. Per-record MCP routing shall use getIndexNameForRecord and apply ONLY in bulk mode: when MCPIndexName is non-empty and the record is an MCP record, the MCP-specific index name is used (with the same rolling suffix when enabled); otherwise the standard IndexName is used. Known issue: non-bulk mode currently ignores MCP routing (KI elasticsearch-mcp-routing-non-bulk-ignored).'
