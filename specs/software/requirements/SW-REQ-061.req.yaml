description: When the count of tags on an aggregated document exceeds ThresholdLenTagList (default 1000), the MongoAggregate pump shall emit a Warn-level alert listing up to CommonTagsCount (5) common tag prefixes computed by getListOfCommonPrefix, instructing the operator to suppress noisy tags via ignore_tag_prefix_list. A configured value of -1 shall disable the alert entirely.
