obligation_suppressions:
    - id: denial_of_service_resistant
      reason: Tag-list bounding is enforced via the fact-based ThresholdLenTagList constant (default 1000) checked in DoAggregatedWriting; the path emits a Warn-level alert rather than truncating or rejecting input. A fuzz harness exercising the printAlert/getListOfCommonPrefix path with adversarial tag distributions would be valuable future work but does not exist today. The current implementation does not allocate per-tag; pathological inputs are bounded by the size of the inbound batch, which is upstream-bounded by SYS-REQ-010.
      suppressed_by: buger
      suppressed_at: "2026-05-30T09:03:11Z"
