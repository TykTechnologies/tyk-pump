description: The SQL Aggregate pump shall, unless OmitIndexCreation is true, ensure a composite index named <table>_idx_dimension on (dimension, timestamp, org_id, dimension_value) via CREATE INDEX [CONCURRENTLY] IF NOT EXISTS. For PostgreSQL the CONCURRENTLY option shall be used and, in the non-sharded mode, the index creation shall run on a background goroutine signalling backgroundIndexCreated on completion; for MySQL the index creation shall run synchronously without CONCURRENTLY. Index creation is skipped when the index already exists.
