req_type: guarantee
fretish: when is_graph_record pumps_mongo_graph shall always satisfy converted_to_graph_record
description: The Graph MongoDB pump shall, on each purge, accumulate incoming records into size-bounded batches via the embedded MongoPump.AccumulateSet (in graph-only mode skipping records whose GraphQLStats.IsGraphQL is false from conversion), preserve graph record RawRequest and RawResponse payloads even when their size exceeds MaxDocumentSizeBytes, convert each surviving AnalyticsRecord to a GraphRecord (assigning a fresh ObjectID), and concurrently insert each batch into the single configured graph collection; the first per-batch insert error shall be returned to the caller, and connection-closed conditions shall be logged with a 'Detected connection failure!' warning.
