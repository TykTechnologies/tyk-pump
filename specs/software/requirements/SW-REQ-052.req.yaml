description: The Moesif pump shall, on each purge, parse each analytics record's base64-encoded raw request/response, apply operator-configured header/body masking and capture toggles, identify the user via the configured UserIDHeader (or fall back to record Alias / OauthID / parsed Authorization header), apply per-user / per-company sample-rate filtering fetched from the Moesif app-config endpoint, and enqueue qualifying events into the Moesif SDK with a weight equal to floor(100/samplingPercentage). The app-config sampling rules shall be refreshed once per minute when the SDK's X-Moesif-Config-Etag differs from the cached eTag.
