obligation_suppressions:
    - id: atomicity
      reason: 'SQL aggregate upsert atomicity (via gorm clause.OnConflict on id) negative evidence requires injecting a transaction failure mid-upsert (e.g. constraint violation on the unique index, connection drop between insert and update), which the local Postgres testcontainer is not configured to do. The closest existing assertion is TestEnsureIndexSQLAggregate negative case for index creation on missing tables, but that exercises DDL not DML atomicity. Future work: chaos-injection wrapper around the GORM session.'
      suppressed_by: buger
      suppressed_at: "2026-05-30T09:03:14Z"
    - id: concurrent
      reason: 'Phase G: code_signal ''go.concurrency.goroutine-spawn'' + ''go.concurrency.channel-send'' at pumps/sql_aggregate.go:171/182 are the optional background-index creation pattern (single goroutine wrapping createIndexFn, signals via backgroundIndexCreated channel after wg.Wait synchronization). gorm db handle is concurrency-safe. Not a data-race obligation gap.'
      suppressed_by: buger
      suppressed_at: "2026-06-01T18:36:37Z"
    - id: parameterized_only_write
      reason: 'Phase G: code_signal ''go.sql.formatted-write-exec'' at pumps/sql_aggregate.go:164 is a CREATE INDEX DDL where the index name and table name are derived from internal sharding logic (not user input). Identifier escaping is documented as TODO in KI sql-aggregate-mysql-excluded-keyword-broken; this is DDL, not data write — parameter binding is not applicable to identifiers in standard SQL. Not a parameterized-write obligation gap.'
      suppressed_by: buger
      suppressed_at: "2026-06-01T18:33:52Z"
      framework_refs:
        - CWE CWE-89
        - NIST-800-53 SI-10
        - OWASP-ASVS-v4 V5.3.4,V5.3.5
