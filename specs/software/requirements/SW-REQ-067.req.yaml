obligation_deferrals:
    - obligation_class: atomicity
      reason: Required atomicity evidence is parked because the SQL aggregate fault-injection harness is missing.
      tracking: known-issue:sql-aggregate-atomicity-fault-injection-missing
      owner: human:buger
      ki_ref: sql-aggregate-atomicity-fault-injection-missing
    - obligation_class: config_schema_strict
      reason: 'Pump configuration unknown-field rejection is required but currently not implemented: mapstructure.Decode silently ignores unknown keys and operator typos until known issue mapstructure-decode-silently-drops-unknown-keys is fixed.'
      tracking: mapstructure-decode-silently-drops-unknown-keys
      owner: human:buger
      ki_ref: mapstructure-decode-silently-drops-unknown-keys
      reproducer: mapstructure-decode-silently-drops-unknown-keys
    - obligation_class: deadlock_recovery
      reason: SQL aggregate upsert errors are returned without deadlock classification or bounded retry, so database deadlock recovery remains KI-tracked debt.
      tracking: sql-aggregate-no-deadlock-retry
      owner: human:buger
      ki_ref: sql-aggregate-no-deadlock-retry
    - obligation_class: malformed_recovers_or_errors_loudly
      reason: Required malformed-input evidence is parked because lenient decode gaps are tracked for this requirement.
      tracking: known-issue:mapstructure-decode-silently-drops-unknown-keys
      owner: human:buger
      ki_ref: mapstructure-decode-silently-drops-unknown-keys
    - obligation_class: ordering_guarantees_documented
      reason: Required ordering evidence is parked because SQL aggregate upsert order is intentionally undocumented.
      tracking: known-issue:sql-aggregate-upsert-order-undocumented
      owner: human:buger
      ki_ref: sql-aggregate-upsert-order-undocumented
    - obligation_class: panic_free_input_handling
      reason: Required panic-free evidence is parked because pump write goroutines still lack panic recovery.
      tracking: known-issue:no-panic-recovery-in-exec-pump-writing
      owner: human:buger
      ki_ref: no-panic-recovery-in-exec-pump-writing
    - obligation_class: transaction_isolation_declared
      reason: SQL aggregate upsert correctness depends on concurrent database write semantics, but serialization and concurrent-writer evidence remains missing from the fault-injection harness.
      tracking: sql-aggregate-atomicity-fault-injection-missing
      owner: human:buger
      ki_ref: sql-aggregate-atomicity-fault-injection-missing
