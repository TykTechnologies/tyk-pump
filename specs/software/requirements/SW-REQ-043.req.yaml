description: The Graph SQL Aggregate pump shall, on each purge, day-bucket records when TableSharding is enabled and route each day-slice to a <AggregateGraphSQLTable>_<YYYYMMDD> table (auto-migrated when missing); within each table it shall aggregate graph analytics via analytics.AggregateGraphData (windowed per minute when StoreAnalyticsPerMinute is true, otherwise per hour) and upsert each per-(API, dimension) row with clause.OnConflict on id using analytics.OnConflictAssignments; per-batch errors shall be returned to the caller.
