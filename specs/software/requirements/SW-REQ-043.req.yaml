obligation_deferrals:
    - obligation_class: atomicity
      reason: 'Graph SQL aggregate upsert atomicity is required for counter correctness, but current evidence lacks transaction/failure injection for serialization, deadlock, or forced tx.Error paths; tracked as KI-backed proof-harness debt.'
      tracking: graph-sql-aggregate-atomicity-fault-injection-missing
      owner: human:buger
      ki_ref: graph-sql-aggregate-atomicity-fault-injection-missing
      reproducer: graph-sql-aggregate-atomicity-fault-injection-missing
    - obligation_class: config_schema_strict
      reason: 'Pump configuration unknown-field rejection is required but currently not implemented: mapstructure.Decode silently ignores unknown keys and operator typos until known issue mapstructure-decode-silently-drops-unknown-keys is fixed.'
      tracking: mapstructure-decode-silently-drops-unknown-keys
      owner: human:buger
      ki_ref: mapstructure-decode-silently-drops-unknown-keys
      reproducer: mapstructure-decode-silently-drops-unknown-keys
    - obligation_class: errors_propagated
      reason: SW-REQ-043 promises Graph SQL aggregate per-batch backend errors are returned, but current evidence does not force database Create/tx.Error failure paths; tracked as KI-backed proof-harness debt until an injected backend-failure witness exists.
      tracking: graph-sql-aggregate-atomicity-fault-injection-missing
      owner: human:buger
      ki_ref: graph-sql-aggregate-atomicity-fault-injection-missing
      reproducer: graph-sql-aggregate-atomicity-fault-injection-missing
    - obligation_class: external_call_timeout_bounded
      reason: External backend calls remain operator-timeout dependent because timeout=0 is still accepted; this is KI-tracked until a nonzero deadline is enforced by default or Init rejects zero timeout.
      tracking: pump-no-timeout-can-block-purge-cycle
      owner: human:buger
      ki_ref: pump-no-timeout-can-block-purge-cycle
      reproducer: pump-no-timeout-can-block-purge-cycle
    - obligation_class: forward_compatible
      reason: GraphSQLAggregatePump.Init does not call HandleTableMigration or MigrateAllShardedTables, so existing day shards are not forward-migrated even when migrate_sharded_tables=true; tracked as current Graph SQL aggregate migration debt.
      tracking: graph-sql-aggregate-migrate-sharded-tables-ignored
      owner: agent:codex
      ki_ref: graph-sql-aggregate-migrate-sharded-tables-ignored
      reproducer: graph-sql-aggregate-migrate-sharded-tables-ignored
    - obligation_class: input_size_bounded
      reason: real SQL-family batch-size validation gap under known-issue sql-batch-size-zero-infinite-loop; surfaced as visible tracked debt, not an overclaimed fix
      tracking: sql-batch-size-zero-infinite-loop
      owner: agent:codex
      ki_ref: sql-batch-size-zero-infinite-loop
    - obligation_class: malformed_input
      reason: real SQL-family malformed batch-size gap under known-issue sql-batch-size-zero-infinite-loop; surfaced as visible tracked debt, not an overclaimed fix
      tracking: sql-batch-size-zero-infinite-loop
      owner: agent:codex
      ki_ref: sql-batch-size-zero-infinite-loop
    - obligation_class: malformed_recovers_or_errors_loudly
      reason: real untested obligation under known-issue mapstructure-decode-silently-drops-unknown-keys; surfaced as visible tracked debt, not an overclaimed fix
      tracking: mapstructure-decode-silently-drops-unknown-keys
      owner: human:buger
      ki_ref: mapstructure-decode-silently-drops-unknown-keys
    - obligation_class: per_shard_index_created
      reason: Graph SQL aggregate shard tables are created without a declared or witnessed per-shard index set; tracked as Graph/MCP SQL shard-index debt.
      tracking: graph-mcp-sql-sharded-indexes-untracked
      owner: human:buger
      ki_ref: graph-mcp-sql-sharded-indexes-untracked
      reproducer: rg -n "AggregateGraphSQLTable|AutoMigrate|ensureIndex" pumps/graph_sql_aggregate.go
    - obligation_class: temporal_window_inclusive
      reason: real untested obligation under known-issue analytics-timestamp-timezone-convention-unpinned; surfaced as visible tracked debt, not an overclaimed fix
      tracking: analytics-timestamp-timezone-convention-unpinned
      owner: human:buger
      ki_ref: analytics-timestamp-timezone-convention-unpinned
    - obligation_class: transaction_isolation_declared
      reason: Graph SQL aggregate counter correctness depends on concurrent database upserts behaving consistently, but no test or documented transaction-isolation harness injects concurrent writer or serialization-failure cases; tracked as KI-backed proof-harness debt.
      tracking: graph-sql-aggregate-atomicity-fault-injection-missing
      owner: human:buger
      ki_ref: graph-sql-aggregate-atomicity-fault-injection-missing
      reproducer: graph-sql-aggregate-atomicity-fault-injection-missing
