id: SW-REQ-072
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: when write_exceeds_timeout delivery shall immediately satisfy write_aborted
description: 'Each pump goroutine spawned by execPumpWriting shall receive a context bounded by the per-pump configured timeout (PumpConfig.Timeout). The pump''s WriteData implementation shall honour ctx cancellation: when ctx.Done() fires, the pump shall stop the in-flight write and return ctx.Err().'
formalization_strategy: fretish
informal_verification:
    method: ""
    evidence: ""
    verified: false
parent: SYS-REQ-005
component: delivery
rationale: "Implements SYS-REQ-005 at the design level. Today the mongo family ignores caller ctx (KI mongo-pump-ignores-caller-context), elasticsearch recurses unbounded on connect failure (KI elasticsearch-unbounded-reconnect-recursion), and PumpConfig.Timeout=0 disables enforcement entirely (KI pump-no-timeout-can-block-purge-cycle); this SW req is the contract those KIs are reported against."
