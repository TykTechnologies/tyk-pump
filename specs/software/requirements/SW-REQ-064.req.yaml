description: When TableSharding is enabled, the SQL Aggregate pump shall scan the incoming records in their existing order and, on each YYYYMMDD timestamp boundary, route the preceding contiguous slice to a tyk_aggregated_<YYYYMMDD> table (ensured via ensureTable and indexed via ensureIndex); the trailing slice shall be routed using the last record's date. When TableSharding is disabled, all records shall be routed to the single tyk_aggregated table in one pass.
