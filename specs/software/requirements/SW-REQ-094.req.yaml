rationale: 'Product-fix-history hardening for TT-6343: before commit 1cdc76c, InitCustomMetrics took the address of the Go range variable while iterating custom metrics, so multiple configured metrics could collapse into the same runtime metric identity. This child pins custom metric instance identity separately from SW-REQ-024 broad Prometheus exposition.'
