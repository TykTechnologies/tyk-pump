fretish: when valid_custom_metrics_configured pumps_prometheus shall always satisfy custom_metric_instances_preserved
description: When the Prometheus pump initializes custom metrics, every valid configured custom metric shall append exactly one distinct runtime metric instance backed by its own configuration entry and preserve that metric's configured name, type, labels, aggregate-observation setting, enabled state, and initialized collector; invalid custom metric definitions shall be skipped without preventing valid sibling metrics from being initialized.
