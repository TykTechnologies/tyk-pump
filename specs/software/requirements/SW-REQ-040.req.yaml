description: The standard SQL pump shall, on each purge, drop MCP-classified analytics records, then if TableSharding is true split the remaining records on each YYYYMMDD timestamp boundary and route each day-slice to a tyk_analytics_<YYYYMMDD> table (auto-created and indexed via ensureTable/ensureIndex), otherwise route all records to the default tyk_analytics table; within each table it shall issue parameter-bound batched inserts of BatchSize records (default 1000) using gorm.Create on the request context. Postgres uses a custom monthEncodePlan AfterConnect to encode time.Month as int8 (TT-16980). Writes log per-batch errors but do not propagate them upward.
