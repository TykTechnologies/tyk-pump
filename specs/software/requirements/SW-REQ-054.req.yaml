id: SW-REQ-054
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: when queue_full_and_enabled pumps_http_resurface shall always satisfy submit_skipped
description: The Resurface pump shall, on each purge, hand the data batch to an internal goroutine via a buffered channel (capacity 5); the worker shall parse each record's base64-encoded raw HTTP request and response, reconstruct http.Request / http.Response instances (including request URL, headers, custom tyk-API-* headers, optional chunked-trailer parsing), and submit them via the resurfaceio logger SDK's SendHttpMessage helper. WriteData shall return ctx.Err() on context cancellation and shall not block when the worker queue is full while the pump is enabled.
