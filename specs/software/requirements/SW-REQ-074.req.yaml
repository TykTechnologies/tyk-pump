fretish: when obfuscate_api_keys_enabled pumps_prometheus shall always satisfy api_key_label_masked
description: When ObfuscateAPIKeys is enabled, the Prometheus pump shall mask the values it emits into the api_key and key metric labels so that at most the last ObfuscateAPIKeysLength characters of the API key are present (prefixed by '****' for keys longer than that length, otherwise fully masked to '--') and the raw API key is never present in any exported metric label; when ObfuscateAPIKeys is disabled the documented opt-in default applies and the raw key is emitted.
