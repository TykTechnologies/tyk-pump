description: 'The MCP MongoDB Aggregate pump shall aggregate MCP-classified analytics records per API via analytics.AggregateMCPData, then for each API perform a two-step MongoDB upsert keyed by {orgid, timestamp, owner_apiid}: first applying $inc/$set/$max counters for both standard dimensions (via AsChange) and MCP-specific dimensions (methods, primitives, names via addMCPDimensionUpdates), then recalculating averages via AsTimeUpdate; the first upsert error per API shall be returned to the caller. When UseMixedCollection is true, both the per-org and mixed-collection variants shall be written.'
