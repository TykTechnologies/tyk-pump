fretish: when omit_index_creation | collection_already_exists pumps_mongo_aggregate shall always satisfy create_index_skipped
description: 'On each DoAggregatedWriting call (per-org), the MongoAggregate pump shall idempotently ensure baseline indexes on the target aggregate collection: (a) a TTL index on expireAt with TTL=0 (skipped for CosmosDB), (b) a timestamp index, (c) an orgid index. Index creation shall be skipped when OmitIndexCreation is true or, for StandardMongo, when the collection already exists. Background index creation is used for StandardMongo; foreground for CosmosDB/DocumentDB.'
