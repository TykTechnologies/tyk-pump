description: The Timestream pump shall, on each purge, split records into batches of timestreamMaxRecordsCount=100 (AWS hard limit), convert each record into a multimeasure types.Record with operator-configured Dimensions and Measures (with optional NameMappings rename, optional zero-value emission, and optional RateLimit measure inclusion), and submit each batch via WriteRecords to the configured DatabaseName/TableName. The first batch error shall be returned to the caller; RejectedRecordsException shall be logged with the first rejection reason.
