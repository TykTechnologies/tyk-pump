fretish: when disable_bulk pumps_es shall always satisfy per_record_indexed_else_bulk_processor
description: For each ES version operator, when DisableBulk is false the BulkProcessor shall be configured with operator-supplied BulkConfig.Workers, FlushInterval (seconds), BulkActions (record count, default 1000, -1 to disable), BulkSize (bytes, default 5 MB, -1 to disable), and an After callback that logs the purged record count via printPurgedBulkRecords. When DisableBulk is true, each record is indexed individually via the per-version Index().BodyJson(...).Do(ctx) call. Shutdown flushes the bulk processor when bulk is enabled.
