stakeholder:
    acceptance_criteria:
        - id: AC-001
          text: If the stream is already KMS encrypted with the configured non-empty KeyId, Init succeeds and does not call StartStreamEncryption.
          verification_method: test
        - id: AC-002
          text: If the stream is already KMS encrypted with a different non-empty KeyId, Init fails.
          verification_method: test
        - id: AC-003
          text: If the stream reports KMS encryption with a missing KeyId, Init treats the state as unverified and calls StartStreamEncryption with the configured key.
          verification_method: test
        - id: AC-004
          text: If the stream is not encrypted, Init calls StartStreamEncryption with the configured key, accepts ResourceInUse as idempotent progress, and fails on other start-encryption errors.
          verification_method: test
        - id: AC-005
          text: If DescribeStream fails while KMSKeyID is configured, Init fails.
          verification_method: test
