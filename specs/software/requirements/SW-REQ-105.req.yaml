id: SW-REQ-105
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: when kms_key_configured pumps_aws_kinesis shall always satisfy stream_kms_key_state_reconciled
description: 'When KMSKeyID is configured, the Kinesis pump shall reconcile the stream encryption state returned by DescribeStream against that configured key: an already encrypted stream with the same non-empty KeyId is accepted, a different non-empty KeyId fails Init, a KMS-encrypted stream with missing KeyId is treated as not verified and StartStreamEncryption is called with the configured key, an unencrypted stream starts encryption with the configured key, DescribeStream errors fail Init, ResourceInUse during StartStreamEncryption is accepted, and other StartStreamEncryption errors fail Init.'
formalization_strategy: fretish
informal_verification:
    method: ""
    evidence: ""
    verified: false
parent: SW-REQ-056
component: pumps-aws-kinesis
rationale: Product-fix-history hardening for TT-14473 / commits 5965206 and 50e5f51. The initial KMS support is additive security/config behavior; 50e5f51 fixed the nil-KeyId state-classification edge. SW-REQ-056 owns broad Kinesis behavior; this child pins the KMS stream-state reconciliation contract explicitly.
