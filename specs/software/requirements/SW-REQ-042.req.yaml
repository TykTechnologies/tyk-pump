description: The Graph SQL pump shall, on each purge, retain only records for which IsGraphRecord() is true, convert each to a GraphRecord, then if TableSharding is true split on each YYYYMMDD boundary and route each day-slice to a <TableName>_<YYYYMMDD> table (auto-migrated when missing), otherwise route all records to the configured TableName (default tyk_analytics_graph); within each table it shall issue parameter-bound batched inserts of BatchSize records using gorm.Create.
