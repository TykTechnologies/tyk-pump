obligation_suppressions:
    - id: cancellation_observed
      reason: 'Phase G: code_signal ''go.concurrency.unguarded-channel-send'' at pumps/mongo.go:438 re-discovers KI mongo-pump-ignores-caller-context: the purge fan-out goroutine uses context.Background() for the Insert and writes to a buffered errCh without ctx.Done() guard. The buffer is sized len(accumulateSet) so the send cannot block; cancellation is observed at the pump-purge-loop level, not the per-batch level. Documented gap tracked in mongo-pump-ignores-caller-context KI. Not a new obligation gap.'
      suppressed_by: buger
      suppressed_at: "2026-06-01T18:34:57Z"
      framework_refs:
        - CWE CWE-672,CWE-410
        - DO-178C §6.3.3
        - ISO-26262 Part 6 §7.4.13
        - NIST-800-53 SC-5
    - id: concurrent
      reason: 'Phase G: code_signal ''go.concurrency.goroutine-spawn'' + ''go.concurrency.channel-send'' at pumps/mongo.go:429/438 are the documented purge fan-out: one goroutine per accumulateSet batch, each writing its result to a buffered errCh sized len(accumulateSet) (cannot block). No shared mutable state across goroutines — each batch is disjoint and the mongo driver session is concurrency-safe. The caller-context concern is already tracked in KI mongo-pump-ignores-caller-context. Not a data-race obligation gap on the pump.'
      suppressed_by: buger
      suppressed_at: "2026-06-01T18:36:22Z"
    - id: errors_propagated
      reason: 'Phase H custom opengrep rule go.log.fatal-in-init / go.recursion.unbounded-on-error surfaces log.Fatal in Init and unbounded reconnect recursion; both are tracked under KIs pumps-logfatal-on-config-decode, elasticsearch-unbounded-reconnect-recursion, and influx-v1-unbounded-reconnect-recursion with mitigation and remediation already filed.'
      suppressed_by: human:leo
      suppressed_at: "2026-06-01T19:11:43Z"
      framework_refs:
        - CWE CWE-703,CWE-252,CWE-754
        - NIST-800-53 SI-11
        - OWASP-ASVS-v4 V7.4.1,V7.4.2,V7.4.3
    - id: malformed_recovers_or_errors_loudly
      reason: 'Phase H custom opengrep rule go.mapstructure.lenient-decode surfaces lenient mapstructure.Decode calls. Tracked under KI mapstructure-decode-silently-drops-unknown-keys with mitigation (validate configs before deploy) and remediation (NewDecoder with ErrorUnused: true) filed.'
      suppressed_by: human:leo
      suppressed_at: "2026-06-01T19:11:43Z"
      framework_refs:
        - CWE CWE-20,CWE-755
