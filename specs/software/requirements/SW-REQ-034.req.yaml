id: SW-REQ-034
version: 1
status: approved
priority: shall
category: functional
req_type: derived
fretish: ""
description: The standard MongoDB pump shall, on each purge, filter out MCP-classified analytics records, accumulate the remaining records into batches bounded by MaxInsertBatchSizeBytes (default 10 MiB) while rewriting raw bodies of documents whose serialized size exceeds MaxDocumentSizeBytes, then concurrently insert each batch into the single configured collection, returning the first per-batch insert error to the caller; when CollectionCapEnable is true on a 64-bit host with a non-existing collection, it shall create the collection as a capped collection of CollectionCapMaxSizeBytes (default 5 GiB).
