    - id: concurrent
      reason: 'Phase G: code_signal ''go.concurrency.goroutine-spawn'' + ''go.concurrency.channel-send'' at pumps/mongo.go:429/438 are the documented purge fan-out: one goroutine per accumulateSet batch, each writing its result to a buffered errCh sized len(accumulateSet) (cannot block). No shared mutable state across goroutines — each batch is disjoint and the mongo driver session is concurrency-safe. The caller-context concern is already tracked in KI mongo-pump-ignores-caller-context. Not a data-race obligation gap on the pump.'
      suppressed_by: buger
      suppressed_at: "2026-06-01T18:36:22Z"
