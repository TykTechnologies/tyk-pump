id: SW-REQ-034
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: when mcp_record_present pumps_mongo_standard shall always satisfy record_filtered_out
description: 'The standard MongoDB pump shall, on each purge, filter out MCP-classified analytics records, accumulate the remaining records into batches bounded by MaxInsertBatchSizeBytes (default 10 MiB) while rewriting raw bodies of documents whose serialized size exceeds MaxDocumentSizeBytes, then concurrently insert each batch into the single configured collection, returning the first per-batch insert error to the caller; when CollectionCapEnable is true on a 64-bit host with a non-existing collection, it shall create the collection as a capped collection of CollectionCapMaxSizeBytes (default 5 GiB). Known issues affecting this requirement: mongo-pump-ignores-caller-context (ctx propagation gap; see SW-REQ-072) and pumps-logfatal-on-config-decode (log.Fatalf on config decode error).'
formalization_strategy: fretish
