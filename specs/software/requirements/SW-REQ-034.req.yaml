      suppressed_by: human:leo
      suppressed_at: "2026-06-01T19:11:43Z"
    - id: panic_free_input_handling
      reason: 'Phase G: code_signal ''go.runtime.panic-call'' at pumps/mongo.go:219 is the documented-unreachable arm of the second mapstructure.Decode pair (KI pumps-logfatal-on-config-decode). The first Decode validates the same source so the panic arm cannot be reached from external input; //mcdc:ignore annotation already in place. Not a real panic-on-input gap.'
