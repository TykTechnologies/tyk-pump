      reason: 'Phase G: code_signal ''go.concurrency.unguarded-channel-send'' at pumps/mongo.go:438 re-discovers KI mongo-pump-ignores-caller-context: the purge fan-out goroutine uses context.Background() for the Insert and writes to a buffered errCh without ctx.Done() guard. The buffer is sized len(accumulateSet) so the send cannot block; cancellation is observed at the pump-purge-loop level, not the per-batch level. Documented gap tracked in mongo-pump-ignores-caller-context KI. Not a new obligation gap.'
      suppressed_by: buger
      suppressed_at: "2026-06-01T18:34:57Z"
