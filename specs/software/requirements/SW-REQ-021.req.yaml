obligation_deferrals:
    - obligation_class: back_pressure_bounded
      reason: 'Kafka WriteData has no explicit chunking or memory backpressure policy before message materialization, so large batches remain KI-gated until bounded batching lands.'
      tracking: kafka-writedata-full-batch-allocation-unbounded
      owner: human:buger
      ki_ref: kafka-writedata-full-batch-allocation-unbounded
    - obligation_class: cancellation_observed
      reason: 'real cancellation propagation gap under known-issue kafka-writedata-swallows-write-errors; surfaced as visible tracked debt, not an overclaimed fix'
      tracking: kafka-writedata-swallows-write-errors
      owner: human:buger
      ki_ref: kafka-writedata-swallows-write-errors
    - obligation_class: cert_validation_strict
      reason: 'real TLS strict-validation gap under known-issue tls-insecure-skip-verify-allowed; surfaced as visible tracked debt, not an overclaimed fix'
      tracking: tls-insecure-skip-verify-allowed
      owner: agent:codex
      ki_ref: tls-insecure-skip-verify-allowed
    - obligation_class: config_schema_strict
      reason: 'Pump configuration unknown-field rejection is required but currently not implemented: mapstructure.Decode silently ignores unknown keys and operator typos until known issue mapstructure-decode-silently-drops-unknown-keys is fixed.'
      tracking: mapstructure-decode-silently-drops-unknown-keys
      owner: human:buger
      ki_ref: mapstructure-decode-silently-drops-unknown-keys
      reproducer: mapstructure-decode-silently-drops-unknown-keys
    - obligation_class: dst_transition_safe
      reason: proof attribution gap under known-issue elapsed-timesince-dst-obligation-misattributed; elapsed Kafka logging metric is tracked debt until signal mapping is narrowed
      tracking: elapsed-timesince-dst-obligation-misattributed
      owner: agent:codex
      ki_ref: elapsed-timesince-dst-obligation-misattributed
    - obligation_class: errors_propagated
      reason: real untested obligation under known-issue pumps-logfatal-on-config-decode; surfaced as visible tracked debt, not an overclaimed fix
      tracking: pumps-logfatal-on-config-decode
      owner: human:buger
      ki_ref: pumps-logfatal-on-config-decode
    - obligation_class: external_call_timeout_bounded
      reason: External backend calls remain operator-timeout dependent because timeout=0 is still accepted; this is KI-tracked until a nonzero deadline is enforced by default or Init rejects zero timeout.
      tracking: pump-no-timeout-can-block-purge-cycle
      owner: human:buger
      ki_ref: pump-no-timeout-can-block-purge-cycle
      reproducer: pump-no-timeout-can-block-purge-cycle
    - obligation_class: input_size_bounded
      reason: Kafka WriteData materializes one kafka.Message per input record before the broker call, so batch memory usage remains KI-gated until a record or byte budget is enforced.
      tracking: kafka-writedata-full-batch-allocation-unbounded
      owner: human:buger
      ki_ref: kafka-writedata-full-batch-allocation-unbounded
    - obligation_class: malformed_recovers_or_errors_loudly
      reason: real untested obligation under known-issue mapstructure-decode-silently-drops-unknown-keys; surfaced as visible tracked debt, not an overclaimed fix
      tracking: mapstructure-decode-silently-drops-unknown-keys
      owner: human:buger
      ki_ref: mapstructure-decode-silently-drops-unknown-keys
    - obligation_class: panic_free_input_handling
      reason: Kafka WriteData uses an unchecked AnalyticsRecord assertion on caller-supplied batch entries, so malformed input can panic until the KI is fixed.
      tracking: kafka-writedata-non-analytics-record-panic
      owner: human:buger
      ki_ref: kafka-writedata-non-analytics-record-panic
    - obligation_class: process_exit_on_recoverable
      reason: real untested obligation under known-issue pumps-logfatal-on-config-decode; surfaced as visible tracked debt, not an overclaimed fix
      tracking: pumps-logfatal-on-config-decode
      owner: human:buger
      ki_ref: pumps-logfatal-on-config-decode
