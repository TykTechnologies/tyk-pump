obligation_deferrals:
    - obligation_class: cancellation_observed
      reason: 'real untested obligation under known-issue mongo-pump-ignores-caller-context; surfaced as visible tracked debt, not an overclaimed fix'
      tracking: mongo-pump-ignores-caller-context
      owner: human:buger
      ki_ref: mongo-pump-ignores-caller-context
    - obligation_class: config_schema_strict
      reason: 'Pump configuration unknown-field rejection is required but currently not implemented: mapstructure.Decode silently ignores unknown keys and operator typos until known issue mapstructure-decode-silently-drops-unknown-keys is fixed.'
      tracking: mapstructure-decode-silently-drops-unknown-keys
      owner: human:buger
      ki_ref: mapstructure-decode-silently-drops-unknown-keys
      reproducer: mapstructure-decode-silently-drops-unknown-keys
    - obligation_class: errors_propagated
      reason: 'real untested obligation under known-issue pumps-logfatal-on-config-decode; surfaced as visible tracked debt, not an overclaimed fix'
      tracking: pumps-logfatal-on-config-decode
      owner: human:buger
      ki_ref: pumps-logfatal-on-config-decode
    - obligation_class: external_call_failure_observable
      reason: 'This pump family has a confirmed WriteData path that logs backend or per-batch write failures and returns nil, so backend failure observability remains KI-gated until errors are propagated to the caller.'
      tracking: pump-writedata-swallows-per-batch-errors
      owner: human:buger
      ki_ref: pump-writedata-swallows-per-batch-errors
    - obligation_class: external_call_timeout_bounded
      reason: 'External backend calls remain operator-timeout dependent because timeout=0 is still accepted; this is KI-tracked until a nonzero deadline is enforced by default or Init rejects zero timeout.'
      tracking: pump-no-timeout-can-block-purge-cycle
      owner: human:buger
      ki_ref: pump-no-timeout-can-block-purge-cycle
      reproducer: pump-no-timeout-can-block-purge-cycle
    - obligation_class: malformed_recovers_or_errors_loudly
      reason: 'real untested obligation under known-issue mapstructure-decode-silently-drops-unknown-keys; surfaced as visible tracked debt, not an overclaimed fix'
      tracking: mapstructure-decode-silently-drops-unknown-keys
      owner: human:buger
      ki_ref: mapstructure-decode-silently-drops-unknown-keys
    - obligation_class: nil_safety
      reason: 'real untested obligation under known-issue mongo-pump-writeuptime-nil-on-bad-msgpack; surfaced as visible tracked debt, not an overclaimed fix'
      tracking: mongo-pump-writeuptime-nil-on-bad-msgpack
      owner: human:buger
      ki_ref: mongo-pump-writeuptime-nil-on-bad-msgpack
    - obligation_class: output_cardinality_bounded
      reason: MongoSelective AccumulateSet loses a pending valid batch when the final input item is skipped for size, so full output cardinality is KI-gated for that edge until the accumulator flushes pending records after skipped final items.
      tracking: mongo-selective-final-skipped-record-drops-pending-batch
      owner: human:buger
      ki_ref: mongo-selective-final-skipped-record-drops-pending-batch
      reproducer: mongo-selective-final-skipped-record-drops-pending-batch
    - obligation_class: process_exit_on_recoverable
      reason: 'real untested obligation under known-issue pumps-logfatal-on-config-decode; surfaced as visible tracked debt, not an overclaimed fix'
      tracking: pumps-logfatal-on-config-decode
      owner: human:buger
      ki_ref: pumps-logfatal-on-config-decode
    - obligation_class: query_timeout_bounded
      reason: 'real query-timeout gap under known-issue mongo-pump-ignores-caller-context: Mongo selective writes pass context.Background() to storage, so caller cancellation/timeout cannot bound the insert; surfaced as visible tracked debt, not an overclaimed fix'
      tracking: mongo-pump-ignores-caller-context
      owner: human:buger
      ki_ref: mongo-pump-ignores-caller-context
