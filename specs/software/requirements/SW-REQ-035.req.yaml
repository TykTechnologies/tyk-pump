id: SW-REQ-035
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: when org_id_present pumps_mongo_selective shall always satisfy record_routed_to_org_collection
description: The MongoSelective pump shall partition incoming non-MCP analytics records by OrgID and route each org's records into a per-organisation collection named z_tyk_analyticz_<orgid>, dropping records with empty OrgID; for each org collection it shall ensure baseline indexes (apiid, TTL on expireAt (skipped for CosmosDB), and a composite logBrowserIndex), treating an equivalent logBrowserIndex that already exists under a different name as idempotent success, and then insert records in size-bounded batches up to MaxInsertBatchSizeBytes (default 10 MiB), skipping individual documents larger than MaxDocumentSizeBytes. During initialization, the configured pump timeout shall be applied before Init builds the Mongo client and propagated to persistent.ClientOpts.ConnectionTimeout.
formalization_strategy: fretish
