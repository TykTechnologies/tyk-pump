description: The MongoSelective pump shall partition incoming non-MCP analytics records by OrgID and route each org's records into a per-organisation collection named z_tyk_analyticz_<orgid>, dropping records with empty OrgID; for each org collection it shall ensure baseline indexes (apiid, TTL on expireAt (skipped for CosmosDB), and a composite logBrowserIndex) and then insert records in size-bounded batches up to MaxInsertBatchSizeBytes (default 10 MiB), skipping individual documents larger than MaxDocumentSizeBytes.
