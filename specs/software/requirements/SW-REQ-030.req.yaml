obligation_suppressions:
    - id: dst_transition_safe
      reason: 'dst_transition_safe code signal at retry/http-retry.go:59: reviewed — this site uses time.Now()/time.Since()/Sub() to measure an elapsed DURATION for timing/Debug logging, not to bucket or route a record by wall-clock date. Go durations are computed from the monotonic clock and are immune to DST/timezone transitions, so the dst-transition failure mode (a wall-clock instant shifting across a DST boundary) does not apply here. Intentionally out of contract for this obligation; the genuine wall-clock-bucketing surface is governed separately by KI analytics-timestamp-timezone-convention-unpinned.'
      suppressed_by: human:leo
      suppressed_at: "2026-06-11T16:11:35Z"
    - id: input_size_bounded
      reason: 'Phase G: code_signal ''go.deserializer.request-body-readall'' at retry/http-retry.go:43 is filed as new KI retry-buffers-full-request-body-in-memory. The retry middleware buffers the full outbound request body once before the retry loop so it can be replayed; size is bounded in practice by the pump-level batch caps that originate the body. Tracked in the new KI; not duplicated as a checklist gap.'
      suppressed_by: buger
      suppressed_at: "2026-06-01T18:35:40Z"
      framework_refs:
        - CWE CWE-130
        - OWASP-ASVS-v4 V13.1.4
    - id: malformed_input
      reason: 'Phase G: code_signal ''go.deserializer.request-body-readall'' at retry/http-retry.go:43 — io.ReadAll on the OUTBOUND request body (pump-emitted, not attacker input). Read-error path is handled (returns err on line 46). Body is not parsed by the retry layer; the upstream pump owns shape validation. Not a malformed-input obligation gap on the retry surface.'
      suppressed_by: buger
      suppressed_at: "2026-06-01T18:35:40Z"
    - id: retry_budget_bounded
      reason: 'retry_budget_bounded code signal at retry/http-retry.go:96-98: reviewed — the retry budget IS explicitly bounded. The HTTP retry wraps backoff.RetryNotify with backoff.WithMaxRetries(backoff.NewExponentialBackOff(), s.maxRetries), capping attempts at the configured s.maxRetries; non-retryable errors short-circuit via backoff.Permanent. The obligation is satisfied by construction. (A separate MaxElapsedTime=0 concern on the storage retry path is tracked by KI storage-retry-maxelapsed-zero-is-unbounded; this HTTP path is count-bounded.) Reviewed in-contract.'
      suppressed_by: human:leo
      suppressed_at: "2026-06-11T16:12:28Z"
