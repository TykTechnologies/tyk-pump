id: SW-REQ-044
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: when mcp_record_present pumps_sql_mcp shall always satisfy mcp_record_routed
description: The MCP SQL pump shall, on each purge, retain only records for which IsMCPRecord() is true, convert each to an MCPRecord, then if TableSharding is true split on each YYYYMMDD boundary and route each day-slice to a <TableName>_<YYYYMMDD> table (auto-migrated when missing), otherwise route all records to the configured TableName (default tyk_analytics_mcp); within each table it shall issue parameter-bound batched inserts of BatchSize records using gorm.Create.
