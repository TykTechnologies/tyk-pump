fretish: logger shall always satisfy ((!env_level_recognised) | level_set_from_env) & legacy_formatter_installed
description: Logger initialisation in package logger shall set the default log level from the TYK_LOGLEVEL environment variable at package init (defaulting to info) and install the legacy fixed text formatter with full timestamps, disabled colors, and timestamp layout "Jan 02 15:04:05"; JSON-configured log_level and log_format overrides are applied at startup by package main. This branch does not implement the upstream TT-17281 formatter contract that adds RFC3339 text/json modes and a legacy compatibility selector.
