fretish: when hybrid_init_failure_detected pumps_hybrid shall always satisfy init_error_returned_without_process_exit
description: When HybridPump.Init detects a recoverable initialization failure such as a missing connection_string, an unreachable MDCB endpoint, or invalid RPC credentials, it shall return an error to the caller instead of calling log.Fatal/os.Exit and terminating the pump process.
