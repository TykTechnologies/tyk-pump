rationale: 'Product-fix-history hardening for TT-8313: before commit ca22ae4, HybridPump.Init called log.Fatal for missing connection_string or RPC connection failure, so one bad Hybrid pump configuration could exit the whole tyk-pump process. The refactor changed those paths to returned errors and added tests; this child pins that behavior separately from SW-REQ-029''s broad Hybrid forwarding/TLS contract.'
