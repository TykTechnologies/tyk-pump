      reason: Elasticsearch external writes can run without an enforced per-pump deadline when timeout is zero, so external call timeout bounding remains KI-tracked debt.
      tracking: pump-no-timeout-can-block-purge-cycle
      owner: human:buger
      ki_ref: pump-no-timeout-can-block-purge-cycle
