id: SW-REQ-068
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: when version_eq_3 pumps_es shall always satisfy v3_operator_constructed
description: 'The Elasticsearch pump shall, at Init, select an ElasticsearchOperator implementation per configured Version ("3", "5", "6", or "7", defaulting to "3" when unset) — instantiating the corresponding elastic.v3 / elastic.v5 / elastic.v6 / elastic/v7 client (with sniffing toggle, basic auth, optional ApiKey-auth via ApiKeyTransport, and optional custom TLS) and corresponding BulkProcessor. Versions other than 3/5/6/7 shall be rejected at Init via log.Fatal. Known issue: the log.Fatal-on-bad-config behaviour is shared with other pumps and tracked as pumps-logfatal-on-config-decode.'
formalization_strategy: fretish
