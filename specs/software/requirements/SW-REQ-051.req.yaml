      tracking: pumps-logfatal-on-config-decode
      owner: human:buger
      ki_ref: pumps-logfatal-on-config-decode
    - obligation_class: resource_lifetime_released
      reason: Logz.io uses an async SDK queue but has no Shutdown override to stop or drain it, so queued records can be dropped until logzio-segment-no-shutdown-flush is fixed.
