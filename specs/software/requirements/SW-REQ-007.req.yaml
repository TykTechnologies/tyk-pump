id: SW-REQ-007
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: when connect_err storage shall eventually satisfy connection_retried_with_bounded_backoff
description: Temporal storage shall construct, lazily establish, and re-establish its backend connection (NewTemporalStorageHandler, Init, connect, ensureConnection, resetConnection, createConnector, getKVFromConnector, getListFromConnector, fixKey, SetKey, GetName), preserving the operator's temporal-storage configuration when it builds the storage-library Redis connector. This includes host/port and address lists, database/auth, sentinel master/password, cluster mode, pool and timeout values, key-prefix compatibility, TLS options including legacy redis_* aliases, and both TYK_PMP_REDIS and TYK_PMP_TEMPORAL_STORAGE environment overlays. Retried connect attempts shall use exponential backoff via retry.GetTemporalStorageExponentialBackoff; the current total retry budget remains unbounded and is tracked by KI storage-retry-maxelapsed-zero-is-unbounded.
formalization_strategy: fretish
