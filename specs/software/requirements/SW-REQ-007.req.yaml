stakeholder:
    acceptance_criteria:
        - id: AC-001
          text: Init preserves an explicit key_prefix, promotes the deprecated redis_key_prefix alias when key_prefix is absent, and otherwise applies the analytics- default.
          verification_method: test
        - id: AC-002
          text: The deprecated TYK_PMP_REDIS_* prefix and the replacement TYK_PMP_TEMPORAL_STORAGE_* prefix both participate in the temporal-storage env overlay before connector setup.
          verification_method: test
        - id: AC-003
          text: Non-default pool and timeout settings remain present on the temporal-storage config that is used for connector setup.
          verification_method: test
        - id: AC-004
          text: TLS configuration errors from storage-library connector construction surface from Init instead of being ignored.
          verification_method: test
        - id: AC-005
          text: Sentinel, cluster, address-list, database, username, password, and TLS option fields are part of the temporal-storage connector contract and require review whenever the storage-library adapter changes.
          verification_method: test
