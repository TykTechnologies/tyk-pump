fretish: when enable_batch pumps_http_splunk shall always satisfy batched_send_used
description: 'The Splunk pump shall POST each analytics record (or a batch up to BatchMaxContentLength bytes when EnableBatch is true) as a Splunk HEC event JSON to CollectorURL with Authorization: Splunk <token>; TLS configuration (server-name, CA, client cert/key, and the SSLInsecureSkipVerify operator override) shall be applied via NewTLSConfig; transient send failures shall be retried up to MaxRetries via retry.BackoffHTTPRetry. Send errors shall be returned to the caller. When ObfuscateAPIKeys is true, API keys are masked with **** plus the trailing ObfuscateAPIKeysLength characters.'
