priority: shall
category: functional
req_type: guarantee
fretish: when store_per_minute pumps_sql_mcp_aggregate shall always satisfy minute_window_used
description: The MCP SQL Aggregate pump shall, on each purge, day-bucket records when TableSharding is enabled and route each day-slice to a <AggregateMCPSQLTable>_<YYYYMMDD> table (auto-created via CreateTable when missing); within each table it shall aggregate MCP records via analytics.AggregateMCPData (windowed per minute when StoreAnalyticsPerMinute is true, otherwise per hour) and upsert each per-(API, dimension) row with clause.OnConflict on id using analytics.OnConflictAssignments; per-batch errors shall be returned to the caller. On initialisation, a composite index on (dimension, timestamp, org_id, dimension_value) is created (Postgres uses CONCURRENTLY and creates it on a background goroutine).
