description: The InfluxDB v2 pump shall, on each purge, append one Point per analytics record to the v2 client's asynchronous WriteAPI for the configured organisation and bucket, using operator-configured Tags and Fields and microsecond precision; when Flush is true the WriteAPI shall be drained synchronously before the function returns. On Init, the pump checks server readiness, resolves the organisation by name, and optionally creates the bucket (with operator-configured retention rules) when CreateMissingBucket is enabled.
