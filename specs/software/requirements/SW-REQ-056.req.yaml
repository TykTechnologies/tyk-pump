id: SW-REQ-056
version: 1
status: approved
priority: shall
category: functional
req_type: derived
fretish: ""
description: The Kinesis pump shall, on each purge, split records into batches of BatchSize (default 100, bounded by AWS's 500-record per-PutRecords limit), JSON-marshal each record into a Kinesis PutRecordsRequestEntry with PartitionKey set to a fresh crypto/rand integer (for even MD5-based shard distribution), and submit each batch via PutRecords to the configured StreamName. When KMSKeyID is configured at Init, the pump shall verify the stream's current encryption mode/key, enable KMS server-side encryption if not already enabled with that key, and fail Init if the stream is already encrypted with a different key.
