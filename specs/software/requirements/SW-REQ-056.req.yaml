id: SW-REQ-056
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: when kms_key_configured pumps_aws_kinesis shall always satisfy stream_encryption_verified
description: The Kinesis pump shall, during configuration, apply TYK_PMP_PUMPS_KINESIS_META_* environment overrides by default and the custom meta_env_prefix when configured. On each purge, it shall split records into batches of BatchSize (default 100), JSON-marshal each record into a Kinesis PutRecordsRequestEntry with PartitionKey set to a fresh crypto/rand integer (for even MD5-based shard distribution), and submit each batch via PutRecords to the configured StreamName. The AWS 500-record PutRecords maximum is a required operational bound but is currently tracked as KnownIssue kinesis-batch-size-over-aws-putrecords-limit until Init rejects or clamps oversized batch_size values. When KMSKeyID is configured at Init, the pump shall verify the stream's current encryption mode/key, enable KMS server-side encryption if not already enabled with that key, and fail Init if the stream is already encrypted with a different key.
