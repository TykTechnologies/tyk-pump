id: SW-REQ-060
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: when first_upsert_succeeded pumps_mongo_aggregate shall always satisfy second_upsert_attempted
description: 'The MongoAggregate pump shall persist aggregation counters via a two-step MongoDB upsert keyed by {orgid, timestamp}: step one applies $inc/$set/$max/$min operators built by AnalyticsRecordAggregate.AsChange() (preserving monotonicity of hits/errors/success counters under concurrent writers via Mongo''s document-level $inc atomicity — see SYS-REQ-029), step two recalculates derived averages via AsTimeUpdate(). The first upsert error shall be returned to the caller.'
