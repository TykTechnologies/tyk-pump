      reason: 'Mongo $inc atomicity is the stated assumption (SYS-REQ-029) discharged externally; a negative test would require a fault-injecting MongoDB instance (kill mid-upsert, write-concern w=0 race) that local CI cannot provision. The closest existing assertion is TestMongoAggregatePump_SelfHealing which exercises document-size error propagation but not $inc atomicity. Future work: testcontainer-driven fault-injection harness.'
      suppressed_by: buger
      suppressed_at: "2026-05-30T09:03:06Z"
