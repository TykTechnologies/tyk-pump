id: SW-REQ-006
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: when records_present storage shall always satisfy records_popped_and_expire_attempted
description: Temporal storage GetAndDeleteSet shall pop up to a chunk of records from the configured analytics list and re-apply the expiry to any remainder; the Pop side is atomic at the Redis protocol level, while the subsequent Expire of the remainder is a best-effort follow-up. The Pop+Expire pair is not a single atomic transaction — that gap is tracked by KI getanddeleteset-expire-fail-loses-records.
