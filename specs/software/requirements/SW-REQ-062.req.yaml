obligation_suppressions:
    - id: denial_of_service_resistant
      reason: Self-healing in mongo-aggregate is a recovery loop over already-decoded MongoDB error responses, not a parser over external/untrusted input. The catalog explicitly carves out same-process trusted-data consumers from the fuzz-evidence expectation. The genuine fuzz target for mongo input parsing would belong on the gateway-side serialization, not on the pump-side aggregate recovery.
      suppressed_by: buger
      suppressed_at: "2026-05-30T09:32:07Z"
