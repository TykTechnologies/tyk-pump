fretish: ""
description: When EnableAggregateSelfHealing is true and an upsert fails with a max-document-size error from MongoDB ('Size must be between 0 and'), CosmosDB ('Request size is too large'), or DocumentDB ('Resulting document after update is larger than'), the MongoAggregate pump shall (a) halve AggregationTime (unless already 1, in which case it skips self-healing and returns the error), (b) reset the last-document-timestamp tracker so subsequent writes form a new document, and (c) recursively re-invoke WriteData once with the same input data. Self-healing only triggers on the listed size errors, not on arbitrary write failures.
