description: The MCP MongoDB pump shall, on each purge, retain only AnalyticsRecords for which IsMCPRecord() is true, accumulate them into size-bounded batches via the embedded MongoPump.AccumulateSet, convert each batch to MCPRecord instances with fresh ObjectIDs, and concurrently insert each batch into the single configured MCP collection; the first per-batch insert error shall be returned to the caller, and 'closed explicitly' errors shall be reported as a connection failure warning.
