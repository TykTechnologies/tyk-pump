obligation_suppressions:
    - id: cascade_circuit_breaker
      reason: 'cascade_circuit_breaker code signal at main.go:365-368: writeToPumps fans out one goroutine per pump and wg.Wait()s; there is no cross-pump cascade breaker. The cascade-containment / repeated-dispatch concern is tracked by KI pump-no-per-pump-circuit-breaker (affects SW-REQ-001, test-anchored). The per-pump goroutine isolation already contains cascades; remaining gap is the missing breaker, dispositioned ship_with_known_issue. Not a new ungoverned obligation.'
      suppressed_by: human:leo
      suppressed_at: "2026-06-11T16:08:40Z"
    - id: concurrent
      reason: 'concurrent code signals at main.go:367 (writeToPumps per-pump fan-out: wg.Add(len(Pumps)); one goroutine per pump; wg.Wait() join) and main.go:471 (execPumpWriting inner goroutine running pmp.WriteData, sending over a buffered error channel under a ctx with timeout/cancel; select on ch vs ctx.Done(); defer cancel()). Lifecycle/cancellation ownership is the WaitGroup join + ctx select. The one remaining hole — a missing defer recover() in the inner goroutine — is documented and test-anchored by KI pump-fanout-panic-not-recovered and KI no-panic-recovery-in-exec-pump-writing, and per-pump dispatch cooldown by KI pump-no-per-pump-circuit-breaker (all affect SW-REQ-001/SYS-REQ-004). Concurrency ownership governed by those KIs; not a new gap.'
      suppressed_by: human:leo
      suppressed_at: "2026-06-11T16:13:31Z"
    - id: dst_transition_safe
      reason: 'dst_transition_safe code signal at main.go:291: reviewed — this site uses time.Now()/time.Since()/Sub() to measure an elapsed DURATION for timing/Debug logging, not to bucket or route a record by wall-clock date. Go durations are computed from the monotonic clock and are immune to DST/timezone transitions, so the dst-transition failure mode (a wall-clock instant shifting across a DST boundary) does not apply here. Intentionally out of contract for this obligation; the genuine wall-clock-bucketing surface is governed separately by KI analytics-timestamp-timezone-convention-unpinned.'
      suppressed_by: human:leo
      suppressed_at: "2026-06-11T16:11:34Z"
    - id: nil_safety
      reason: 'nil_safety code signal at main.go:327: the decode-error ''continue'' leaves a nil interface{} hole in the preallocated keys slice, which filterData later panics on via the unchecked key.(analytics.AnalyticsRecord) assertion. This genuine surface is now documented and dispositioned by KI preprocess-decode-error-leaves-nil-hole-in-keys (affects SW-REQ-001, ship_with_known_issue, severity medium, with mitigation + remediation). Not an undocumented gap.'
      suppressed_by: human:leo
      suppressed_at: "2026-06-11T16:15:03Z"
    - id: partial_progress_observable
      reason: 'partial_progress_observable code signal at main.go:365-369: writeToPumps spawns per-pump goroutines and joins on wg.Wait(), so healthy pumps make progress even when one fails — the partial-progress behavior is the containment property documented by KI pump-no-per-pump-circuit-breaker (affects SW-REQ-001, test-anchored: healthy pumps still progress while a failing pump is re-dispatched). Observability of the failing pump is one error log per cycle, dispositioned ship_with_known_issue. Not a new ungoverned obligation.'
      suppressed_by: human:leo
      suppressed_at: "2026-06-11T16:08:41Z"
    - id: per_pump_circuit_breaker
      reason: 'per_pump_circuit_breaker code signal at main.go:469-472: the purge dispatcher invokes every pump every cycle with no consecutive-failure cooldown. Tracked and test-anchored by KI pump-no-per-pump-circuit-breaker (affects SW-REQ-001, evidence TestPerPumpCircuitBreaker_NoBackoffOnRepeatedFailure; disposition ship_with_known_issue, severity low: healthy pumps still progress). Not a new ungoverned obligation.'
      suppressed_by: human:leo
      suppressed_at: "2026-06-11T16:08:40Z"
