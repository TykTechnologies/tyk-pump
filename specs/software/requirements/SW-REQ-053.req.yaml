      tracking: pumps-logfatal-on-config-decode
      owner: human:buger
      ki_ref: pumps-logfatal-on-config-decode
    - obligation_class: external_call_failure_observable
      reason: 'This pump has a confirmed WriteData path that logs backend or per-batch write failures and returns nil, so backend failure observability remains KI-gated until errors are propagated to the caller.'
