    - id: input_size_bounded
      reason: 'Phase N opengrep rule go.loop.increment-from-mutable-config flags pumps/sql*.go for-loops with i += c.SQLConf.BatchSize stride. SQL family DOES guard at Init (sql.go:260 sets default if 0) but the rule prefers co-located guards. Same bug class as KIs sqs-batchlimit-zero-infinite-loop and kinesis-splitintobatches-zero-infinite-loop with mitigation (Init-level guard) tracked. Not a new obligation gap.'
      suppressed_by: buger
      suppressed_at: "2026-06-02T18:29:51Z"
      framework_refs:
        - CWE CWE-130
        - OWASP-ASVS-v4 V13.1.4
