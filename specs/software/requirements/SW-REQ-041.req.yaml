      reason: 'Phase N opengrep rule go.loop.increment-from-mutable-config — paired malformed_input on pumps/sql*.go BatchSize loops. Init-level zero-guard at sql.go:260 already mitigates; rule flags for co-located guard preference. Same class as KIs sqs/kinesis batch-limit zero-loop.'
      suppressed_by: buger
      suppressed_at: "2026-06-02T18:29:52Z"
    - id: malformed_recovers_or_errors_loudly
      reason: 'Phase H custom opengrep rule go.mapstructure.lenient-decode surfaces lenient mapstructure.Decode calls. Tracked under KI mapstructure-decode-silently-drops-unknown-keys with mitigation (validate configs before deploy) and remediation (NewDecoder with ErrorUnused: true) filed.'
      suppressed_by: human:leo
      suppressed_at: "2026-06-01T19:11:45Z"
      framework_refs:
        - CWE CWE-20,CWE-755
        - IEC-62304 §5.3.1
