      reason: 'Phase H custom opengrep rule go.goroutine.no-recover surfaces fan-out goroutines without defer recover. Tracked under KI no-panic-recovery-in-exec-pump-writing with mitigation and remediation filed.'
      suppressed_by: human:leo
