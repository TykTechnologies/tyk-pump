      reason: 'Phase G: code_signal ''go.sql.formatted-write-exec'' at pumps/sql_aggregate.go:164 is a CREATE INDEX DDL where the index name and table name are derived from internal sharding logic (not user input). Identifier escaping is documented as TODO in KI sql-aggregate-mysql-excluded-keyword-broken; this is DDL, not data write — parameter binding is not applicable to identifiers in standard SQL. Not a parameterized-write obligation gap.'
      suppressed_by: buger
      suppressed_at: "2026-06-01T18:33:52Z"
      framework_refs:
        - CWE CWE-89
        - NIST-800-53 SI-10
        - OWASP-ASVS-v4 V5.3.4,V5.3.5
    - id: temporal_window_inclusive
      reason: 'temporal_window_inclusive code signal at pumps/sql_aggregate.go:230: this pump routes records into a per-day shard via AnalyticsRecord.TimeStamp.Format("20060102"), which inherits the record''s (possibly non-UTC) location. The unpinned-timezone root cause and its date-shard boundary ambiguity are filed as KI analytics-timestamp-timezone-convention-unpinned (ship_with_known_issue; mitigation: run gateway+pump with TZ=UTC; remediation: pin TimeStamp to UTC on decode). Genuine surface, documented and dispositioned — not an undocumented gap.'
      suppressed_by: human:leo
      suppressed_at: "2026-06-11T16:11:16Z"
