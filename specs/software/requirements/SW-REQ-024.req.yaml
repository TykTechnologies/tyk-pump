obligation_deferrals:
    - obligation_class: auth_required
      reason: real product gap under known-issue prometheus-metrics-auth-not-enforced; surfaced as visible tracked debt, not an overclaimed fix
      tracking: prometheus-metrics-auth-not-enforced
      owner: human:buger
      ki_ref: prometheus-metrics-auth-not-enforced
    - obligation_class: concurrent
      reason: Prometheus metric aggregation has a confirmed unsynchronized map mutation race; race and nominal concurrency evidence must wait for the KI remediation.
      tracking: prometheus-metric-maps-race
      owner: agent:codex
      ki_ref: prometheus-metric-maps-race
      reproducer: prometheus-metric-maps-race static rg tripwire
    - obligation_class: config_schema_strict
      reason: 'Pump configuration unknown-field rejection is required but currently not implemented: mapstructure.Decode silently ignores unknown keys and operator typos until known issue mapstructure-decode-silently-drops-unknown-keys is fixed.'
      tracking: mapstructure-decode-silently-drops-unknown-keys
      owner: human:buger
      ki_ref: mapstructure-decode-silently-drops-unknown-keys
      reproducer: mapstructure-decode-silently-drops-unknown-keys
    - obligation_class: errors_propagated
      reason: real untested obligation under known-issue pumps-logfatal-on-config-decode; surfaced as visible tracked debt, not an overclaimed fix
      tracking: pumps-logfatal-on-config-decode
      owner: human:buger
      ki_ref: pumps-logfatal-on-config-decode
    - obligation_class: malformed_recovers_or_errors_loudly
      reason: real untested obligation under known-issue mapstructure-decode-silently-drops-unknown-keys; surfaced as visible tracked debt, not an overclaimed fix
      tracking: mapstructure-decode-silently-drops-unknown-keys
      owner: human:buger
      ki_ref: mapstructure-decode-silently-drops-unknown-keys
    - obligation_class: output_cardinality_bounded
      reason: Prometheus metrics can expose path, key, and api_key labels and aggregate by joined label values without a cardinality budget, so output cardinality remains KI-gated.
      tracking: metrics-label-cardinality-unbounded
      owner: human:buger
      ki_ref: metrics-label-cardinality-unbounded
    - obligation_class: panic_free_input_handling
      reason: real untested obligation under canonical known-issue pump-fanout-panic-not-recovered; surfaced as visible tracked debt, not an overclaimed fix
      tracking: pump-fanout-panic-not-recovered
      owner: human:buger
      ki_ref: pump-fanout-panic-not-recovered
    - obligation_class: process_exit_on_recoverable
      reason: Prometheus listener failure calls log.Fatal from a goroutine, so listener bind/runtime failures remain process-exit debt until prometheus-listener-logfatal is remediated.
      tracking: prometheus-listener-logfatal
      owner: human:buger
      ki_ref: prometheus-listener-logfatal
    - obligation_class: request_timeout_bounded
      reason: Prometheus Init starts http.ListenAndServe with a nil handler on the process-global DefaultServeMux and no private server lifecycle, so listener timeout/lifecycle isolation remains KI-gated with the DefaultServeMux issue.
      tracking: prometheus-init-mutates-default-mux
      owner: human:buger
      ki_ref: prometheus-init-mutates-default-mux
    - obligation_class: shared_state_synchronized
      reason: Prometheus Init registers handlers on http.DefaultServeMux and serves with a nil handler, so the pump mutates process-global HTTP routing state instead of using an isolated mux; surfaced as visible tracked debt, not an overclaimed fix.
      tracking: prometheus-init-mutates-default-mux
      owner: human:buger
      ki_ref: prometheus-init-mutates-default-mux
