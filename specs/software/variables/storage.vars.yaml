component: storage
variables:
    - name: records_present
      type: bool
      direction: input
      description: True when the temporal storage GetAndDeleteSet input list contains at least one record at call time.
    - name: records_popped_and_expire_attempted
      type: bool
      direction: output
      description: 'True iff the chunk-sized batch is popped via the storage-library list.Pop primitive and the partial-drain remainder receives a kv.Expire call (KI tracks the Pop+Expire atomicity gap: getanddeleteset-expire-fail-loses-records).'
    - name: records_removed_once
      type: bool
      direction: output
      description: True iff the records returned by TemporalStorageHandler.GetAndDeleteSet have been removed from the temporal store exactly once for the current call; this mirrors SYS-REQ-007's atomic-removal output at the software layer.
    - name: chunk_partial
      type: bool
      direction: input
      description: True when chunkSize (after the GetAndDeleteSet 0→-1 normalization) is non-(-1), i.e. partial-drain mode where Expire is invoked on the remainder. False means full-drain mode (chunkSize=-1 post-normalize, from operator's purge_chunk=0 config) where Expire is intentionally skipped after Pop.
    - name: connect_err
      type: bool
      direction: input
      description: True when storage.connect() returns a non-nil error and ensureConnection schedules a retried attempt.
    - name: connection_retried_with_bounded_backoff
      type: bool
      direction: output
      description: True iff retry.GetTemporalStorageExponentialBackoff drives the retried connect attempts to completion within bounded backoff (eventual ensureConnection success).
independence:
    declared: true
    reason: 'Storage requirements cover independent temporal-store operations: atomic pop/delete behavior, relative TTL persistence, and connection retry behavior do not constrain the same output state.'
