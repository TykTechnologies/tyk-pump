component: pumps-mongo-standard
variables:
    - name: mcp_record_present
      type: bool
      direction: input
      description: True when the current AnalyticsRecord satisfies IsMCPRecord() (record classified as MCP).
    - name: record_filtered_out
      type: bool
      direction: output
      description: True iff the record is dropped from the insert set during shouldProcessItem (MCP filter or graph-only mode skip).
    - name: standard_mongo_insertable_record_present
      type: bool
      direction: input
      description: True when MongoPump.WriteData receives at least one valid non-MCP AnalyticsRecord for the standard collection, including records whose GraphQLStats.IsGraphQL is true.
    - name: standard_mongo_record_inserted
      type: bool
      direction: output
      description: True iff every valid non-MCP record accepted by standard Mongo WriteData is present in the configured standard Mongo collection after the write.
    - name: docdb_backend_configured
      type: bool
      direction: input
      description: True when MongoDBType is AWSDocumentDB for the standard Mongo pump, requiring DocumentDB-compatible foreground index creation without the StandardMongo collection-exists probe.
    - name: omit_index_creation_disabled
      type: bool
      direction: input
      description: True when OmitIndexCreation is false, so the pump is responsible for attempting its baseline indexes.
    - name: docdb_indexes_attempted
      type: bool
      direction: output
      description: True iff the standard Mongo pump attempts its baseline DocumentDB-compatible indexes without calling the StandardMongo collection-exists shortcut; false when omit_index_creation intentionally disables index creation.
independence:
    declared: true
    reason: Standard Mongo requirements cover MCP filtering, accepted-record insertion, and DocumentDB-compatible index attempts; each guarantee owns a distinct output of the write/init path.
