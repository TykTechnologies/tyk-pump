component: pumps-mongo-aggregate
variables:
    - name: self_heal_enabled
      type: bool
      direction: input
      description: True when EnableAggregateSelfHealing is true — the operator toggle for size-error self-healing (independent from size_error_detected and aggregation_time_above_floor; all three must hold for ShouldSelfHeal to halve).
    - name: size_error_detected
      type: bool
      direction: input
      description: True when the upsert error string matches one of the listed size-error markers (StandardMongoSizeError "Size must be between 0 and" / CosmosSizeError "Request size is too large" / DocDBSizeError "Resulting document after update is larger than") — the error-class gate independent from self_heal_enabled.
    - name: aggregation_time_above_floor
      type: bool
      direction: input
      description: True when m.dbConf.AggregationTime > 1 — the floor-reached guard; when AggregationTime==1, ShouldSelfHeal returns false even with self_heal_enabled and size_error_detected, because halving 1 would round to 0.
      range: {min: 1, max: 60}
    - name: aggregation_time_halved
      type: bool
      direction: output
      description: True iff ShouldSelfHeal halves AggregationTime after a classified size error above the one-minute floor (false when AggregationTime is already at the floor or when self-healing is not triggered). The caller-level retry with the same ctx/data batch is separately evidenced on MongoAggregatePump.WriteData.
    - name: store_per_minute
      type: bool
      direction: input
      description: True when StoreAnalyticsPerMinute is true (drives 1-min aggregation window vs hourly default).
    - name: window_eq_1_min
      type: bool
      direction: output
      description: True iff SetAggregationTime sets AggregationTime to 1 minute when StoreAnalyticsPerMinute is true (otherwise 60-min default).
      data_constraint:
        domain: integer
        variable: aggregation_window_min
        condition: "aggregation_window_min == 1"
        parameters:
          - name: aggregation_window_min
            type: int
            constraint: "== 1"
    - name: org_id_empty
      type: bool
      direction: input
      description: True when the aggregate record's OrgID is empty (write skipped to avoid writing to default collection).
    - name: write_skipped
      type: bool
      direction: output
      description: True iff DoAggregatedWriting returns early with no write attempt when OrgID is empty.
    - name: first_upsert_succeeded
      type: bool
      direction: input
      description: True when the first $inc/$set/$max/$min upsert against {orgid,timestamp} returns no error.
    - name: second_upsert_attempted
      type: bool
      direction: output
      description: True iff the second $addToSet upsert for the same {orgid,timestamp} is attempted following first_upsert_succeeded.
    - name: hits_errors_latency_counted
      type: bool
      direction: output
      description: True iff Mongo aggregate persistence preserves and accumulates the hit, success/error, latency, and request-time counters in the aggregate document; this mirrors SYS-REQ-019's aggregation output at the Mongo-aggregate software layer.
    - name: tag_list_len_gt_threshold
      type: bool
      direction: input
      description: True when the aggregated document's tag list length exceeds ThresholdLenTagList (default 1000).
    - name: alert_not_disabled
      type: bool
      direction: input
      description: 'True when m.dbConf.ThresholdLenTagList != -1 — the operator-controlled disable gate; setting -1 disables the tag-list alert entirely (description explicitly names "A configured value of -1 shall disable the alert entirely").'
    - name: alert_emitted
      type: bool
      direction: output
      description: True iff the pump emits a Warn-level alert listing up to N tags (and orgid+timestamp context) when both alert_not_disabled AND tag_list_len_gt_threshold.
    - name: omit_index_creation
      type: bool
      direction: input
      description: True when the pump's OmitIndexCreation config is true (operator opted out of auto index ensure).
    - name: collection_already_exists
      type: bool
      direction: input
      description: True when MongoDBType==StandardMongo AND collectionExists returns ok — the idempotency-skip arm in ensureIndexes that satisfies create_index_skipped independently of omit_index_creation (description names both skip conditions).
    - name: create_index_skipped
      type: bool
      direction: output
      description: True iff the per-call ensureIndex step is skipped because omit_index_creation OR collection_already_exists.
    - name: mixed_collection_average_update_present
      type: bool
      direction: input
      description: True when MongoAggregate is writing the mixed collection variant and performs the second AsTimeUpdate upsert for derived averages.
    - name: aggregate_update_collection_identity_preserved
      type: bool
      direction: output
      description: True iff the second derived-average upsert uses the same mixed/per-org collection identity selected for the first aggregate upsert.
    - name: ignore_aggregation_configured
      type: bool
      direction: input
      description: True when IgnoreAggregationsList is non-empty for a MongoAggregate writer, causing selected aggregate dimensions to be omitted from that writer's incoming update document.
    - name: mixed_collection_dimension_present
      type: bool
      direction: input
      description: True when the shared mixed collection already contains a dimension counter map, such as lists.apikeys, contributed by a non-ignoring writer or earlier batch.
    - name: ignored_dimension_retained
      type: bool
      direction: output
      description: True iff a later MongoAggregate write with ignore_aggregations configured preserves the existing mixed-collection dimension counter map instead of deleting or overwriting it.
    - name: aggregate_lists_projection_persisted
      type: bool
      direction: output
      description: True iff Mongo aggregate readback from the per-org and shared mixed collections preserves the persisted Lists projection (for example lists.apikeys) derived by AsTimeUpdate from aggregate dimension counters.
    - name: docdb_backend_configured
      type: bool
      direction: input
      description: True when MongoDBType is AWSDocumentDB for the MongoAggregate pump, requiring DocumentDB-compatible foreground index creation without the StandardMongo collection-exists probe.
    - name: omit_index_creation_disabled
      type: bool
      direction: input
      description: True when OmitIndexCreation is false, so the pump is responsible for attempting its baseline aggregate indexes.
    - name: docdb_indexes_attempted
      type: bool
      direction: output
      description: True iff the MongoAggregate pump attempts its baseline DocumentDB-compatible indexes without calling the StandardMongo collection-exists shortcut; false when omit_index_creation intentionally disables index creation.
independence:
    declared: true
    reason: 'Mongo aggregate requirements cover independent behaviors: aggregation window selection, self-heal halving, empty-org skip, two-step upsert, ignored-dimension retention, Lists projection persistence, DocumentDB index compatibility, tag-list alerting, and index-skip policy.'
