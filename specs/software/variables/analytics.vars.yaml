component: analytics
variables:
    - name: rest_aggregate_input_present
      type: bool
      direction: input
      description: True when AggregateData receives at least one ordinary AnalyticsRecord eligible for REST aggregation, possibly mixed with graph- or MCP-classified records.
    - name: rest_aggregate_partitioned
      type: bool
      direction: output
      description: True iff AggregateData emits REST aggregate buckets for ordinary records and excludes records whose GraphQLStats.IsGraphQL or MCPStats.IsMCP classifiers route them to graph or MCP aggregate families.
    - name: graphql_root_fields_present
      type: bool
      direction: input
      description: True when AnalyticsRecord.GraphQLStats marks the record as GraphQL and carries one or more RootFields values.
    - name: root_fields_projected
      type: bool
      direction: output
      description: True iff AnalyticsRecord.ToGraphRecord copies GraphQLStats.RootFields into GraphRecord.RootFields without using legacy raw payload parsing.
    - name: in_should_filter
      type: bool
      direction: input
      description: True while AnalyticsFilters.ShouldFilter is evaluating a record (Phase boundary for the filter decision).
    - name: skip_match
      type: bool
      direction: input
      description: True iff the record matches any of skip_orgs / skip_apis / skip_response_codes lists (block list precedence).
    - name: outside_allow_list
      type: bool
      direction: input
      description: True iff a non-empty allow list exists (orgs/apis/response_codes) and the record falls outside ALL configured allow lists.
    - name: filter_true
      type: bool
      direction: output
      description: True iff AnalyticsFilters.ShouldFilter returns true (record is dropped before reaching pumps).
