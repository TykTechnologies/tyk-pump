component: pumps-es
variables:
    - name: mcp_index_configured
      type: bool
      direction: input
      description: True when esConf.MCPIndexName is non-empty — the operator-configured MCP-index toggle that, alongside is_mcp_record, gates MCP-specific index routing in getIndexNameForRecord (independent from is_mcp_record).
    - name: is_mcp_record
      type: bool
      direction: input
      description: True when the current record satisfies record.IsMCPRecord() — the per-record record-class classification independent of mcp_index_configured.
    - name: index_eq_mcp
      type: bool
      direction: output
      description: True iff getIndexNameForRecord routes the record to the MCPIndexName (with -YYYY.MM.DD suffix when RollingIndex is true), otherwise the default IndexName is used.
    - name: version_eq_3
      type: bool
      direction: input
      description: True when the ES pump configuration's Version field equals "3" (or unset/defaulted to 3).
    - name: v3_operator_constructed
      type: bool
      direction: output
      description: True iff Init constructs the Elasticsearch3Operator instance when Version==3 (other version arms construct v5/v6/v7 operator respectively; KI mcp-routing-non-bulk-ignored and KI pumps-logfatal-on-config-decode document the structural arms for unsupported Version).
    - name: disable_bulk
      type: bool
      direction: input
      description: True when the ES pump's DisableBulk config is true (forces per-record indexing instead of BulkProcessor).
    - name: per_record_indexed_else_bulk_processor
      type: bool
      direction: output
      description: True iff WriteData indexes each record one-by-one (Index call per record) when DisableBulk is true, otherwise BulkProcessor is used with operator-supplied workers/flushInterval/bulkActions/bulkSize.
    - name: elasticsearch_write_failed
      type: bool
      direction: input
      description: True when an Elasticsearch operator write path observes an invalid record, a per-record indexing error, a BulkProcessor/processData failure, or another backend write failure that should be surfaced to the Pump interface caller.
    - name: write_error_returned
      type: bool
      direction: output
      description: True iff ElasticsearchPump.WriteData returns a non-nil error or typed partial-progress result to the caller for the observed Elasticsearch write failure instead of only logging and returning nil.
    - name: es_alias_present
      type: bool
      direction: input
      description: True when the source AnalyticsRecord.Alias field is non-empty before Elasticsearch getMapping builds the backend document.
    - name: es_alias_projected
      type: bool
      direction: output
      description: True iff getMapping emits the Elasticsearch document field "alias" with the same value as AnalyticsRecord.Alias for records whose alias is present.
independence:
    declared: true
    reason: 'Elasticsearch pump requirements model separate routing, bulk/per-record indexing, and failure-observability outcomes; each guarantee owns a distinct output variable.'
