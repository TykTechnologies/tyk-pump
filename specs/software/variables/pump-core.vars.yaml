component: pump-core
variables:
    - name: instrumentation_enabled
      type: bool
      direction: input
      description: True when TYK_INSTRUMENTATION env var is '1' (instrumentation feature gate).
    - name: statsd_sink_added
      type: bool
      direction: output
      description: True iff a StatsD sink is added to the health stream and MonitorApplicationInstrumentation is invoked.
    - name: statsd_endpoint_configured
      type: bool
      direction: input
      description: True when SystemConfig.StatsdConnectionString is non-empty — the operator-controlled config gate that, alongside instrumentation_enabled (TYK_INSTRUMENTATION=1), must hold for SetupInstrumentation to add a StatsD sink. Mirrors observability.statsd_endpoint_configured at SW layer.
    - name: purge_tick
      type: bool
      direction: input
      description: True at each purge cycle tick (PurgeLoop iteration when StartPurgeLoop schedules WriteToPumps).
    - name: records_dispatched
      type: bool
      direction: output
      description: True iff all configured pumps received the filterData-processed batch for the current cycle.
    - name: json_loaded_before_env_override
      type: bool
      direction: output
      description: True iff config.go LoadConfig parses the JSON config file before TYK_PMP_* env overrides are applied.
    - name: component_init_requested
      type: bool
      direction: input
      description: True when SetupPumpsConfig and uptime pump are scheduled to be wired by main.initialise* paths.
    - name: component_initialized
      type: bool
      direction: output
      description: True iff each configured pump's Init returns nil (or it is recorded as failed) and the uptime pump is initialised before PurgeLoop starts.
    - name: shutdown_signal
      type: bool
      direction: input
      description: True when SIGINT/SIGTERM or context cancellation reaches main's shutdown handler.
    - name: purge_stopped_and_pumps_shutdown
      type: bool
      direction: output
      description: True iff the purge loop exits and every pump.Shutdown is invoked once on termination.
    - name: config_file_enabled
      type: bool
      direction: input
      description: True when --omit-config-file is NOT set (the operator is using a JSON config file alongside env overrides).
    - name: ignore_fields_configured
      type: bool
      direction: input
      description: True when the operator has configured a non-empty ignore-fields list for this backend (main.filterData's `len(ignoreFields) > 0` gate at main.go:411).
    - name: listed_fields_removed
      type: bool
      direction: output
      description: True iff every operator-listed field that matches a known AnalyticsRecord json tag has been zeroed out of the forwarded record by AnalyticsRecord.RemoveIgnoredFields before dispatch; unrecognised field names are logged and leave the record unchanged (mirror of the SYS-level privacy variable, scoped to the software component).
