component: pumps-prometheus
variables:
    - name: listen_path_empty
      type: bool
      direction: input
      description: True when PrometheusConf.Path is empty on Init.
    - name: default_path_applied
      type: bool
      direction: output
      description: True iff Path is defaulted to '/metrics' before promhttp.Handler() registration.
    - name: base_metric_disabled
      type: bool
      direction: input
      description: True when PrometheusConf.DisabledMetrics contains the exact name of one of the built-in base metric families.
    - name: base_metric_family_absent
      type: bool
      direction: output
      description: True iff a disabled built-in base metric family is omitted from allMetrics, so it is not registered, updated, or exposed by the Prometheus pump.
    - name: histogram_metric_configured
      type: bool
      direction: input
      description: True when a Prometheus metric being initialized has MetricType == histogram.
    - name: histogram_type_label_schema_normalized
      type: bool
      direction: output
      description: True iff histogram label initialization produces exactly one "type" label at position 0 followed by the configured non-type labels in their original relative order.
    - name: obfuscate_api_keys_enabled
      type: bool
      direction: input
      description: True when PrometheusConf.ObfuscateAPIKeys is true (the opt-in masking gate read by obfuscateAPIKey).
    - name: api_key_label_masked
      type: bool
      direction: output
      description: True iff the value emitted into the api_key/key Prometheus metric labels masks the raw API key (at most the last ObfuscateAPIKeysLength characters survive; the full raw key is never present) when obfuscation is enabled.
    - name: track_all_paths_enabled
      type: bool
      direction: input
      description: True when PrometheusConf.TrackAllPaths is enabled, allowing raw analytics paths to be emitted into Prometheus path labels.
    - name: record_track_path_enabled
      type: bool
      direction: input
      description: True when the analytics record has TrackPath set, allowing that individual record path to be emitted into Prometheus path labels.
    - name: path_label_unknown
      type: bool
      direction: output
      description: True when the Prometheus path label emitted for an untracked analytics record is the bounded sentinel 'unknown' instead of the raw request path.
    - name: path_label_preserved
      type: bool
      direction: output
      description: True when the Prometheus path label emitted for an opted-in tracked analytics record preserves the record's raw path value.
    - name: metric_label_value_contains_internal_separator
      type: bool
      direction: input
      description: True when at least one Prometheus metric label value contains the internal aggregation-key separator string "--".
    - name: metric_label_tuple_preserved
      type: bool
      direction: output
      description: True when the Prometheus aggregate stores and exposes the original label tuple values without reconstructing them by splitting the joined aggregation key.
independence:
    declared: true
    reason: 'Prometheus requirements cover independent metric exposition, base metric family disable gates, histogram label-schema normalization, optional API-key label masking, and path-label tracking gates; each guarantee has a separate FRETish trigger/output pair.'
