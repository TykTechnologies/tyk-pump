component: retry
variables:
    - name: is_5xx_or_429
      type: bool
      direction: input
      description: True when the HTTP response StatusCode is >=500 or ==429 (retryable status).
    - name: retry_attempted
      type: bool
      direction: output
      description: True iff backoff retries the request (false means backoff.Permanent is returned and the operation is abandoned).
    - name: transport_transient_err
      type: bool
      direction: input
      description: True when handleErr → isErrorRetryable classifies the transport error as retryable (one of conError.ConnectionError, "connection reset" substring, url.Error+"connection refused", net.OpError.Op=="dial"||Temporary, tempErr.Temporary, timeoutErr.Timeout). Distinct from is_5xx_or_429 — different code arm and fixture surface (network-error injection vs HTTP response).
    - name: max_elapsed_zero
      type: bool
      direction: input
      description: True when MaxElapsedTime is left at zero (the default) in the backoff config (KI storage-retry-maxelapsed-zero-is-unbounded).
    - name: unbounded_retry
      type: bool
      direction: output
      description: True iff total retry duration is unbounded (no permanent stop until success). False when a finite MaxElapsedTime caps the total retry duration.
independence:
    declared: true
    reason: 'Retry requirements split HTTP retry status/body handling from storage retry exhaustion; they intentionally model different callers and output variables.'
