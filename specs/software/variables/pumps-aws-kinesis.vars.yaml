component: pumps-aws-kinesis
variables:
    - name: kms_key_configured
      type: bool
      direction: input
      description: True when KinesisConf.KMSKeyID is non-empty at Init.
    - name: stream_encryption_verified
      type: bool
      direction: output
      description: 'True iff Kinesis Init verifies or reconciles server-side encryption for a configured KMS key: same non-empty key via DescribeStream is accepted, unencrypted or missing-key state proceeds through StartStreamEncryption, and unrecoverable AWS errors or different non-empty keys fail.'
    - name: stream_kms_key_state_reconciled
      type: bool
      direction: output
      description: 'True iff Kinesis Init reconciles DescribeStream encryption state against the configured KMS key: same non-nil key is accepted, different non-nil key fails, missing key id or unencrypted state starts encryption, and AWS errors are surfaced.'
independence:
    declared: true
    reason: Kinesis requirements split batch/write behavior from KMS stream encryption reconciliation; the outputs are separate configuration and backend-state responsibilities.
