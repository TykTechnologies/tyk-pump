component: pumps-influx-v1
variables:
    - name: connect_err
      type: bool
      direction: input
      description: True when influxdb.NewHTTPClient returns an error during WriteData (transient connect failure).
    - name: reconnect_attempted
      type: bool
      direction: output
      description: True iff WriteData sleeps and recursively re-invokes itself after a connect error (KI influx-v1-unbounded-reconnect-recursion).
    - name: influx_v1_single_write_per_purge_batch
      type: bool
      direction: output
      description: True iff InfluxPump.WriteData accumulates all accepted analytics records for the current purge into one InfluxDB v1 BatchPoints value and performs exactly one client Write call for that purge batch, instead of writing cumulative prefixes inside the record loop.
