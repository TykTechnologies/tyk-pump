    method: inspection
    evidence: see rationale and parent STK linkage; constraint/assumption reviewed in Phase B of feat/reqproof-coverage PR
    verified: true
parent: STK-REQ-004
component: runtime
rationale: "Single-process is the operational shape Tyk operators deploy and the codebase assumes (global Pumps slice, single AnalyticsStorage singleton). Clustering would require significant rework."
