id: SYS-REQ-027
version: 1
status: approved
priority: shall
category: constraint
req_type: constraint
fretish: runtime shall always satisfy single_process_only
description: 'Each tyk-pump instance runs as a single-process daemon: there is no internal clustering, no leader election, and no inter-instance coordination machinery. Operators may deploy multiple independent tyk-pump instances against the same Redis/backends as an operational scaling pattern (each instance reads from the shared queue and routes records via its own filter configuration), but tyk-pump itself provides no clustering or sharding machinery; capacity scaling is operator-deployed via process replication, not built into the pump.'
formalization_strategy: fretish
