component: ingestion
variables:
    - name: records_pending
      type: bool
      direction: input
      description: Unconsumed analytics records are present in the temporal store.
      data_constraint:
        domain: integer
        variable: pending_count
        condition: "pending_count > 0"
        parameters:
          - name: pending_count
            type: int
            constraint: ">= 0"
    - name: records_drained
      type: bool
      direction: input
      description: The temporal store has no unconsumed analytics records (complement of records_pending).
      data_constraint:
        domain: integer
        variable: pending_count
        condition: "pending_count == 0"
        parameters:
          - name: pending_count
            type: int
            constraint: ">= 0"
    - name: records_consumed
      type: bool
      direction: input
      description: Records have been retrieved from the temporal store.
    - name: records_removed_once
      type: bool
      direction: output
      description: Exactly those records are removed from the store atomically.
    - name: records_consumed_from_store
      type: bool
      direction: output
      description: Records have been retrieved from the temporal store on this purge cycle.
