component: delivery
variables:
    - name: a_backend_failed
      type: bool
      direction: input
      description: A write to one backend has failed or timed out.
    - name: other_backends_written
      type: bool
      direction: output
      description: The remaining configured backends still receive the records.
    - name: write_exceeds_timeout
      type: bool
      direction: input
      description: A backend write has exceeded its configured timeout.
      data_constraint:
        domain: integer
        variable: elapsed_ns
        condition: "elapsed_ns > timeout_ns"
        parameters:
          - name: elapsed_ns
            type: int
            constraint: ">= 0"
          - name: timeout_ns
            type: int
            constraint: "> 0"
    - name: write_within_timeout
      type: bool
      direction: input
      description: A backend write completes within its configured timeout (complement of write_exceeds_timeout).
      data_constraint:
        domain: integer
        variable: elapsed_ns
        condition: "elapsed_ns <= timeout_ns"
        parameters:
          - name: elapsed_ns
            type: int
            constraint: ">= 0"
          - name: timeout_ns
            type: int
            constraint: "> 0"
    - name: write_aborted
      type: bool
      direction: output
      description: The over-time write is abandoned without blocking other backends.
    - name: transient_failure
      type: bool
      direction: input
      description: A transient store or backend failure has occurred.
    - name: retry_attempted
      type: bool
      direction: output
      description: The operation is retried with bounded exponential backoff.
    - name: record_available_for_dispatch
      type: bool
      direction: input
      description: An analytics record consumed from the temporal store is available for dispatch.
    - name: record_dispatched_to_all_backends
      type: bool
      direction: output
      description: The record has been dispatched to every configured backend pump on this purge cycle.
    - name: retry_attempts_exhausted
      type: bool
      direction: input
      description: The configured maximum retry attempts have been used for a transient failure.
      data_constraint:
        domain: integer
        variable: attempts
        condition: "attempts >= max_attempts"
        parameters:
          - name: attempts
            type: int
            constraint: ">= 0"
          - name: max_attempts
            type: int
            constraint: ">= 1"
    - name: retry_attempts_remaining
      type: bool
      direction: input
      description: Retry attempts are still available below the configured maximum (complement of retry_attempts_exhausted).
      data_constraint:
        domain: integer
        variable: attempts
        condition: "attempts < max_attempts"
        parameters:
          - name: attempts
            type: int
            constraint: ">= 0"
          - name: max_attempts
            type: int
            constraint: ">= 1"
    - name: error_surfaced_to_caller
      type: bool
      direction: output
      description: The transient failure has been surfaced to the caller without further retries.
