component: build
variables:
    - name: go_125_or_later
      type: bool
      direction: output
      description: Go toolchain version is 1.25 or later.
      # Postcondition over the satisfying domain: a toolchain version
      # code (major*1000 + minor) of 1025+ encodes Go 1.25+.
      data_constraint:
        domain: integer
        variable: go_version_code
        condition: "go_version_code >= 1025"
        parameters:
          - name: go_version_code
            type: int
            constraint: ">= 1025"
    - name: fips_build_available
      type: bool
      direction: output
      description: A FIPS-compliant binary is producible via 'make build-fips'.
independence:
    declared: true
    reason: 'Build requirements cover different build artifacts and constraints; regular build availability and FIPS build availability do not share mutable runtime state.'
