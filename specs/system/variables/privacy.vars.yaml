component: privacy
variables:
    - name: record_exceeds_max_size
      type: bool
      direction: input
      description: A record exceeds the configured maximum size.
      data_constraint:
        domain: integer
        variable: record_size
        condition: record_size > max_record_size
        parameters:
            - name: record_size
              type: int
              constraint: '>= 0'
            - name: max_record_size
              type: int
              constraint: '> 0'
    - name: record_within_max_size
      type: bool
      direction: input
      proof_auxiliary: true
      proof_auxiliary_reason: Solver-only complement used for data-constraint completeness and exclusivity; no standalone behavioral requirement consumes it.
      description: A record is within the configured maximum size (complement of record_exceeds_max_size).
      data_constraint:
        domain: integer
        variable: record_size
        condition: record_size <= max_record_size
        parameters:
            - name: record_size
              type: int
              constraint: '>= 0'
            - name: max_record_size
              type: int
              constraint: '> 0'
    - name: record_truncated
      type: bool
      direction: output
      description: The record is truncated before forwarding.
      data_constraint:
        domain: integer
        variable: truncated_size
        condition: truncated_size <= max_record_size && truncated_size <= original_size
        parameters:
            - name: truncated_size
              type: int
              constraint: '>= 0'
            - name: max_record_size
              type: int
              constraint: '> 0'
            - name: original_size
              type: int
              constraint: '>= 0'
        assignment: (= truncated_size (ite (<= max_record_size original_size) max_record_size original_size))
    - name: decode_request_enabled
      type: bool
      direction: input
      description: True when SystemConfig.DecodeRawRequest is true — gates whether filterData base64-decodes the RawRequest field before forwarding.
    - name: decode_response_enabled
      type: bool
      direction: input
      description: True when SystemConfig.DecodeRawResponse is true — gates whether filterData base64-decodes the RawResponse field before forwarding (independent operator toggle from decode_request_enabled).
    - name: enabled_payloads_decoded
      type: bool
      direction: output
      description: True iff every payload whose decode toggle is enabled has been base64-decoded in place (RawRequest when decode_request_enabled, RawResponse when decode_response_enabled); per-payload decode silently no-ops on base64.DecodeString errors.
    - name: omit_detailed_recording_enabled
      type: bool
      direction: input
      description: The omit-detailed-recording policy is enabled for this backend.
    - name: detailed_payloads_omitted
      type: bool
      direction: output
      description: The raw request and response payloads have been dropped from the forwarded record.
    - name: ignore_fields_configured
      type: bool
      direction: input
      description: The operator has configured an ignore-fields list for this backend.
    - name: listed_fields_removed
      type: bool
      direction: output
      description: The operator-listed fields have been removed from the forwarded record.
independence:
    declared: true
    reason: 'Privacy requirements cover distinct data minimisation behaviors: size truncation, raw payload decoding, detailed-payload omission, and configured field removal.'
