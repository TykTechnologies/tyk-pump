component: observability
variables:
    - name: health_probe_received
      type: bool
      direction: input
      description: An HTTP health-check probe is received.
    - name: liveness_reported
      type: bool
      direction: output
      description: A liveness payload is returned to the probe.
    - name: instrumentation_enabled
      type: bool
      direction: input
      description: Instrumentation is enabled.
      data_constraint:
        domain: integer
        variable: statsd_addr_length
        condition: "statsd_addr_length > 0"
        parameters:
          - name: statsd_addr_length
            type: int
            constraint: ">= 0"
    - name: instrumentation_disabled
      type: bool
      direction: input
      description: Instrumentation is disabled because no statsd address is configured (complement of instrumentation_enabled).
      data_constraint:
        domain: integer
        variable: statsd_addr_length
        condition: "statsd_addr_length == 0"
        parameters:
          - name: statsd_addr_length
            type: int
            constraint: ">= 0"
    - name: metrics_emitted
      type: bool
      direction: output
      description: Purge-timing and record-count metrics are emitted to the sink.
    - name: statsd_endpoint_configured
      type: bool
      direction: input
      description: True when SystemConfig.StatsdConnectionString is non-empty — the operator-controlled config gate that, alongside instrumentation_enabled, must hold for SetupInstrumentation to add a StatsD sink and emit metrics.
    - name: metrics_sink_failure
      type: bool
      direction: input
      description: The metrics sink has failed to accept an emission.
    - name: purge_loop_continues
      type: bool
      direction: output
      description: The purge loop continues processing records irrespective of the sink failure.
