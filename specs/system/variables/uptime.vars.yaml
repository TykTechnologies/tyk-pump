component: uptime
variables:
    - name: uptime_purging_enabled
      type: bool
      direction: input
      description: Uptime purging is enabled in configuration.
    - name: uptime_forwarded
      type: bool
      direction: output
      description: Uptime report data is forwarded to the uptime backend.
    - name: uptime_data_consumed
      type: bool
      direction: internal
      description: Uptime data has been retrieved from the temporal store on this purge cycle.
independence:
    declared: true
    reason: 'Uptime requirements separate uptime record forwarding from temporal-store consumption and aggregate-window calculation; the formalized outputs are intentionally independent.'
