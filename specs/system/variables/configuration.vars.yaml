component: configuration
variables:
    - name: env_override_present
      type: bool
      direction: input
      description: An environment variable overrides a configuration field.
    - name: config_reflects_env
      type: bool
      direction: output
      description: The effective configuration reflects the environment override.
    - name: json_config_file_present
      type: bool
      direction: input
      description: A JSON configuration file has been provided at startup.
    - name: config_loaded_from_json
      type: bool
      direction: output
      description: The configuration has been parsed from the JSON file.
    - name: config_loading_robust_to_malformed_input
      type: bool
      direction: output
      description: True iff config loading completes without crashing when given malformed/missing inputs (missing file, bad JSON, unknown env var, missing required field).
