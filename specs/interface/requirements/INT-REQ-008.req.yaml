obligation_checklist:
    - config_schema_strict
    - malformed_input
obligation_deferrals:
    - obligation_class: config_schema_strict
      reason: Pump config schemas currently decode with lenient mapstructure defaults, so unknown operator keys can be silently ignored until DecoderConfig ErrorUnused or equivalent strict schema validation lands.
      tracking: mapstructure-decode-silently-drops-unknown-keys
      owner: human:buger
      ki_ref: mapstructure-decode-silently-drops-unknown-keys
release_disposition: ship_with_known_issue
interface:
    caller: tyk-pump-main-config
    callee: pump-impl-init
    type: function_call
    signature: pumps.Pump.Init(meta interface{}) error (pumps/pump.go:20). Each pump decodes the meta map via `mapstructure.Decode(conf, &pumpConfStruct)` — for example pumps/csv.go:51 CSVPump.Init.
    protocol: 'Config flow: config.go parses tyk-pump JSON config -> SystemConfig.PumpsConfig (map of pump-type -> meta JSON) -> each pump receives its slice of the meta map at Init time. Per-pump schema lives on the pump''s config struct (e.g. CSVConf in pumps/csv.go).'
    assumptions: 'Operators provide well-formed JSON keys matching the mapstructure tags on each pump''s config struct. Each pump may layer envconfig overrides via processPumpEnvVars (pumps/pump.go:58) after mapstructure.Decode.'
    guarantees: 'The contract claims malformed pump configuration is rejected loudly, BUT this is not honoured today — see KNOWN ISSUE mapstructure-decode-silently-drops-unknown-keys (already in .proof/known-issues/). mapstructure.Decode is lenient by default: unknown keys (e.g. operator typo `csv_pathh` for `csv_dir`) are silently dropped, the pump initialises with the default zero values, and the misconfiguration only surfaces at first write. To honour the requirement literally, each pump would need DecoderConfig{ErrorUnused: true}. Back-compat: each pump''s config struct is additive (new fields default to zero value); rename or remove of a config key is a major break for that pump. Retirement of a pump removes its config schema entirely (major tyk-pump version bump).'
    producer: tyk-pump-main-config
    consumer:
        - pump-impl-init
    owner: team:tyk-pump-maintainers
    version: v1
    compatibility_policy: semver-strict
    risk_tier: 2
