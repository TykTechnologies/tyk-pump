component: config-contract
rationale: "Each pump interprets its own meta map; making the decode contract explicit surfaces the mapstructure-leniency gap (tracked by KI mapstructure-decode-silently-drops-unknown-keys) where typos are silently ignored instead of rejected loudly as INT-008 claims."
