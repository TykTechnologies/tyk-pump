id: INT-REQ-008
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: when config_decode_attempted config_contract shall always satisfy unknown_keys_reported_via_logfatal
description: The pump configuration contract shall interpret each pump's meta map according to its declared type and reject malformed pump configuration loudly rather than silently dropping unknown keys at decode time.
formalization_strategy: fretish
informal_verification:
    method: ""
    evidence: ""
    verified: false
