    - cancellation_observed
    - errors_propagated
    - external_call_failure_observable
obligation_deferrals:
    - obligation_class: cancellation_observed
      reason: The Pump interface assumes WriteData honors the caller context, but MongoPump currently replaces it with context.Background; this remains KI-gated until implementations propagate cancellation.
      tracking: mongo-pump-ignores-caller-context
      owner: human:buger
      ki_ref: mongo-pump-ignores-caller-context
    - obligation_class: external_call_failure_observable
      reason: The Pump interface promises backend write failures are observable, but multiple WriteData implementations log per-batch failures and return nil until this KnownIssue is fixed.
      tracking: pump-writedata-swallows-per-batch-errors
      owner: human:buger
      ki_ref: pump-writedata-swallows-per-batch-errors
release_disposition: ship_with_known_issue
interface:
    caller: tyk-pump-core
    callee: pump-implementation
    type: function_call
    signature: Go interface `Pump` at pumps/pump.go:17-39 — 21 methods covering lifecycle (New, Init, Shutdown), config (GetName, GetEnvPrefix, SetTimeout/GetTimeout, SetMaxRecordSize/GetMaxRecordSize, SetLogLevel, SetOmitDetailedRecording/GetOmitDetailedRecording, SetFilters/GetFilters, SetIgnoreFields/GetIgnoreFields, SetDecodingResponse/GetDecodedResponse, SetDecodingRequest/GetDecodedRequest), and write (WriteData(ctx context.Context, []interface{}) error).
    protocol: 'In-process Go interface; the core dispatches via main.go:execPumpWriting and selects on ctx.Done() to enforce per-pump timeouts.'
    assumptions: 'Each pump implementation honours the ctx passed to WriteData (cancels in-flight work on ctx.Done) and returns a non-nil error when the underlying backend write fails. Methods may be added; callers obtain pumps via GetPumpByName (pumps/pump.go:48).'
    guarantees: 'The core can drive any Pump uniformly. Back-compat: adding a method to the Pump interface is a MAJOR break (every implementation must update); per-pump struct field additions are minor. Retirement of any interface method requires a major tyk-pump version bump. KNOWN ISSUE: mongo-pump-ignores-caller-context — MongoPump.WriteData passes context.Background() to m.store.Insert instead of the caller ctx (pumps/mongo.go:435), so per-pump timeouts are ineffective for mongo (.proof/known-issues/mongo-pump-ignores-caller-context.yaml). BROADER PATTERN: many pumps (mongo*, kinesis, sql-standard, graylog, syslog, logzio, segment, influx*) log per-batch errors but return nil from WriteData, breaking the errors-surfaced-via-return-value side of the contract — see docs/phase-a-proposed-reqs.md for the per-pump error-propagation matrix; flagged for follow-up KI creation (a single "pump-WriteData-swallows-per-batch-errors" KI covering the family is recommended).'
    producer: tyk-pump-core
    consumer:
        - pump-implementation
    owner: team:tyk-pump-maintainers
    version: v1
    compatibility_policy: semver-strict
    risk_tier: 1
