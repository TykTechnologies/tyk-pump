id: INT-REQ-004
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: when pump_methods_called pump_contract shall always satisfy contract_honoured
description: Every backend pump implementation shall conform to the Pump interface declared in pumps/pump.go (lifecycle, configuration, write, and shutdown surfaces) so the pump host can drive any registered pump uniformly and surface write errors to the caller.
