rationale: "Every pump driver is loaded through the same Go interface; pinning the interface surface as an ICD lets the pump host evolve safely and makes per-pump deviations (e.g. ctx-propagation gaps tracked by KI mongo-pump-ignores-caller-context) auditable rather than implicit."
