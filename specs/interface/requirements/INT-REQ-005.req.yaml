req_type: guarantee
fretish: when GetAndDeleteSet_invoked storage_contract shall always satisfy storage_records_popped_and_expire_attempted
description: The AnalyticsStorage.GetAndDeleteSet contract between the pump core and the temporal store shall return up to a chunk of records and remove exactly those records atomically with retrieval; partial-failure semantics on the remainder shall be documented as known issues.
