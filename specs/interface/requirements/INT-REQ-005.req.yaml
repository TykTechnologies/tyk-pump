    - obligation_class: atomicity
      reason: GetAndDeleteSet uses atomic Pop followed by non-atomic Expire; an Expire error can lose popped records until the linked KnownIssue is fixed.
      tracking: getanddeleteset-expire-fail-loses-records
      owner: human:buger
      ki_ref: getanddeleteset-expire-fail-loses-records
release_disposition: ship_with_known_issue
interface:
    caller: tyk-pump-core
    callee: temporal-storage-backend
    type: function_call
    signature: 'AnalyticsStorage interface at storage/store.go:10-14: `GetAndDeleteSet(setName string, chunkSize int64, expire time.Duration) ([]interface{}, error)`. Implementation TemporalStorageHandler.GetAndDeleteSet at storage/temporal_storage.go:262-306.'
    protocol: 'In-process Go interface backed by a Redis-compatible store. The implementation issues r.list.Pop(ctx, fixedKey, chunkSize) (atomic LPOP of up to chunkSize entries) followed by a best-effort r.kv.Expire(ctx, fixedKey, expire) TTL refresh when chunkSize != -1.'
    assumptions: 'Caller treats each returned chunk as already removed from the backing store (at-most-once delivery semantics). Caller (main.go:278) tolerates ([]nil, err) on connection failure and re-tries on the next purge tick.'
    guarantees: 'Records are returned and removed atomically by the Pop call (Redis LPOP). NOTE: the subsequent Expire (TTL refresh) is NOT part of the atomic set and is best-effort — an Expire error returns ([]nil, err) AFTER the Pop has already removed records, so the caller sees an error and zero records but the records are gone. This is a silent at-most-once-becomes-zero-times edge case (see RISK note). Back-compat: signature change requires a major tyk-pump version bump; the interface itself is in-process Go so there is no wire schema. Retirement of GetAndDeleteSet requires a major version bump. RISK: Pop+Expire is not transactional; on Expire failure the consumer can lose visibility into records that were already popped. Flagged for follow-up KI creation: "storage-GetAndDeleteSet-expire-failure-loses-popped-records".'
    producer: tyk-pump-core
    consumer:
        - temporal-storage-backend
    owner: team:tyk-pump-maintainers
    version: v1
    compatibility_policy: semver-strict
    risk_tier: 1
