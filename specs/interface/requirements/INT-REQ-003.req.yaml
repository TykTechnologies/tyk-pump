interface:
    caller: tyk-gateway
    callee: tyk-pump
    type: data
    signature: 'Wire formats keyed by analytics-key suffix: "" -> msgpack (serializer/msgp.go:30 MsgpSerializer.GetSuffix returns ""); "_protobuf" -> protobuf (serializer/protobuf.go:15 ProtobufSerializer.GetSuffix returns "_protobuf"). Schema source for protobuf: analytics/proto/analytics.proto.'
    protocol: 'Two parallel serializers selected per-key by GetSuffix; no in-band version handshake — the producer''s choice of suffix is the entire negotiation. AnalyticsSerializers loop at main.go:276 attempts each format per key.'
    assumptions: 'Both ends agree on the on-the-wire struct layout. Msgpack relies on field tags (untagged Go-struct positional order); protobuf relies on field numbers in analytics/proto/analytics.proto. Both decoders silently ignore unknown fields, so additive evolution is safe on either side independently.'
    guarantees: 'Round-trip preservation of every analytics record field via the chosen format. Schema version is implicit (protobuf: numbered fields in analytics.proto; msgpack: structural). Additive fields are accepted only when the field is represented in the Go AnalyticsRecord shape, protobuf numbered schema where applicable, encode/decode transformers, and snapshot or round-trip evidence. PER-FIELD EXCEPTIONS: protobuf round-trip is LOSSY for analytics.AnalyticsRecord.Geo.City.Names — serializer/protobuf.go sets `Names: nil` unconditionally on decode, so any City.Names map populated on the producer side is dropped; protobuf GraphQLStats also flattens analytics.GraphError to message strings, so GraphError.Path is dropped. These violate the requirement''s round-trip claim for the named fields and are tracked by KIs serializer-protobuf-loses-city-names and serializer-protobuf-loses-graphql-error-path. RISK: no formal version handshake between gateway and pump (FMEA-006); a format-incompatible upgrade on one side would surface as decode errors at runtime only. Retirement of a format requires both sides upgraded; back-compat is additive on protobuf (new field numbers) and additive on the msgpack-encoded Go struct. This branch does not include upstream TT-7519 fields OriginalPath/listen_path or ListenPath/listen_path; if merged, they must be added to the schema map and evidence under this contract.'
    producer: tyk-gateway
    consumer:
        - tyk-pump
    owner: team:tyk-pump-maintainers
    version: v1
    compatibility_policy: semver-strict
    risk_tier: 0
