interface:
    caller: tyk-gateway
    callee: tyk-pump
    type: data
    signature: 'Wire formats keyed by analytics-key suffix: "" -> msgpack (serializer/msgp.go:30 MsgpSerializer.GetSuffix returns ""); "_protobuf" -> protobuf (serializer/protobuf.go:15 ProtobufSerializer.GetSuffix returns "_protobuf"). Schema source for protobuf: analytics/proto/analytics.proto.'
    protocol: 'Two parallel serializers selected per-key by GetSuffix; no in-band version handshake — the producer''s choice of suffix is the entire negotiation. AnalyticsSerializers loop at main.go:276 attempts each format per key.'
    assumptions: 'Both ends agree on the on-the-wire struct layout. Msgpack relies on field tags (untagged Go-struct positional order); protobuf relies on field numbers in analytics/proto/analytics.proto. Both decoders silently ignore unknown fields, so additive evolution is safe on either side independently.'
    guarantees: 'Round-trip preservation of every analytics record field via the chosen format. Schema version is implicit (protobuf: numbered fields in analytics.proto; msgpack: structural). PER-FIELD EXCEPTION: protobuf round-trip is LOSSY for analytics.AnalyticsRecord.Geo.City.Names — serializer/protobuf.go:169 in TransformSingleProtoToAnalyticsRecord sets `Names: nil` unconditionally on decode, so any City.Names map populated on the producer side is dropped. This violates the requirement''s round-trip claim for that one field and is flagged as a defect for follow-up KI creation. RISK: no formal version handshake between gateway and pump (FMEA-006); a format-incompatible upgrade on one side would surface as decode errors at runtime only. Retirement of a format requires both sides upgraded; back-compat is additive on protobuf (new field numbers) and additive on the msgpack-encoded Go struct.'
    producer: tyk-gateway
    consumer:
        - tyk-pump
    owner: team:tyk-pump-maintainers
    version: v1
    compatibility_policy: semver-strict
    risk_tier: 0
