rationale: "The serializer format dictates which fields can round-trip between the gateway and pump; making it a first-class ICD surfaces the per-field exceptions (currently protobuf decode drops Geo.City.Names and GraphError.Path, tracked by KIs serializer-protobuf-loses-city-names and serializer-protobuf-loses-graphql-error-path) instead of letting them hide in prose."
