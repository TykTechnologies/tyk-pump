description: The serialization format between gateway and pump (msgpack on the bare key, protobuf on the _protobuf-suffixed key) shall round-trip every analytics record field without loss; per-field exceptions such as protobuf Geo.City.Names and GraphQL GraphError.Path loss shall be tracked as named known-issues. Any new analytics record field intended to cross this interface shall update the protobuf/msgpack schema mapping, transformer mapping, and snapshot or round-trip evidence in the same change.
