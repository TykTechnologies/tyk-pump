    type: data
    signature: Redis LIST<bytes> at keys "tyk-system-analytics" and "tyk-system-analytics_0..9" (constants storage.ANALYTICS_KEYNAME at storage/store.go:18); records consumed via AnalyticsStorage.GetAndDeleteSet (LPOP)
    protocol: 'Redis LIST; producer LPUSH/RPUSH; consumer LPOP via storage/temporal_storage.go:262 GetAndDeleteSet; encoding selected by key suffix: bare key = msgpack (serializer/msgp.go:30 GetSuffix returns ""), _protobuf suffix = protobuf (serializer/protobuf.go:15)'
    assumptions: 'Gateway uses the same AnalyticsRecord struct shape (analytics/analytics.go:46-82) and msgpack or protobuf encoding. Sharded key suffixes are decimal 0..9 only (consumer hard-codes the ceiling at main.go:267 `for i := -1; i < 10; i++`). Unknown record fields are tolerated (msgpack/protobuf decoders silently ignore unknown fields); back-compat is therefore additive-only on AnalyticsRecord.'
    guarantees: 'Pump consumes and deserializes every record published under these keys; bounds untrusted input per SW-REQ-001. Schema is implicit version 1 (no version field on AnalyticsRecord today — see RISK note). Retirement of these keys would require a coordinated major-version bump of tyk-pump and tyk-gateway. RISK: hard-coded 10-shard ceiling at main.go:267 — any future gateway analytics_config sharding fan-out beyond 0..9 would be silently dropped by the consumer. RISK: AnalyticsRecord has no schema_version field, so unknown-field tolerance is the only forward-compat mechanism.'
    producer: tyk-gateway
    consumer:
        - tyk-pump
    owner: team:tyk-pump-maintainers
    version: v1
    compatibility_policy: semver-strict
    risk_tier: 0
