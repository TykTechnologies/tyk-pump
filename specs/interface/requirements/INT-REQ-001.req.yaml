fretish: when gateway_emits_record gateway_pump shall always satisfy record_at_tyk_system_analytics
description: The gateway shall publish serialized analytics records into the configured temporal store under the analytics key set (tyk-system-analytics plus tyk-system-analytics_0 through _9); the pump shall consume and deserialize them, bounding untrusted input on the decode path.
