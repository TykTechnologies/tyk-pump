interface:
    caller: tyk-pump-pump-impl
    callee: pump-backend
    type: data
    signature: 'Per-backend record schema produced by each pump''s WriteData. Mongo: BSON documents in a configured collection (pumps/mongo.go). SQL: tyk_analytics table via gorm AutoMigrate on the analytics.AnalyticsRecord struct (pumps/sql.go; see also INT-REQ-007). Kafka: JSON-marshalled records (pumps/kafka.go). InfluxDB: line-protocol points. Each pump cherry-picks fields from analytics.AnalyticsRecord.'
    protocol: 'Per-backend protocol (BSON insert, SQL INSERT, Kafka produce, Influx write, HTTP POST, etc.). The mapping from analytics.AnalyticsRecord -> backend record is bespoke in each pump.'
    assumptions: 'Each pump tolerates unknown or future fields on analytics.AnalyticsRecord (no pump fails the write on field presence). The set of fields persisted per backend is whatever that pump explicitly copies; pumps that use struct-wide marshalling (mongo, kafka JSON) implicitly forward all fields.'
    guarantees: 'Each pump maps records onto its backend schema and does not fail the write on unrecognised record fields. PLANNED: a per-backend ICD split is a Phase A artifact — this single INT-REQ aggregates contracts that should eventually decompose into one INT-REQ per backend pump (mongo, sql-standard, sql-aggregate, kafka, influx[v2], elasticsearch, prometheus, statsd, dogstatsd, splunk, syslog, graylog, logzio, segment, hybrid, csv, stdout, mcp-sql*, graph-*). Back-compat is per-backend: mongo requires collection-schema migrations, SQL pumps follow INT-REQ-007''s expand-then-contract policy, kafka/JSON is forward-compatible by JSON''s rules. Retirement of an entire pump (removing a backend) requires a major tyk-pump version bump.'
    producer: tyk-pump-pump-impl
    consumer:
        - pump-backend
    owner: team:tyk-pump-maintainers
    version: v1
    compatibility_policy: semver-lax
    risk_tier: 2
