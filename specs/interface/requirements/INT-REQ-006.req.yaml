description: Each pump shall map analytics records onto its backend's schema and tolerate unknown or future record fields without failing the write. Phase A's per-implementation SW reqs (SW-REQ-034..057, 068..070) are the contract-bearing artifacts for per-backend schema-mapping behaviour; this INT-REQ-006 remains as the cross-cutting aggregate ICD and is intentionally not further split per-backend at the INT level.
