fretish: when sql_schema_version_changed sql_schema shall always satisfy expand_contract_migration
description: The SQL pump schema (day-sharded analytics tables and aggregate tables) shall be migratable while older pump versions still write to it, following an expand-then-contract policy on every column rename or removal.
