interface:
    caller: tyk-pump-sql-pumps
    callee: sql-backend
    type: data
    signature: 'SQL tables: `tyk_analytics` (base, standard schema) and optionally day-sharded as `tyk_analytics_YYYYMMDD` when table_sharding=true (pumps/sql.go AnalyticsRecord-derived schema). Indexes named `<table>_<column>_idx`, created via CREATE INDEX IF NOT EXISTS (CONCURRENTLY for postgres) during Init / on day-rollover.'
    protocol: 'gorm AutoMigrate + raw DDL via SQL driver (postgres / mysql / sqlite). Migration runs at pump Init time and again per day when table_sharding=true. New columns are added by re-running AutoMigrate against the AnalyticsRecord struct.'
    assumptions: 'Operators run schema changes expand-then-contract: add columns first (compatible with older pumps still writing), backfill, then drop. Older pump versions tolerate the presence of extra columns. With MigrateShardedTables=false (default; pumps/sql.go:89), AutoMigrate runs ONLY against today''s shard — older day-shards do not pick up new columns.'
    guarantees: 'Schema is migratable in-place via additive column changes while older pump versions still write. NOT FORMALLY ENFORCED: there is no CI check that rejects non-additive AnalyticsRecord changes — expand-then-contract is a convention only; flagged as risk. KNOWN GAP: with MigrateShardedTables=false (the default), late-arriving records dated to a prior day can fail to write into older shards that lack the new columns; operators must set migrate_sharded_tables=true to backfill schema across all shards. Schema version is implicit via column presence (no schema_version table). Back-compat: additive columns only; rename/drop requires a multi-stage rollout. Retirement of a table requires a major tyk-pump version bump. Flagged for follow-up KI creation: "sql-pump-migrate-sharded-tables-default-false-causes-late-record-write-failure".'
    producer: tyk-pump-sql-pumps
    consumer:
        - sql-backend
    owner: team:tyk-pump-maintainers
    version: v1
    compatibility_policy: breaking-allowed-with-migration
    risk_tier: 1
