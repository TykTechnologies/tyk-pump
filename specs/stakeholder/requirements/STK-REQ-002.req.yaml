id: STK-REQ-002
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: ""
description: Operators need analytics delivered reliably to every configured backend, such that a slow or failing backend never blocks delivery to the others and records are neither lost nor duplicated in normal operation. Regulated operators also need FIPS-labelled release artifacts to preserve the FIPS build variant they select for deployment.
formalization_strategy: informal
informal_verification:
    method: ""
    evidence: ""
    verified: false
component: delivery
rationale: "Operators run multiple heterogeneous backends; isolating per-backend failures and retrying transient errors prevents one sink from causing pipeline-wide data loss. Regulated deployments additionally rely on artifact labels selecting the matching FIPS build/package variant."
tags:
    - delivery
    - reliability
    - resilience
variables: []
