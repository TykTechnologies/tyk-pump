id: STK-REQ-002
version: 1
status: approved
priority: shall
category: functional
req_type: guarantee
fretish: ""
description: Operators need analytics delivered reliably to every configured backend, such that a slow or failing backend never blocks delivery to the others and records are neither lost nor duplicated in normal operation.
