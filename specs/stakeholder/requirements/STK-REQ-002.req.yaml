obligation_checklist:
    - atomicity
    - boundary
    - dead_letter_or_reenqueue_on_total_write_failure
    - error_handling
    - external_call_timeout_bounded
    - output_cardinality_bounded
release_disposition: ship_with_known_issue
stakeholder:
    persona: Platform operator
    story: As an operator I want resilient multi-backend delivery, including deployable artifacts that match their advertised security mode, so that one unhealthy sink does not take down my analytics pipeline and regulated deployments select the intended build variant.
    acceptance_criteria:
        - id: AC-001
          text: A failure or timeout writing to one backend does not prevent records being written to the other configured backends.
          verification_method: test
          derived_reqs:
            - SYS-REQ-004
            - SYS-REQ-005
            - SYS-REQ-026
            - SYS-REQ-033
        - id: AC-002
          text: Transient storage or backend errors are retried with bounded backoff rather than dropped on first failure.
          verification_method: test
          derived_reqs:
            - SYS-REQ-006
            - SYS-REQ-007
            - SYS-REQ-023
            - SYS-REQ-025
            - SYS-REQ-028
        - id: AC-003
          text: If all backend writes fail after analytics records have been consumed, the records are retained for retry or dead-letter handling rather than silently lost.
          verification_method: test
          derived_reqs:
            - SYS-REQ-022
          witness_deferred:
            reason: No truthful end-to-end acceptance test can pass until known issue write-failure-after-pop-loses-records adds a DLQ, re-enqueue path, or equivalent retention after total write failure.
            tracking: write-failure-after-pop-loses-records
            owner: tyk-team
            review_date: "2026-11-30"
            release_disposition: ship_with_known_issue
        - id: AC-004
          text: FIPS-labelled release packages and Docker images contain the FIPS build/package variant rather than the standard variant.
          verification_method: test
          derived_reqs:
            - SYS-REQ-036
