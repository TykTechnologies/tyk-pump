    - check: code_mcdc_coverage
      scope: '*'
      reason: 'Pumps target at 60.0%/60.5% (analytics/serializer/retry/server/storage all at 100%; aggregate 68%/69% reflects this single gap). The matchingWaiver implementation in this proof build requires per-issue-ID waivers OR a check-wide scope; with 102 partially-covered functions and the gaps tied to systemic seams (connector factory, real-backend testcontainer flakes) rather than a single requirement, a check-wide waiver is the honest unit. Each named seam is KI-tracked: mcdc-pumps-below-95 names the connector-factory seam; sibling KIs sql-aggregate-mysql-excluded-keyword-broken, elasticsearch-mcp-routing-non-bulk-ignored, resurface-maprawdata-empty-request-panic, splunk-newsplunkclient-mutates-default-transport, mongo-pump-writeuptime-nil-on-bad-msgpack, pumps-logfatal-on-config-decode each name a concrete production refactor that unblocks specific arms. Standalone pumps measurement runs at 99.6% — the depressed audit-driven number is the testcontainer race documented in KI mcdc-pumps-audit-vs-standalone-discrepancy. Re-measurement after those refactors land will retire the waiver.'
      by: leo@tyk.io
      role: test_owner
      created_at: "2026-06-02"
      expires: "2026-11-30"
